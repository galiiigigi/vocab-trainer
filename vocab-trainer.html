<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#6c5ce7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<script>
(function(){
  function genIcon(sz){
    const c=document.createElement('canvas');c.width=c.height=sz;const x=c.getContext('2d');
    x.fillStyle='#0f1117';x.fillRect(0,0,sz,sz);
    x.beginPath();x.arc(sz/2,sz/2,sz*0.45,0,Math.PI*2);x.fillStyle='#6c5ce7';x.fill();
    const s=sz*0.06;x.strokeStyle='#fff';x.lineWidth=s;x.lineCap='round';
    x.beginPath();x.moveTo(sz*0.3,sz*0.25);x.lineTo(sz*0.5,sz*0.75);x.stroke();
    x.beginPath();x.moveTo(sz*0.7,sz*0.25);x.lineTo(sz*0.5,sz*0.75);x.stroke();
    return c.toDataURL('image/png');
  }
  const i192=genIcon(192),i512=genIcon(512);
  const manifest={name:"Canadian English Vocabulary Trainer",short_name:"Vocab Trainer",description:"Learn Canadian English vocabulary with quizzes, flashcards, and AI practice",start_url:"vocab-trainer.html",display:"standalone",background_color:"#0f1117",theme_color:"#6c5ce7",orientation:"portrait",icons:[{src:i192,sizes:"192x192",type:"image/png"},{src:i512,sizes:"512x512",type:"image/png"}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);
  const apple=document.createElement('link');apple.rel='apple-touch-icon';apple.href=i192;document.head.appendChild(apple);
})();
</script>
<title>Canadian English Vocab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#1a1d2e;--bg3:#242842;--bg4:#2d3250;
  --text:#e8e8ed;--text2:#a0a3b8;--text3:#656880;
  --accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#e17055;--orange:#fdcb6e;--blue:#74b9ff;
  --radius:12px;--nav-h:60px;
}
[data-theme="light"]{
  --bg:#f0f2f5;--bg2:#ffffff;--bg3:#e4e6eb;--bg4:#d0d3da;
  --text:#1a1a2e;--text2:#4a4a6a;--text3:#8888a8;
  --accent:#6c5ce7;--accent2:#5a4bd1;--green:#00a884;--red:#d63031;--orange:#e17055;--blue:#0984e3;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,system-ui,'Segoe UI',sans-serif;font-size:15px;line-height:1.5}
.app{display:flex;flex-direction:column;height:100%;max-width:480px;margin:0 auto;position:relative}
.screen{flex:1;overflow-y:auto;padding:16px 16px calc(var(--nav-h) + 16px);display:none}
.screen.active{display:block}

/* Bottom Nav */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:var(--bg2);border-top:1px solid rgba(255,255,255,.06);display:flex;justify-content:center;z-index:100}
.nav-inner{display:flex;max-width:480px;width:100%}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;padding:8px 0;transition:color .2s}
.nav-btn.active{color:var(--accent2)}
.nav-btn svg{width:22px;height:22px;fill:currentColor}

/* Cards/Panels */
.card{background:var(--bg2);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.card-sm{padding:12px}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;padding:12px 20px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;color:#fff;background:var(--accent);width:100%}
.btn:active{transform:scale(.97);opacity:.9}
.btn-ghost{background:var(--bg3);color:var(--text)}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-orange{background:var(--orange);color:#222}
.btn-sm{min-height:40px;padding:8px 16px;font-size:13px}
.btn-row{display:flex;gap:8px}
.btn-row .btn{flex:1}
.btn:disabled{opacity:.4;pointer-events:none}

/* Quiz */
.quiz-question{font-size:20px;font-weight:700;text-align:center;padding:24px 12px;min-height:120px;display:flex;align-items:center;justify-content:center}
.quiz-choices{display:flex;flex-direction:column;gap:8px}
.quiz-choice{min-height:52px;padding:14px 16px;border-radius:10px;background:var(--bg3);border:2px solid transparent;color:var(--text);font-size:15px;font-weight:500;cursor:pointer;text-align:left;transition:all .15s}
.quiz-choice:active{transform:scale(.98)}
.quiz-choice.correct{border-color:var(--green);background:rgba(0,184,148,.15)}
.quiz-choice.wrong{border-color:var(--red);background:rgba(225,112,85,.15)}
.quiz-choice.disabled{pointer-events:none;opacity:.6}
.quiz-choice.correct-reveal{border-color:var(--green);opacity:1!important}
.rt-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700}
.rt-perfect{background:rgba(0,184,148,.2);color:var(--green)}
.rt-good{background:rgba(116,185,255,.2);color:var(--blue)}
.rt-hard{background:rgba(253,203,110,.2);color:var(--orange)}
.rt-fail{background:rgba(225,112,85,.2);color:var(--red)}
.progress-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:16px}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s}

/* Timer bar */
.timer-bar{height:3px;background:var(--bg3);border-radius:2px;margin-top:8px;overflow:hidden}
.timer-fill{height:100%;background:var(--green);transition:width .1s linear,background .3s}

/* Flashcard */
.flashcard-container{perspective:1000px;margin:20px 0}
.flashcard{width:100%;min-height:280px;position:relative;transform-style:preserve-3d;transition:transform .5s;cursor:pointer}
.flashcard.flipped{transform:rotateY(180deg)}
.flashcard-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.flashcard-front{background:var(--bg2)}
.flashcard-back{background:var(--bg3);transform:rotateY(180deg)}
.flashcard-word{font-size:28px;font-weight:800}
.flashcard-def{font-size:16px;color:var(--text2);text-align:center;margin-top:12px}
.flashcard-example{font-size:13px;color:var(--text3);font-style:italic;margin-top:12px;text-align:center}
.flashcard-category{font-size:11px;color:var(--accent2);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* Voice */
.mic-btn{width:100px;height:100px;border-radius:50%;border:none;background:var(--accent);color:#fff;font-size:40px;cursor:pointer;margin:20px auto;display:flex;align-items:center;justify-content:center;transition:all .2s}
.mic-btn.listening{background:var(--red);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(225,112,85,.4)}50%{box-shadow:0 0 0 20px rgba(225,112,85,0)}}
.voice-result{text-align:center;font-size:18px;font-weight:600;margin:16px 0}

/* Heatmap */
.heatmap-scroll{overflow-x:auto;padding:8px 0}
.heatmap-grid{display:flex;gap:2px}
.heatmap-col{display:flex;flex-direction:column;gap:2px}
.heatmap-cell{width:12px;height:12px;border-radius:2px;background:var(--bg3)}
.heatmap-cell.l1{background:rgba(108,92,231,.25)}
.heatmap-cell.l2{background:rgba(108,92,231,.45)}
.heatmap-cell.l3{background:rgba(108,92,231,.7)}
.heatmap-cell.l4{background:var(--accent)}

/* Progress */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--bg3);border-radius:10px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:800}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.cat-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:4px}
.cat-fill{height:100%;border-radius:3px;background:var(--accent)}

/* Word List */
.search-input{width:100%;padding:12px 16px;background:var(--bg3);border:1px solid var(--bg4);border-radius:10px;color:var(--text);font-size:15px;outline:none}
.search-input:focus{border-color:var(--accent)}
.filter-chips{display:flex;gap:6px;overflow-x:auto;padding:8px 0;flex-wrap:nowrap}
.chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;background:var(--bg3);color:var(--text3);cursor:pointer;white-space:nowrap;border:none}
.chip.active{background:var(--accent);color:#fff}
.word-item{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid rgba(255,255,255,.03);cursor:pointer}
.word-item:active{background:var(--bg3)}
.word-text{font-weight:600}
.word-def-preview{font-size:12px;color:var(--text3);margin-top:2px;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.word-status{font-size:10px;font-weight:700;padding:3px 8px;border-radius:10px}
.ws-new{background:var(--bg3);color:var(--text3)}
.ws-beginner{background:rgba(225,112,85,.15);color:var(--red)}
.ws-learning{background:rgba(253,203,110,.15);color:var(--orange)}
.ws-familiar{background:rgba(116,185,255,.15);color:var(--blue)}
.ws-mastered{background:rgba(0,184,148,.15);color:var(--green)}

/* POS badge */
.pos-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;background:rgba(108,92,231,.15);color:var(--accent2);letter-spacing:.5px;text-transform:lowercase;margin-left:4px;vertical-align:middle}

/* Settings */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.setting-label{font-size:14px}
.setting-row select{background:var(--bg3);color:var(--text);border:1px solid var(--bg4);border-radius:8px;padding:6px 10px;font-size:14px}

/* Toast */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg3);color:var(--text);padding:12px 24px;border-radius:10px;font-size:14px;font-weight:600;z-index:200;transition:transform .3s;box-shadow:0 8px 30px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Quiz Summary */
.summary-score{font-size:48px;font-weight:800;text-align:center;margin:16px 0}
.summary-detail{display:flex;justify-content:space-around;margin:16px 0}
.summary-item{text-align:center}
.summary-item .num{font-size:22px;font-weight:700}
.summary-item .label{font-size:11px;color:var(--text3)}

/* Misc */
h2{font-size:20px;font-weight:700;margin-bottom:12px}
h3{font-size:16px;font-weight:600;margin-bottom:8px}
.subtitle{font-size:13px;color:var(--text3);margin-bottom:16px}
.mt{margin-top:12px}
.mb{margin-bottom:12px}
.text-center{text-align:center}
.streak-fire{font-size:32px;text-align:center}

/* Level System */
.level-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.level-badge{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.3);flex-shrink:0}
.level-info{flex:1;min-width:0}
.level-title{font-size:15px;font-weight:700;color:var(--text)}
.level-subtitle{font-size:11px;color:var(--text3)}
.xp-bar{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin:6px 0 4px}
.xp-fill{height:100%;border-radius:4px;transition:width .5s}
.xp-text{font-size:10px;color:var(--text3);display:flex;justify-content:space-between}
.skill-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.skill-box{background:var(--bg3);border-radius:8px;padding:8px 4px;text-align:center}
.skill-emoji{font-size:18px}
.skill-name{font-size:9px;color:var(--text3);margin-top:1px}
.skill-val{font-size:12px;font-weight:700;margin-top:2px}

/* Word detail modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:150;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--bg2);border-radius:16px 16px 0 0;padding:24px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto}
.modal h3{margin-bottom:8px}

@media(min-width:500px){
  .modal{border-radius:16px;align-self:center;max-height:70vh}
}

/* Desktop Mode */
[data-layout="desktop"] .app{max-width:960px}
[data-layout="desktop"] .screen{padding:24px 32px calc(var(--nav-h) + 24px)}
[data-layout="desktop"] .nav-inner{max-width:960px}
[data-layout="desktop"] .card{padding:20px}
[data-layout="desktop"] .btn{min-height:44px}
[data-layout="desktop"] .quiz-question{font-size:22px}
[data-layout="desktop"] .quiz-choice{padding:14px 18px;font-size:15px}
[data-layout="desktop"] .stat-grid{grid-template-columns:1fr 1fr 1fr}
[data-layout="desktop"] .skill-grid{grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
[data-layout="desktop"] .home-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
[data-layout="desktop"] .home-actions .btn{font-size:13px;min-height:44px}
[data-layout="desktop"] .level-badge{width:64px;height:64px;font-size:24px;border-radius:16px}
[data-layout="desktop"] .level-title{font-size:18px}
[data-layout="desktop"] .flashcard-word{font-size:32px}
[data-layout="desktop"] .word-item{padding:14px 16px}
[data-layout="desktop"] h2{font-size:24px}
[data-layout="desktop"] .modal{max-width:600px}

/* TTS */
.speak-btn{background:none;border:none;color:var(--accent2);font-size:20px;cursor:pointer;padding:2px 6px;vertical-align:middle;transition:opacity .15s}
.speak-btn:active{opacity:.5}

/* Learn Navigation */
.learn-nav{display:flex;justify-content:space-between;margin-bottom:12px}
.learn-nav button{background:none;border:none;color:var(--accent2);font-size:13px;font-weight:600;cursor:pointer;padding:6px 0;display:flex;align-items:center;gap:4px}
.learn-nav button:disabled{color:var(--text3);opacity:.4;cursor:default}

/* Spinner */
.spinner{width:36px;height:36px;border:3px solid var(--bg4);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}

/* Add Words */
.form-group{margin-bottom:12px}
.form-label{font-size:12px;color:var(--text3);margin-bottom:4px;display:block}
.form-input{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.form-input:focus{border-color:var(--accent)}
.form-select{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--bg4);border-radius:8px;color:var(--text);font-size:14px}
textarea.form-input{min-height:60px;resize:vertical}
.custom-word-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.03)}
.custom-word-item .del-btn{background:none;border:none;color:var(--red);font-size:18px;cursor:pointer;padding:4px 8px}
.ai-suggest-item{padding:12px;border-radius:10px;background:var(--bg3);margin-bottom:6px;cursor:pointer;border:2px solid transparent;transition:all .15s}
.ai-suggest-item.selected{border-color:var(--green);background:rgba(0,184,148,.08)}
.ai-suggest-item h4{font-size:14px;font-weight:600;margin-bottom:2px}
.ai-suggest-item p{font-size:12px;color:var(--text3);margin:0}

/* Chat */
#screen-chat.active{display:flex;flex-direction:column}
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:4px}
.chat-bubble{max-width:85%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word}
.chat-user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-ai{background:var(--bg3);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.chat-input-row{display:flex;gap:8px;padding:8px 0;flex-shrink:0}
.chat-input{flex:1;padding:12px 16px;background:var(--bg3);border:1px solid var(--bg4);border-radius:24px;color:var(--text);font-size:15px;outline:none;min-width:0}
.chat-input:focus{border-color:var(--accent)}
.chat-send{width:48px;height:48px;border-radius:50%;background:var(--accent);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.chat-send:disabled{opacity:.4;pointer-events:none}
.chat-scenario{padding:14px;border-radius:var(--radius);background:var(--bg3);cursor:pointer;transition:all .15s}
.chat-scenario:active{transform:scale(.98)}
.chat-scenario h3{margin-bottom:2px;font-size:14px}
.chat-scenario p{font-size:12px;color:var(--text3);margin:0}
.chat-vocab-hint{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;background:rgba(108,92,231,.15);color:var(--accent2);margin:2px}
.ai-loading{display:inline-flex;gap:4px;padding:4px 0}
.ai-loading span{width:6px;height:6px;border-radius:50%;background:var(--text3);animation:aibounce .6s infinite alternate}
.ai-loading span:nth-child(2){animation-delay:.2s}
.ai-loading span:nth-child(3){animation-delay:.4s}
@keyframes aibounce{to{opacity:.3;transform:translateY(-4px)}}
.ai-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--accent2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.chat-feedback{background:rgba(108,92,231,.1);border:1px solid rgba(108,92,231,.2);border-radius:10px;padding:12px;font-size:13px;color:var(--text2);line-height:1.6}

/* Daily Word */
.daily-word{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid rgba(108,92,231,.2);border-radius:var(--radius);padding:16px;margin-bottom:12px;cursor:pointer;transition:transform .15s}
.daily-word:active{transform:scale(.98)}
.daily-word-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--accent2);font-weight:700;margin-bottom:8px}
.daily-word-text{font-size:22px;font-weight:800}
.daily-word-def{font-size:13px;color:var(--text2);margin-top:4px}

/* Chat add word */
.chat-add-btn{background:none;border:none;color:var(--accent2);font-size:11px;cursor:pointer;padding:2px 6px;opacity:.5;transition:opacity .15s}
.chat-add-btn:active{opacity:1}
.chat-new-words{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.chat-new-word-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--bg3);border-radius:8px;gap:8px}
.chat-new-word-item .word-info{flex:1;min-width:0}
.chat-new-word-item .word-name{font-size:14px;font-weight:600}
.chat-new-word-item .word-meaning{font-size:12px;color:var(--text2);margin-top:2px}
.chat-add-word-btn{padding:6px 12px;border-radius:8px;background:var(--accent);color:#fff;border:none;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0}
.chat-add-word-btn:disabled{opacity:.4;pointer-events:none}
.chat-add-word-btn.added{background:var(--green)}

/* Grammar correction in chat */
.grammar-correction{background:rgba(253,203,110,.08);border-left:3px solid var(--orange);border-radius:0 8px 8px 0;padding:8px 12px;margin-top:8px;font-size:13px;line-height:1.6}

/* Pronunciation practice modal */
.pron-target{font-size:18px;font-weight:700;text-align:center;padding:16px 12px;background:var(--bg3);border-radius:10px;margin-bottom:12px;line-height:1.5}
.pron-actions{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pron-actions .btn{flex:1;min-width:0}
.pron-attempt{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px}
.pron-attempt .attempt-label{font-size:12px;color:var(--text3);min-width:60px}
.pron-attempt .attempt-play{background:none;border:none;font-size:18px;cursor:pointer;padding:4px}
.pron-ai-feedback{background:rgba(108,92,231,.08);border:1px solid rgba(108,92,231,.15);border-radius:10px;padding:12px;font-size:13px;color:var(--text2);line-height:1.6;margin-top:8px}
.retry-btn{background:none;border:none;color:var(--orange);font-size:11px;cursor:pointer;padding:2px 6px;opacity:.6;transition:opacity .15s}
.retry-btn:active{opacity:1}
/* Substitution Drill & Listen Respond */
.highlight-word{color:var(--accent);font-weight:700;text-decoration:underline;text-decoration-style:wavy}
.think-timer{font-size:48px;font-weight:800;color:var(--accent);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.lr-phase-label{font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
</style>
</head>
<body>

<script>
// ===== APP LOG =====
const APP_LOG = [];
const MAX_LOG = 200;
const _origLog = console.log.bind(console);
const _origErr = console.error.bind(console);
const _origWarn = console.warn.bind(console);
function appLog(level, args){
  const time = new Date().toLocaleTimeString('en-CA',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const msg = Array.from(args).map(a => typeof a==='object'? JSON.stringify(a).substring(0,300) : String(a)).join(' ');
  APP_LOG.push({time, level, msg});
  if(APP_LOG.length > MAX_LOG) APP_LOG.shift();
}
console.log = function(){ appLog('info', arguments); _origLog.apply(console, arguments); };
console.error = function(){ appLog('error', arguments); _origErr.apply(console, arguments); };
console.warn = function(){ appLog('warn', arguments); _origWarn.apply(console, arguments); };
window.addEventListener('error', e => appLog('error', ['Uncaught: '+e.message, 'at '+e.filename+':'+e.lineno]));
window.addEventListener('unhandledrejection', e => appLog('error', ['Unhandled promise: '+(e.reason?.message||e.reason)]));

function showAppLogs(){
  const root = document.getElementById('modal-root');
  const colors = {info:'var(--text3)', error:'var(--red)', warn:'var(--orange)'};
  const icons = {info:'', error:'ERR ', warn:'WARN '};
  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-height:90vh;overflow-y:auto;max-width:600px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h3>App Logs (${APP_LOG.length})</h3>
        <div>
          <button class="btn btn-ghost btn-sm" onclick="copyAppLogs()" style="margin-right:4px">Copy All</button>
          <button onclick="closeModal()" style="background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer">&times;</button>
        </div>
      </div>
      <div style="font-family:monospace;font-size:11px;background:var(--bg);border-radius:8px;padding:8px;max-height:70vh;overflow-y:auto">
        ${APP_LOG.length===0?'<div style="color:var(--text3);padding:20px;text-align:center">No logs yet</div>':''}
        ${[...APP_LOG].reverse().map(l =>
          '<div style="padding:3px 0;border-bottom:1px solid var(--bg3);color:'+colors[l.level]+';word-break:break-all">' +
          '<span style="color:var(--text3)">['+l.time+']</span> ' +
          '<span style="font-weight:700">'+icons[l.level]+'</span>' +
          l.msg + '</div>'
        ).join('')}
      </div>
    </div>
  </div>`;
  root.style.display = 'flex';
}

function copyAppLogs(){
  const text = APP_LOG.map(l => '['+l.time+'] '+l.level.toUpperCase()+': '+l.msg).join('\n');
  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(()=>toast('Logs copied!'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    toast('Logs copied!');
  }
}

// ===== WORD DATABASE =====
const WORDS_RAW = [
];

// ===== BUILD WORD DATABASE =====
const CATEGORIES = {essentials:'Daily Essentials',food:'Food & Dining',work:'Work & Office',shopping:'Shopping',healthcare:'Healthcare',housing:'Housing',transit:'Transit',weather:'Weather',social:'Social',canadian:'Canadian Culture',technology:'Technology',legal:'Legal & Gov',finance:'Finance',geography:'BC Geography',engineering:'Engineering & Work Jargon',custom:'My Words'};
const CAT_COLORS = {essentials:'#74b9ff',food:'#fdcb6e',work:'#6c5ce7',shopping:'#a29bfe',healthcare:'#ff7675',housing:'#00b894',transit:'#0984e3',weather:'#81ecec',social:'#fab1a0',canadian:'#e17055',technology:'#00cec9',legal:'#636e72',finance:'#55efc4',geography:'#e056a0',engineering:'#2d98da',custom:'#fd79a8'};

if(!state.aiSuggestHistory) state.aiSuggestHistory = [];

function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)) }

// Word Spire integration: launch game with vocab data via Gist
async function launchWordSpire(){
  const token = state.settings.githubGistToken;
  if(!token){
    toast('Set your GitHub token in Settings first (needed for vocab sync)');
    return;
  }
  try{
    toast('Preparing Word Spire...');
    // Find the gist so we can pass the ID
    const headers = { 'Authorization': 'token ' + token };
    const listResp = await fetch('https://api.github.com/gists?per_page=100', { headers, cache: 'no-store' });
    if(!listResp.ok){ toast('GitHub API error: ' + listResp.status); return; }
    const gists = await listResp.json();
    const gist = gists.find(g => g.files && Object.keys(g.files).some(f => /^vocab-slot-\d\.json$/.test(f)));
    if(!gist){ toast('No vocab sync data found. Export to Gist first (Settings > Sync).'); return; }
    // Build Word Spire URL with params
    // TODO: update this URL when Word Spire is deployed to GitHub Pages
    const baseUrl = window.location.origin.includes('github.io')
      ? 'https://galiiigigi.github.io/word-spire/'
      : 'http://localhost:4321/';
    const url = baseUrl + '?token=' + encodeURIComponent(token) + '&gist=' + encodeURIComponent(gist.id) + '&slot=1';
    window.open(url, '_blank');
  }catch(e){
    console.error('Word Spire launch error:', e);
    toast('Failed to launch: ' + e.message);
  }
}

// ===== SPACED REPETITION (SM-2 + RT) =====
function getWordProgress(wordId){
  if(!state.wordProgress[wordId]) state.wordProgress[wordId] = {
    interval:0, easeFactor:2.5, nextReview:0, repetitions:0, lastQuality:null, lastRT:null
  };
  return state.wordProgress[wordId];
}

function getWordStatus(wordId){
  const wp = state.wordProgress[wordId];
  if(!wp || wp.repetitions===0) return 'new';
  const si = state.settings.srsIntervals || {familiarAt:7, masteredAt:21};
  if(wp.interval >= si.masteredAt) return 'mastered';
  if(wp.interval >= si.familiarAt) return 'familiar';
  if(wp.repetitions >= 3) return 'learning';
  return 'beginner';
}

// Reading speed by CEFR level (seconds per word)
function getReadingSpeed(){
  const vocab = (state.customWords||[]).length;
  if(vocab >= 3500) return 0.2;  // B2+
  if(vocab >= 2500) return 0.25; // B1-B2
  if(vocab >= 1500) return 0.3;  // A2-B1
  return 0.4;                     // A1-A2
}

// Estimate reading time for displayed text (question + choices)
function estimateReadingTime(textParts){
  const totalWords = textParts.filter(Boolean).join(' ').split(/\s+/).length;
  return totalWords * getReadingSpeed();
}

// Get adaptive thresholds from history, or defaults
function getAdaptiveThresholds(){
  const hist = state.rtHistory || [];
  if(hist.length < 30) return [3, 6, 12]; // generous defaults for new users
  const sorted = [...hist].sort((a,b)=>a-b);
  const p25 = sorted[Math.floor(sorted.length * 0.25)];
  const p50 = sorted[Math.floor(sorted.length * 0.50)];
  const p75 = sorted[Math.floor(sorted.length * 0.75)];
  return [Math.max(1, p25), Math.max(2, p50), Math.max(3, p75)];
}

// Record thinking time for adaptive calibration
function recordThinkingTime(thinkTime){
  if(!state.rtHistory) state.rtHistory = [];
  state.rtHistory.push(Math.round(thinkTime * 100) / 100);
  // Keep last 200 entries
  if(state.rtHistory.length > 200) state.rtHistory = state.rtHistory.slice(-200);
}

function rtToQuality(rt, correct, textParts){
  if(!correct) return 0;
  const readTime = textParts ? estimateReadingTime(textParts) : 0;
  const thinkTime = Math.max(0, rt - readTime);
  // Record for adaptive calibration (only correct answers)
  recordThinkingTime(thinkTime);
  const [t1,t2,t3] = getAdaptiveThresholds();
  if(thinkTime < t1) return 5;
  if(thinkTime < t2) return 4;
  if(thinkTime < t3) return 3;
  return 2;
}

function updateSRS(wordId, quality, rt){
  const wp = getWordProgress(wordId);
  const wasFirst = wp.repetitions === 0;
  wp.lastQuality = quality;
  wp.lastRT = rt;
  wp.lastReviewDate = todayKey();
  const ef = wp.easeFactor;
  let newEF = ef + (0.1 - (5 - quality) * (0.08 + (5 - quality) * 0.02));
  newEF = Math.max(1.3, newEF);
  wp.easeFactor = newEF;
  const si = state.settings.srsIntervals || {first:1, second:3};
  if(quality < 3){
    wp.repetitions = 0;
    wp.interval = si.first;
    wp.nextReview = Date.now() + 10 * 60 * 1000;
    saveState();
    return;
  } else {
    wp.repetitions++;
    if(wp.repetitions === 1) wp.interval = si.first;
    else if(wp.repetitions === 2) wp.interval = si.second;
    else wp.interval = Math.round(wp.interval * newEF);
  }
  const now = new Date();
  wp.nextReview = new Date(now.getFullYear(), now.getMonth(), now.getDate() + wp.interval).getTime();
  // XP: award based on quality and whether it was a due review
  if(quality >= 3){
    const isDueReview = !wasFirst && wp.nextReview <= Date.now();
    awardXP('review', wordId, isDueReview ? 10 : 15);
  }
  checkMilestoneXP(wordId);
  saveState();
}


function getDueWords(){
  const now = Date.now();
  return WORDS.filter(w => {
    const wp = state.wordProgress[w.id];
    return wp && wp.nextReview > 0 && wp.nextReview <= now;
  });
}

function getNewWords(){
  return WORDS.filter(w => (!state.wordProgress[w.id] || state.wordProgress[w.id].repetitions === 0));
}

function getSessionWords(count){
  const due = getDueWords().sort((a,b) => getWordProgress(a.id).nextReview - getWordProgress(b.id).nextReview);
  const newW = getNewWords();
  const result = [];
  const maxNew = state.settings.dailyNew;
  let newCount = 0;
  // Fill with due words first
  for(const w of due){ if(result.length >= count) break; result.push(w); }
  // Fill remaining with new words
  for(const w of newW){ if(result.length >= count || newCount >= maxNew) break; result.push(w); newCount++; }
  // If still not enough, add filler — but exclude words reviewed correctly today
  if(result.length < count){
    const ids = new Set(result.map(w=>w.id));
    const today = todayKey();
    const notReviewedToday = [];
    for(const w of WORDS){
      if(ids.has(w.id)) continue;
      const wp = state.wordProgress[w.id];
      if(!wp || wp.nextReview === 0) continue;
      if(wp.lastReviewDate === today && wp.lastQuality >= 3) continue;
      notReviewedToday.push(w);
    }
    shuffle(notReviewedToday);
    for(const w of notReviewedToday){ if(result.length >= count) break; result.push(w); }
  }
  shuffle(result);
  return result;
}

// ===== DAILY TRACKING =====
function todayKey(){ return new Date().toISOString().slice(0,10) }
function recordActivity(correct){
  const key = todayKey();
  if(!state.dailyActivity[key]) state.dailyActivity[key] = {reviewed:0, correct:0};
  state.dailyActivity[key].reviewed++;
  if(correct) state.dailyActivity[key].correct++;
  // Streak
  const today = todayKey();
  if(state.lastActiveDate !== today){
    const yesterday = new Date(); yesterday.setDate(yesterday.getDate()-1);
    const yKey = yesterday.toISOString().slice(0,10);
    state.streak = (state.lastActiveDate === yKey) ? state.streak + 1 : 1;
    state.lastActiveDate = today;
  }
  saveState();
}

// ===== XP & CEFR LEVEL SYSTEM =====
const CEFR_LEVELS = [
  { level:'A1', label:'Beginner',       xp:0,     vocab:0,    ielts:'3.0', color:'#b2bec3' },
  { level:'A2', label:'Elementary',      xp:3000,  vocab:500,  ielts:'4.0', color:'#e17055' },
  { level:'B1', label:'Intermediate',    xp:10000, vocab:1500, ielts:'5.0', color:'#fdcb6e' },
  { level:'B2', label:'Upper-Inter',     xp:25000, vocab:2500, ielts:'6.5', color:'#0984e3' },
  { level:'C1', label:'Advanced',        xp:50000, vocab:4000, ielts:'7.5', color:'#00b894' },
  { level:'C2', label:'Mastery',         xp:100000,vocab:5000, ielts:'8.5', color:'#a29bfe' },
];

function getCEFRLevel(){
  const xp = state.xp.total;
  let current = CEFR_LEVELS[0];
  for(let i = CEFR_LEVELS.length - 1; i >= 0; i--){
    if(xp >= CEFR_LEVELS[i].xp){ current = CEFR_LEVELS[i]; break; }
  }
  return current;
}

function getNextCEFRLevel(){
  const xp = state.xp.total;
  for(const lv of CEFR_LEVELS){
    if(xp < lv.xp) return lv;
  }
  return null; // already at max
}

function getCEFRProgress(){
  const current = getCEFRLevel();
  const next = getNextCEFRLevel();
  if(!next) return { current, next:null, pct:100, xpNeeded:0 };
  const rangeXP = next.xp - current.xp;
  const progressXP = state.xp.total - current.xp;
  return { current, next, pct:Math.min(100, Math.round(progressXP / rangeXP * 100)), xpNeeded:next.xp - state.xp.total };
}

// Skill-level CEFR estimates
function getSkillLevels(){
  const mastered = WORDS.filter(w => getWordStatus(w.id)==='mastered').length;
  const familiar = WORDS.filter(w => getWordStatus(w.id)==='familiar').length;
  const vocabScore = mastered + familiar * 0.5;

  const acc = state.totalAnswered > 0 ? state.totalCorrect / state.totalAnswered : 0;
  const todayData = state.dailyActivity[todayKey()] || {reviewed:0,correct:0};
  const todayAcc = todayData.reviewed > 0 ? todayData.correct / todayData.reviewed : 0;

  function vocabToCEFR(v){ return v >= 5000?'C2': v >= 4000?'C1': v >= 2500?'B2': v >= 1500?'B1': v >= 500?'A2':'A1'; }
  function accToCEFR(a){ return a >= 0.92?'C2': a >= 0.88?'C1': a >= 0.82?'B2': a >= 0.75?'B1': a >= 0.60?'A2':'A1'; }

  return {
    vocab: vocabToCEFR(vocabScore),
    speaking: accToCEFR(acc * 0.9), // approximation from quiz/drill accuracy
    listening: accToCEFR(acc * 0.95),
    drills: accToCEFR(acc)
  };
}

// XP reward system — rewards NEW achievements, not repetition
function awardXP(source, wordId, amount){
  if(!state.xp) state.xp = { total:0, wordXP:{}, dailyXP:{} };
  const today = todayKey();
  if(!state.xp.dailyXP[today]) state.xp.dailyXP[today] = 0;

  // Word-level tracking: each word+source combo has diminishing returns
  if(wordId){
    const key = wordId + ':' + source;
    if(!state.xp.wordXP[key]) state.xp.wordXP[key] = 0;
    const prev = state.xp.wordXP[key];
    // Diminishing: 1st=100%, 2nd=50%, 3rd=25%, 4th+=0%
    let multiplier = 1;
    if(prev >= 3) multiplier = 0;
    else if(prev >= 2) multiplier = 0.25;
    else if(prev >= 1) multiplier = 0.5;
    const actual = Math.round(amount * multiplier);
    if(actual > 0){
      state.xp.total += actual;
      state.xp.dailyXP[today] += actual;
      state.xp.wordXP[key] = prev + 1;
    }
  } else {
    // Non-word XP (milestones, combos)
    state.xp.total += amount;
    state.xp.dailyXP[today] += amount;
  }
  // Clean up old daily entries (keep 90 days)
  const keys = Object.keys(state.xp.dailyXP).sort();
  if(keys.length > 90){
    keys.slice(0, keys.length - 90).forEach(k => delete state.xp.dailyXP[k]);
  }
  saveState();
}

// Check and award milestone XP when word status changes
function checkMilestoneXP(wordId){
  const status = getWordStatus(wordId);
  if(status === 'familiar'){
    awardXP('milestone-familiar', wordId, 20);
  } else if(status === 'mastered'){
    awardXP('milestone-mastered', wordId, 30);
  }
}

// ===== UTILS =====
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]} return arr }

function getDistractors(word, count=3){
  const sameCat = WORDS.filter(w => w.category === word.category && w.id !== word.id);
  const sameDiff = WORDS.filter(w => w.difficulty === word.difficulty && w.id !== word.id && w.category !== word.category);
  const pool = [...sameCat, ...sameDiff];
  const unique = [...new Map(pool.map(w=>[w.id,w])).values()];
  shuffle(unique);
  const result = unique.slice(0, count);
  // Fill if not enough
  while(result.length < count){
    const r = WORDS[Math.floor(Math.random()*WORDS.length)];
    if(r.id !== word.id && !result.find(w=>w.id===r.id)) result.push(r);
  }
  return result;
}

// ===== CLEAN DEFINITION (strip word from AI-generated definitions) =====
function cleanDefinition(word, def){
  if(!def || !word) return def || '';
  const w = word.trim();
  const esc = escapeRegex(w);
  let d = def.trim();
  // Match the word optionally wrapped in quotes/apostrophes, with optional article
  // e.g. "Prior means ...", "'Prior' means ...", "A potluck is ...", ""word" is ..."
  const wordPat = `(?:a |an |the )?(?:['"\u2018\u2019\u201C\u201D])?${esc}(?:['"\u2018\u2019\u201C\u201D])?`;
  const verbPat = '(?:is |are |was |were |means |refers to |describes |denotes |indicates )';
  const patterns = [
    new RegExp(`^${wordPat}\\s*${verbPat}\\s*`,'i'),
    new RegExp(`^${wordPat}\\s*(?:—|–|:|-)\\s*`,'i'),
    new RegExp(`^${wordPat}\\s*[,:]\\s*`,'i'),
  ];
  for(const p of patterns){
    const cleaned = d.replace(p, '');
    if(cleaned !== d && cleaned.length > 5){
      d = cleaned.charAt(0).toUpperCase() + cleaned.slice(1);
      break;
    }
  }
  return d;
}
function escapeRegex(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

// Build a word pool string for AI prompts (prefer learning/familiar words)
function getVocabPoolForPrompt(excludeWord, maxCount){
  maxCount = maxCount || 60;
  const exclude = (excludeWord||'').toLowerCase();
  const ranked = WORDS.filter(w => w.word.toLowerCase() !== exclude).map(w => {
    const s = getWordStatus(w.id);
    const rank = s==='learning'?0 : s==='beginner'?1 : s==='familiar'?2 : s==='new'?3 : 4;
    return {word:w.word, rank};
  }).sort((a,b)=>a.rank-b.rank);
  return ranked.slice(0,maxCount).map(w=>w.word).join(', ');
}

// ===== TTS =====
function sanitizeTTS(text){
  if(!text) return '';
  return text
    .replace(/&#\d+;/g, '')        // remove HTML numeric entities like &#128264;
    .replace(/&[a-z]+;/g, ' ')     // remove HTML named entities like &amp;
    .replace(/<[^>]*>/g, '')        // remove HTML tags
    .replace(/[\x60*#_~\[\]]/g, '') // remove markdown chars
    .replace(/\s+/g, ' ')          // collapse whitespace
    .trim();
}

let ttsAbort = null;

function speak(text, rate){
  const clean = sanitizeTTS(text);
  if(!clean) return;
  // Abort any in-flight Google TTS request
  if(ttsAbort){ ttsAbort.abort(); ttsAbort = null; }
  if(state.settings.ttsProvider === 'google' && state.settings.googleTtsKey){
    googleSpeak(clean, rate); return;
  }
  browserSpeak(clean, rate);
}
function getEnglishVoices(){
  if(!('speechSynthesis' in window)) return [];
  return window.speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));
}

function browserSpeak(text, rate){
  if(!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-CA';
  utter.rate = rate || state.settings.voiceSpeed || 0.9;
  const voices = window.speechSynthesis.getVoices();
  // Use saved voice preference if set
  const pref = state.settings.browserVoice;
  let voice = null;
  if(pref) voice = voices.find(v=>v.name===pref);
  if(!voice) voice = voices.find(v=>v.lang==='en-CA') || voices.find(v=>v.lang.startsWith('en-'));
  if(voice) utter.voice = voice;
  window.speechSynthesis.speak(utter);
}
let googleAudio = null;
async function googleSpeak(text, rate, isTest){
  if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  const key = state.settings.googleTtsKey;
  if(!key){ if(!isTest) browserSpeak(text, rate); else toast('No Google TTS API key'); return; }
  // Sanitize and cap length
  let cleanText = text;
  if(!cleanText || cleanText.length < 1){ if(!isTest) return; else { toast('Empty text'); return; } }
  if(cleanText.length > 4000) cleanText = cleanText.substring(0, 4000);
  const curMonth = new Date().toISOString().slice(0,7);
  if(state.ttsUsage.month !== curMonth){ state.ttsUsage = {month:curMonth, count:0, chars:0}; }
  const limit = state.settings.ttsMonthlyLimit || 900000;
  if(state.ttsUsage.chars >= limit){
    if(isTest) toast('Monthly character limit reached ('+Math.round(state.ttsUsage.chars/1000)+'K/'+Math.round(limit/1000)+'K). Using browser TTS.');
    else browserSpeak(text, rate);
    return;
  }
  try{
    const speed = rate || state.settings.voiceSpeed || 0.9;
    const voice = state.settings.googleTtsVoice || 'en-CA-Neural2-D';
    const langCode = voice.substring(0, 5);
    // Use AbortController to cancel previous in-flight requests
    const controller = new AbortController();
    ttsAbort = controller;
    const resp = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${encodeURIComponent(key)}`,{
      method:'POST', headers:{'Content-Type':'application/json'},
      signal: controller.signal,
      body:JSON.stringify({
        input:{text:cleanText},
        voice:{languageCode:langCode, name:voice},
        audioConfig:{audioEncoding:'MP3', speakingRate:speed}
      })
    });
    ttsAbort = null;
    if(!resp.ok){
      const errBody = await resp.text().catch(()=>'');
      let errMsg = 'HTTP ' + resp.status;
      try{ const errJson = JSON.parse(errBody); errMsg = errJson.error?.message || errMsg; }catch(e){}
      console.error('Google TTS error:', errMsg, errBody);
      if(isTest) toast('Error: ' + errMsg);
      else browserSpeak(text, rate);
      return;
    }
    const data = await resp.json();
    state.ttsUsage.count++;
    state.ttsUsage.chars += cleanText.length;
    saveState();
    if(data.audioContent){
      googleAudio = new Audio('data:audio/mp3;base64,' + data.audioContent);
      googleAudio.play();
      if(isTest) toast('Google TTS working! ('+Math.round(state.ttsUsage.chars/1000)+'K/'+Math.round(limit/1000)+'K chars)');
    }
  }catch(e){
    ttsAbort = null;
    if(e.name === 'AbortError') return; // cancelled by new request, not an error
    console.error('Google TTS failed:', e);
    if(isTest) toast('Failed: ' + (e.message || 'Network error'));
    else browserSpeak(text, rate);
  }
}

const SILENT_MP3 = 'data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4Ljc2LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAWGluZwAAAA8AAAACAAABhgC7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7u7//////////////////////////////////////////////////////////////////8AAAAATGF2YzU4LjEzAAAAAAAAAAAAAAAAJAAAAAAAAAAAAYYoRwBHAAAAAAD/+1DEAAAHAAGf9AAAIgAAM/8AAABMQU1FMy4xMDBVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVTEFNRTMuMTAwVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVf/7UMQfA8AAAaQAAAAAAAA0gAAABFVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVVQ==';
let bgKeepAlive = null;
let bgPlaybackMode = null; // 'autoplay' | 'brainsoak' | null

function enableBackgroundPlayback(mode, wordText, detail){
  bgPlaybackMode = mode;
  // Start silent audio loop to keep audio session alive
  if(!bgKeepAlive){
    bgKeepAlive = new Audio(SILENT_MP3);
    bgKeepAlive.loop = true;
    bgKeepAlive.volume = 0.01; // near-silent
    bgKeepAlive.play().catch(()=>{});
  }
  updateMediaSession(wordText, detail);
}

function disableBackgroundPlayback(){
  bgPlaybackMode = null;
  if(bgKeepAlive){ bgKeepAlive.pause(); bgKeepAlive = null; }
  if('mediaSession' in navigator){
    navigator.mediaSession.metadata = null;
    navigator.mediaSession.playbackState = 'none';
    // Remove handlers
    ['play','pause','nexttrack','previoustrack'].forEach(a => {
      try{ navigator.mediaSession.setActionHandler(a, null); }catch(e){}
    });
  }
}

function updateMediaSession(title, detail){
  if(!('mediaSession' in navigator)) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title: title || 'Vocab Trainer',
    artist: detail || 'Background Playback',
    album: bgPlaybackMode === 'brainsoak' ? 'Brain Soak' : 'Auto-Play'
  });
  navigator.mediaSession.playbackState = 'playing';
  // Action handlers
  const isBS = bgPlaybackMode === 'brainsoak';
  navigator.mediaSession.setActionHandler('play', () => {
    if(isBS) toggleBrainSoakPause();
    else toggleAutoPlayPause();
  });
  navigator.mediaSession.setActionHandler('pause', () => {
    if(isBS) toggleBrainSoakPause();
    else toggleAutoPlayPause();
  });
  navigator.mediaSession.setActionHandler('nexttrack', () => {
    if(isBS) brainSoakSkip(1);
    else autoPlaySkip(1);
  });
  navigator.mediaSession.setActionHandler('previoustrack', () => {
    if(isBS) brainSoakSkip(-1);
    else autoPlaySkip(-1);
  });
}

function updateMediaSessionPaused(paused){
  if('mediaSession' in navigator){
    navigator.mediaSession.playbackState = paused ? 'paused' : 'playing';
  }
}

function goTo(screen){

  if(currentScreen === 'words' && screen !== 'words' && autoPlayState) stopAutoPlay();
  // Stop brain soak when leaving ear training
  if(currentScreen === 'ear' && screen !== 'ear' && earState && earState.mode === 'brainsoak') stopBrainSoak();
  currentScreen = screen;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('screen-'+screen);
  if(el) el.classList.add('active');
  // Highlight nav
  const navBtns = document.querySelectorAll('.nav-btn');
  const map = {home:0,output:1,input:2,words:3,settings:4};
  // Sub-screens highlight their parent tab
  const parentMap = {chat:1,voice:1,ear:1,quiz:3,cards:3,addwords:3,pretest:3};
  const navIdx = map[screen] !== undefined ? map[screen] : parentMap[screen];
  if(navIdx !== undefined && navBtns[navIdx]) navBtns[navIdx].classList.add('active');
  renderScreen(screen);
}

// ===== DAILY WORD =====
function getDailyWord(){
  if(!WORDS.length) return null;
  const due = getDueWords();
  if(due.length) return due[Math.floor(Math.random()*due.length)];
  const weak = WORDS.filter(w => {const s=getWordStatus(w.id); return s==='beginner'||s==='learning';});
  if(weak.length) return weak[Math.floor(Math.random()*weak.length)];
  return WORDS[Math.floor(Math.random()*WORDS.length)];
}

// ===== QUIZ =====
function startQuiz(){
  const words = getSessionWords(state.settings.quizLength);
  quiz = { words, current:0, score:0, totalRT:0, results:{}, startTime:null, answered:false };
  goTo('quiz');
  renderQuizQuestion();
}

function renderQuizStart(el){
  if(audioQuiz){ renderAudioQuizQuestion(); return; }
  if(!quiz){ el.innerHTML = `<div class="text-center" style="padding-top:40px">
    <h2>Multiple Choice Quiz</h2><p class="subtitle">Test your vocabulary with timed questions</p>
    <button class="btn mb" onclick="startQuiz()">Start Quiz</button>
    <button class="btn btn-ghost" onclick="startAudioQuiz()" style="border:1px solid var(--accent2);color:var(--accent2)">&#127911; Audio-Only Quiz</button></div>`; return; }
  renderQuizQuestion();
}

function renderQuizQuestion(){
  const el = document.getElementById('screen-quiz');
  if(quiz.current >= quiz.words.length){ renderQuizSummary(el); return; }
  if(quiz.results[quiz.current]){ renderQuizReview(); return; }
  const word = quiz.words[quiz.current];
  const distractors = getDistractors(word);
  // Randomly choose direction
  const showWord = Math.random() > 0.5;
  let choices;
  if(showWord){
    choices = shuffle([word, ...distractors]).map(w => ({id:w.id, text:w.definition, correct:w.id===word.id}));
  } else {
    choices = shuffle([word, ...distractors]).map(w => ({id:w.id, text:w.word, correct:w.id===word.id}));
  }
  quiz.answered = false;
  quiz.startTime = performance.now();
  quiz.currentWord = word;
  quiz.choices = choices;
  quiz.showWord = showWord;

  el.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(quiz.current/quiz.words.length)*100}%"></div></div>
    <div class="learn-nav">
      <button onclick="prevQuizQuestion()" ${quiz.current===0?'disabled':''}>&#8592; Previous</button>
      <button onclick="endSessionEarly('quiz')" style="color:var(--red)">&#10005; End</button>
      <button id="quiz-skip-btn" onclick="skipQuizQuestion()">Skip &#8594;</button>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:8px">
      <span>${quiz.current+1} / ${quiz.words.length}</span>
      <span>Score: ${quiz.score}</span>
    </div>
    <div class="card">
      <div style="font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">${showWord ? 'What does this word mean?' : 'Which word matches this definition?'}</div>
      <div class="quiz-question">${showWord ? word.word : '"'+word.definition+'"'}</div>
    </div>
    <div class="quiz-choices" id="quiz-choices">
      ${choices.map((c,i) => `<button class="quiz-choice" onclick="answerQuiz(${i})">${c.text}</button>`).join('')}
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
    <div class="btn-row mt" id="quiz-skip-row" style="gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="skipQuizQuestion()" style="font-size:12px">&#8594; Later</button>
      <button class="btn btn-ghost btn-sm" onclick="dontKnowQuiz()" style="font-size:12px;color:var(--red)">&#10067; Don't Know</button>
      <button class="btn btn-ghost btn-sm" onclick="markKnownQuiz()" style="font-size:12px;color:var(--green)">&#10003; Know</button>
    </div>
    <div id="quiz-feedback"></div>`;
  startTimer();
  if(state.settings.autoPlayAudio) speak(showWord ? word.word : word.definition);
}

let timerInterval = null;
function startTimer(){
  clearInterval(timerInterval);
  const start = performance.now();
  const maxTime = 10000;
  timerInterval = setInterval(() => {
    const activeQuiz = quiz || audioQuiz;
    if(!activeQuiz || activeQuiz.answered){ clearInterval(timerInterval); return; }
    const elapsed = performance.now() - start;
    const pct = Math.max(0, 100 - (elapsed/maxTime)*100);
    const fill = document.getElementById('timer-fill');
    if(fill){
      fill.style.width = pct+'%';
      if(pct < 30) fill.style.background = 'var(--red)';
      else if(pct < 60) fill.style.background = 'var(--orange)';
    }
  }, 100);
}

function answerQuiz(choiceIdx){
  if(quiz.answered) return;
  quiz.answered = true;
  clearInterval(timerInterval);
  const rt = (performance.now() - quiz.startTime) / 1000;
  const choice = quiz.choices[choiceIdx];
  const correct = choice.correct;
  const word = quiz.currentWord;
  // Pass question + all choice texts for reading time estimation
  const textParts = [quiz.showWord ? word.word : word.definition, ...quiz.choices.map(c=>c.text)];
  const quality = rtToQuality(rt, correct, textParts);

  // Update SRS
  updateSRS(word.id, quality, rt);
  recordActivity(correct);
  state.totalAnswered++;
  if(correct) { state.totalCorrect++; }
  quiz.totalRT += rt;
  quiz.results[quiz.current] = {word, correct, quality, rt};
  quiz.score = Object.values(quiz.results).filter(r=>r.correct).length;
  state.totalQuizzes = Math.ceil(state.totalAnswered / state.settings.quizLength);
  saveState();

  // Visual feedback
  const btns = document.querySelectorAll('.quiz-choice');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if(quiz.choices[i].correct) btn.classList.add('correct-reveal','correct');
    if(i === choiceIdx && !correct) btn.classList.add('wrong');
  });
  const skipBtn = document.getElementById('quiz-skip-btn');
  if(skipBtn) skipBtn.disabled = true;
  const skipRow = document.getElementById('quiz-skip-row');
  if(skipRow) skipRow.style.display = 'none';

  const fb = document.getElementById('quiz-feedback');
  fb.innerHTML = `<div class="card card-sm mt">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-weight:700;color:${correct?'var(--green)':'var(--red)'}">${correct?'Correct!':'Wrong!'}</span>
      <span class="rt-badge ${qualityClass(quality)}">${rt.toFixed(1)}s - ${qualityLabel(quality)}</span>
    </div>
    <div style="font-size:13px;color:var(--text2)"><strong>${word.word}</strong>${word.grammar?' <span class="pos-badge">'+word.grammar.pos+'</span>':''}${word.phonetic?' <span style="color:var(--accent2)">/${word.phonetic}/</span>':''} <button class="speak-btn" onclick="speak('${word.word.replace(/'/g,"\\'")}')">&#128264;</button>: ${word.definition}</div>
    ${word.grammar&&word.grammar.usage?`<div style="font-size:11px;color:var(--orange);margin-top:3px">&#9888; ${word.grammar.usage}</div>`:''}
    <div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:4px">"${word.example}" <button class="speak-btn" style="font-size:14px" onclick="speakSlow(\`${word.example.replace(/`/g,'')}\`)">&#128264;</button></div>
    ${!correct && state.settings.apiKey ? `<button class="btn btn-ghost btn-sm mt" onclick="aiQuizExplain(${word.id},${choice.id})" style="font-size:12px">&#10022; Why was I wrong?</button><div id="ai-quiz-explain" class="mt"></div>` : ''}
  </div>
  <button class="btn mt" onclick="nextQuizQuestion()">Next &#8594;</button>`;
  speak(word.word);
}

function nextQuizQuestion(){
  quiz.current++;
  renderQuizQuestion();
}

function skipQuizQuestion(){
  if(quiz.answered) return;
  quiz.answered = true;
  clearInterval(timerInterval);
  const word = quiz.words[quiz.current];
  quiz.results[quiz.current] = {word, correct:false, quality:0, rt:0, skipped:true};
  quiz.score = Object.values(quiz.results).filter(r=>r.correct).length;
  quiz.current++;
  renderQuizQuestion();
}

function dontKnowQuiz(){
  if(!quiz || quiz.answered) return;
  quiz.answered = true;
  clearInterval(timerInterval);
  const word = quiz.currentWord;

  // Record as wrong, quality 0, long RT penalty
  updateSRS(word.id, 0, 10);
  recordActivity(false);
  state.totalAnswered++;
  quiz.results[quiz.current] = {word, correct:false, quality:0, rt:0, dontKnow:true};
  quiz.score = Object.values(quiz.results).filter(r=>r.correct).length;
  state.totalQuizzes = Math.ceil(state.totalAnswered / state.settings.quizLength);
  saveState();

  // Reveal correct answer
  const btns = document.querySelectorAll('.quiz-choice');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if(quiz.choices[i].correct) btn.classList.add('correct-reveal','correct');
  });
  const skipRow = document.getElementById('quiz-skip-row');
  if(skipRow) skipRow.style.display = 'none';

  const fb = document.getElementById('quiz-feedback');
  fb.innerHTML = `<div class="card card-sm mt">
    <div style="margin-bottom:6px"><span style="font-weight:700;color:var(--orange)">Don't Know</span></div>
    <div style="font-size:13px;color:var(--text2)"><strong>${word.word}</strong>${word.grammar?' <span class="pos-badge">'+word.grammar.pos+'</span>':''}${word.phonetic?' <span style="color:var(--accent2)">/${word.phonetic}/</span>':''} <button class="speak-btn" onclick="speak('${word.word.replace(/'/g,"\\'")}')">&#128264;</button>: ${word.definition}</div>
    ${word.grammar&&word.grammar.usage?`<div style="font-size:11px;color:var(--orange);margin-top:3px">&#9888; ${word.grammar.usage}</div>`:''}
    <div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:4px">"${word.example}" <button class="speak-btn" style="font-size:14px" onclick="speakSlow(\`${word.example.replace(/\`/g,'')}\`)">&#128264;</button></div>
  </div>
  <button class="btn mt" onclick="nextQuizQuestion()">Next &#8594;</button>`;
  speak(word.word);
}

function prevQuizQuestion(){
  if(!quiz || quiz.current <= 0) return;
  quiz.current--;
  renderQuizQuestion();
}

function renderQuizReview(){
  const el = document.getElementById('screen-quiz');
  const r = quiz.results[quiz.current];
  const word = r.word;
  const totalAnswered = Object.keys(quiz.results).length;
  el.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(totalAnswered/quiz.words.length)*100}%"></div></div>
    <div class="learn-nav">
      <button onclick="prevQuizQuestion()" ${quiz.current===0?'disabled':''}>&#8592; Previous</button>
      <button onclick="quiz.current++;renderQuizQuestion()">Next &#8594;</button>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:8px">
      <span>${quiz.current+1} / ${quiz.words.length} (Review)</span>
      <span>Score: ${quiz.score}</span>
    </div>
    <div class="card text-center">
      <div style="font-size:18px;font-weight:700;color:${r.known?'var(--green)':r.dontKnow?'var(--orange)':r.skipped?'var(--text3)':r.correct?'var(--green)':'var(--red)'}">
        ${r.known ? 'Already Known' : r.dontKnow ? "Didn't Know" : r.skipped ? 'Skipped' : (r.correct ? 'Correct!' : 'Wrong!')}
      </div>
      <h2 style="margin-top:8px">${word.word} <button class="speak-btn" onclick="speak('${word.word.replace(/'/g,"\\'")}')">&#128264;</button></h2>
      ${word.phonetic ? `<div style="font-size:13px;color:var(--accent2);margin-top:2px">/${word.phonetic}/</div>` : ''}
      <div style="font-size:15px;color:var(--text2);margin-top:8px">${word.definition}</div>
      <div style="font-style:italic;color:var(--text3);font-size:13px;margin-top:8px">"${word.example}"</div>
      ${!r.skipped ? `<div class="mt"><span class="rt-badge ${qualityClass(r.quality)}">${r.rt.toFixed(1)}s - ${qualityLabel(r.quality)}</span></div>` : ''}
    </div>
    <button class="btn mt" onclick="quiz.current++;renderQuizQuestion()">Continue &#8594;</button>`;
}

function renderQuizSummary(el){
  const results = Object.values(quiz.results);
  const answered = results.filter(r=>!r.skipped);
  const pct = Math.round(quiz.score / quiz.words.length * 100);
  const avgRT = answered.length > 0 ? (quiz.totalRT / answered.length).toFixed(1) : '0.0';
  const emoji = pct >= 90 ? '&#127942;' : pct >= 70 ? '&#11088;' : pct >= 50 ? '&#128170;' : '&#128218;';
  el.innerHTML = `
    <div class="text-center"><div style="font-size:48px">${emoji}</div>
    <h2>Quiz Complete!</h2></div>
    <div class="summary-score" style="color:${pct>=70?'var(--green)':'var(--orange)'}">${pct}%</div>
    <div class="summary-detail">
      <div class="summary-item"><div class="num">${quiz.score}/${quiz.words.length}</div><div class="label">Correct</div></div>
      <div class="summary-item"><div class="num">${avgRT}s</div><div class="label">Avg Time</div></div>
      <div class="summary-item"><div class="num">${results.filter(r=>r.quality>=4).length}</div><div class="label">Fast</div></div>
    </div>
    <div class="card mt">
      ${results.map(r => `<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px">
        <span style="color:${r.known?'var(--green)':r.dontKnow?'var(--orange)':r.skipped?'var(--text3)':r.correct?'var(--green)':'var(--red)'}">&#${r.known?'10003':r.dontKnow?'10067':r.skipped?'10148':r.correct?'10004':'10008'}; ${r.word.word}${r.known?' (known)':r.dontKnow?" (don't know)":r.skipped?' (skipped)':''}</span>
        <span class="rt-badge ${r.known||r.skipped||r.dontKnow?'':qualityClass(r.quality)}" style="font-size:11px">${r.known?'known':r.dontKnow?'--':r.skipped?'--':r.rt.toFixed(1)+'s'}</span>
      </div>`).join('')}
    </div>
    <button class="btn mt" onclick="startQuiz()">Try Again</button>
    <button class="btn btn-ghost mt" onclick="goTo('home')">Home</button>`;
  quiz = null;
}

// ===== AUDIO-ONLY QUIZ =====
let audioQuiz = null;

function startAudioQuiz(){
  const words = getSessionWords(state.settings.quizLength);
  if(words.length < 2){ toast('Not enough words for audio quiz'); return; }
  audioQuiz = { words, current:0, score:0, totalRT:0, results:{}, startTime:null, answered:false };
  goTo('quiz');
  renderAudioQuizQuestion();
}

function renderAudioQuizQuestion(){
  const el = document.getElementById('screen-quiz');
  if(audioQuiz.current >= audioQuiz.words.length){ renderAudioQuizSummary(el); return; }
  if(audioQuiz.results[audioQuiz.current]){ renderAudioQuizReview(); return; }
  const word = audioQuiz.words[audioQuiz.current];
  const distractors = getDistractors(word);
  // Randomly: hear word → pick definition, or hear definition → pick word
  const hearWord = Math.random() > 0.5;
  let choices;
  if(hearWord){
    choices = shuffle([word, ...distractors]).map(w => ({id:w.id, text:w.definition, correct:w.id===word.id}));
  } else {
    choices = shuffle([word, ...distractors]).map(w => ({id:w.id, text:w.word, correct:w.id===word.id}));
  }
  audioQuiz.answered = false;
  audioQuiz.startTime = performance.now();
  audioQuiz.currentWord = word;
  audioQuiz.choices = choices;
  audioQuiz.hearWord = hearWord;

  el.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(audioQuiz.current/audioQuiz.words.length)*100}%"></div></div>
    <div class="learn-nav">
      <button onclick="prevAudioQuizQ()" ${audioQuiz.current===0?'disabled':''}>&#8592; Previous</button>
      <button onclick="endAudioQuizEarly()" style="color:var(--red)">&#10005; End</button>
      <button id="aq-skip-btn" onclick="skipAudioQuizQ()">Skip &#8594;</button>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:8px">
      <span>${audioQuiz.current+1} / ${audioQuiz.words.length}</span>
      <span>Score: ${audioQuiz.score}</span>
    </div>
    <div class="card text-center">
      <div style="font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">&#127911; ${hearWord ? 'Listen to the word. Pick the correct meaning.' : 'Listen to the definition. Pick the correct word.'}</div>
      <button class="btn btn-ghost" onclick="speak('${(hearWord ? word.word : word.definition).replace(/'/g,"\\'")}')" style="font-size:32px;width:80px;height:80px;border-radius:50%;margin:8px auto">&#128264;</button>
      <div style="margin-top:4px">
        <button class="btn btn-ghost btn-sm" onclick="speakSlow('${(hearWord ? word.word : word.definition).replace(/'/g,"\\'")}')" style="font-size:11px">&#128034; Slow</button>
      </div>
    </div>
    <div class="quiz-choices" id="aq-choices">
      ${choices.map((c,i) => `<button class="quiz-choice" onclick="answerAudioQuiz(${i})">${c.text}</button>`).join('')}
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
    <div class="btn-row mt" id="aq-skip-row" style="gap:6px">
      <button class="btn btn-ghost btn-sm" onclick="skipAudioQuizQ()" style="font-size:12px">&#8594; Later</button>
      <button class="btn btn-ghost btn-sm" onclick="dontKnowAudioQuiz()" style="font-size:12px;color:var(--red)">&#10067; Don't Know</button>
    </div>
    <div id="aq-feedback"></div>`;
  startTimer();
  setTimeout(()=>speak(hearWord ? word.word : word.definition), 200);
}

function answerAudioQuiz(choiceIdx){
  if(audioQuiz.answered) return;
  audioQuiz.answered = true;
  clearInterval(timerInterval);
  const rt = (performance.now() - audioQuiz.startTime) / 1000;
  const choice = audioQuiz.choices[choiceIdx];
  const correct = choice.correct;
  const word = audioQuiz.currentWord;
  // Audio quiz: question is heard, only choices need reading
  const textParts = audioQuiz.choices.map(c=>c.text);
  const quality = rtToQuality(rt, correct, textParts);
  updateSRS(word.id, quality, rt);
  recordActivity(correct);
  state.totalAnswered++;
  if(correct) state.totalCorrect++;
  audioQuiz.totalRT += rt;
  audioQuiz.results[audioQuiz.current] = {word, correct, quality, rt};
  audioQuiz.score = Object.values(audioQuiz.results).filter(r=>r.correct).length;
  state.totalQuizzes = Math.ceil(state.totalAnswered / state.settings.quizLength);
  saveState();

  const btns = document.querySelectorAll('.quiz-choice');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if(audioQuiz.choices[i].correct) btn.classList.add('correct-reveal','correct');
    if(i === choiceIdx && !correct) btn.classList.add('wrong');
  });
  const skipRow = document.getElementById('aq-skip-row');
  if(skipRow) skipRow.style.display = 'none';

  const fb = document.getElementById('aq-feedback');
  fb.innerHTML = `<div class="card card-sm mt">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span style="font-weight:700;color:${correct?'var(--green)':'var(--red)'}">${correct?'Correct!':'Wrong!'}</span>
      <span class="rt-badge ${qualityClass(quality)}">${rt.toFixed(1)}s - ${qualityLabel(quality)}</span>
    </div>
    <div style="font-size:13px;color:var(--text2)"><strong>${word.word}</strong>${word.phonetic?' <span style="color:var(--accent2)">/${word.phonetic}/</span>':''} <button class="speak-btn" onclick="speak('${word.word.replace(/'/g,"\\'")}')">&#128264;</button>: ${word.definition}</div>
    <div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:4px">"${word.example}" <button class="speak-btn" style="font-size:14px" onclick="speakSlow(\`${word.example?word.example.replace(/`/g,''):''}\`)">&#128264;</button></div>
  </div>
  <button class="btn mt" onclick="nextAudioQuizQ()">Next &#8594;</button>`;
  speak(word.word);
}

function dontKnowAudioQuiz(){
  if(!audioQuiz || audioQuiz.answered) return;
  audioQuiz.answered = true;
  clearInterval(timerInterval);
  const word = audioQuiz.currentWord;
  updateSRS(word.id, 0, 10);
  recordActivity(false);
  state.totalAnswered++;
  audioQuiz.results[audioQuiz.current] = {word, correct:false, quality:0, rt:0, dontKnow:true};
  audioQuiz.score = Object.values(audioQuiz.results).filter(r=>r.correct).length;
  state.totalQuizzes = Math.ceil(state.totalAnswered / state.settings.quizLength);
  saveState();

  const btns = document.querySelectorAll('.quiz-choice');
  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if(audioQuiz.choices[i].correct) btn.classList.add('correct-reveal','correct');
  });
  const skipRow = document.getElementById('aq-skip-row');
  if(skipRow) skipRow.style.display = 'none';

  const fb = document.getElementById('aq-feedback');
  fb.innerHTML = `<div class="card card-sm mt">
    <div style="margin-bottom:6px"><span style="font-weight:700;color:var(--orange)">Don't Know</span></div>
    <div style="font-size:13px;color:var(--text2)"><strong>${word.word}</strong>${word.phonetic?' <span style="color:var(--accent2)">/${word.phonetic}/</span>':''} <button class="speak-btn" onclick="speak('${word.word.replace(/'/g,"\\'")}')">&#128264;</button>: ${word.definition}</div>
    <div style="font-size:12px;color:var(--text3);font-style:italic;margin-top:4px">"${word.example}" <button class="speak-btn" style="font-size:14px" onclick="speakSlow(\`${word.example?word.example.replace(/`/g,''):''}\`)">&#128264;</button></div>
  </div>
  <button class="btn mt" onclick="nextAudioQuizQ()">Next &#8594;</button>`;
  speak(word.word);
}

function nextAudioQuizQ(){ audioQuiz.current++; renderAudioQuizQuestion(); }
function prevAudioQuizQ(){ if(audioQuiz.current > 0){ audioQuiz.current--; renderAudioQuizQuestion(); } }
function skipAudioQuizQ(){
  if(audioQuiz.answered) return;
  audioQuiz.answered = true;
  clearInterval(timerInterval);
  audioQuiz.results[audioQuiz.current] = {word:audioQuiz.currentWord, correct:false, quality:0, rt:0, skipped:true};
  audioQuiz.score = Object.values(audioQuiz.results).filter(r=>r.correct).length;
  audioQuiz.current++;
  renderAudioQuizQuestion();
}

function endAudioQuizEarly(){
  if(!audioQuiz) return;
  clearInterval(timerInterval);
  audioQuiz.words.length = audioQuiz.current;
  renderAudioQuizSummary(document.getElementById('screen-quiz'));
}

function renderAudioQuizSummary(el){
  const results = Object.values(audioQuiz.results);
  const answered = results.filter(r=>!r.skipped);
  const pct = audioQuiz.words.length > 0 ? Math.round(audioQuiz.score / audioQuiz.words.length * 100) : 0;
  const avgRT = answered.length > 0 ? (audioQuiz.totalRT / answered.length).toFixed(1) : '0.0';
  const emoji = pct >= 90 ? '&#127942;' : pct >= 70 ? '&#11088;' : pct >= 50 ? '&#128170;' : '&#128218;';
  el.innerHTML = `
    <div class="text-center"><div style="font-size:48px">${emoji}</div>
    <h2>&#127911; Audio Quiz Complete!</h2></div>
    <div class="summary-score" style="color:${pct>=70?'var(--green)':'var(--orange)'}">${pct}%</div>
    <div class="summary-detail">
      <div class="summary-item"><div class="num">${audioQuiz.score}/${audioQuiz.words.length}</div><div class="label">Correct</div></div>
      <div class="summary-item"><div class="num">${avgRT}s</div><div class="label">Avg Time</div></div>
      <div class="summary-item"><div class="num">${results.filter(r=>r.quality>=4).length}</div><div class="label">Fast</div></div>

function flipCard(){
  if(!flashcardState) return;
  flashcardState.flipped = !flashcardState.flipped;
  renderFlashcard(document.getElementById('screen-cards'));
  // Always speak the word when revealing the answer
  if(flashcardState && flashcardState.flipped && !flashcardState.listeningMode){
    const word = flashcardState.words[flashcardState.current];
    if(word) speak(word.word);
  }
}

function rateFlashcard(gotIt){
  const word = flashcardState.words[flashcardState.current];
  const quality = gotIt ? 4 : 1;
  updateSRS(word.id, quality, gotIt ? 2 : 7);
  recordActivity(gotIt);
  flashcardState.current++;
  flashcardState.flipped = false;
  renderFlashcard(document.getElementById('screen-cards'));
}

function prevFlashcard(){
  if(!flashcardState || flashcardState.current <= 0) return;
  flashcardState.current--;
  flashcardState.flipped = false;
  renderFlashcard(document.getElementById('screen-cards'));
}

function skipFlashcard(){
  if(!flashcardState) return;
  flashcardState.current++;
  flashcardState.flipped = false;
  renderFlashcard(document.getElementById('screen-cards'));
}

function endSessionEarly(mode){
  if(mode === 'quiz' && audioQuiz){
    endAudioQuizEarly(); return;

    quiz.words.length = quiz.current; // truncate to trigger summary

function toggleMic(){
  if(!voiceState) return;
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    toast('Voice recognition not supported in this browser');
    return;
  }
  if(voiceState.listening){ return; }
  voiceState.listening = true;
  renderVoice();
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-CA';
  recognition.interimResults = false;
  recognition.maxAlternatives = 3;
  recognition.onresult = (event) => {
    const word = voiceState.words[voiceState.current];
    let heard = '';
    let correct = false;
    for(let i=0; i<event.results[0].length; i++){
      const transcript = event.results[0][i].transcript.toLowerCase().trim();
      if(!heard) heard = transcript;
      if(fuzzyMatch(transcript, word.word.toLowerCase())){
        correct = true;
        heard = transcript;
        break;
      }
    }
    voiceState.result = { heard, correct };
    voiceState.listening = false;
    updateSRS(word.id, correct ? 4 : 1, correct ? 2 : 7);
    recordActivity(correct);
    renderVoice();
  };
  recognition.onerror = () => {
    voiceState.listening = false;
    toast('Could not hear you. Try again.');
    renderVoice();
  };
  recognition.onend = () => {
    if(voiceState && voiceState.listening){
      voiceState.listening = false;
      renderVoice();
    }
  };
  recognition.start();
}

function fuzzyMatch(heard, target){
  if(heard === target) return true;
  // Allow minor differences
  const h = heard.replace(/[^a-z]/g,'');
  const t = target.replace(/[^a-z]/g,'');
  if(h === t) return true;
  // Levenshtein distance <= 2
  if(Math.abs(h.length - t.length) > 2) return false;
  let dist = 0;
  const m = Math.max(h.length, t.length);
  for(let i=0; i<m; i++){
    if(h[i] !== t[i]) dist++;
    if(dist > 2) return false;
  }
  return true;
}

function skipVoice(){
  const word = voiceState.words[voiceState.current];
  const answer = prompt(`Type the word for: "${word.definition}"`);
  if(answer !== null){
    const correct = fuzzyMatch(answer.toLowerCase().trim(), word.word.toLowerCase());
    voiceState.result = { heard: answer, correct };
    updateSRS(word.id, correct ? 4 : 1, correct ? 2 : 7);
    recordActivity(correct);
    renderVoice();
  }
}

function nextVoice(){
  voiceState.current++;
  voiceState.result = null;
  renderVoice();
}

function prevVoiceWord(){
  if(!voiceState || voiceState.current <= 0) return;
  voiceState.current--;
  voiceState.result = null;
  renderVoice();
}

function skipVoiceWord(){
  if(!voiceState) return;
  voiceState.current++;
  voiceState.result = null;
  renderVoice();
}

// ===== MARK AS KNOWN (skip in learning) =====
function markWordAsMastered(wordId){
  const wp = getWordProgress(wordId);
  wp.interval = 60;
  wp.repetitions = 6;
  wp.easeFactor = 2.5;
  wp.nextReview = new Date(Date.now() + 60*86400000).getTime();
  wp.lastQuality = 5;
  saveState();
  toast('Marked as known!');
}

function markKnownQuiz(){
  if(!quiz || quiz.answered) return;
  quiz.answered = true;
  clearInterval(timerInterval);
  const word = quiz.words[quiz.current];
  markWordAsMastered(word.id);
  quiz.results[quiz.current] = {word, correct:false, quality:0, rt:0, skipped:true, known:true};
  quiz.score = Object.values(quiz.results).filter(r=>r.correct).length;
  quiz.current++;
  renderQuizQuestion();
}

function markKnownFlashcard(){
  if(!flashcardState) return;
  const word = flashcardState.words[flashcardState.current];
  markWordAsMastered(word.id);
  flashcardState.current++;
  flashcardState.flipped = false;
  renderFlashcard(document.getElementById('screen-cards'));
}

function markKnownVoice(){
  if(!voiceState) return;
  const word = voiceState.words[voiceState.current];
  markWordAsMastered(word.id);
  voiceState.current++;
  voiceState.result = null;
  renderVoice();
}

// ===== AUTO-PLAY WORD LIST =====
let autoPlayState = null;
let autoPlayTimer = null;

function getFilteredWords(){
  let filtered = WORDS;
  if(wordFilter !== 'all') filtered = filtered.filter(w => w.category === wordFilter);
  if(wordSearch) filtered = filtered.filter(w => w.word.toLowerCase().includes(wordSearch.toLowerCase()) || w.definition.toLowerCase().includes(wordSearch.toLowerCase()));
  return filtered;
}

function startAutoPlay(){
  const words = getFilteredWords();
  if(!words.length){ toast('No words to play'); return; }
  autoPlayState = { words, current:0, phase:'word', paused:false };
  enableBackgroundPlayback('autoplay', words[0]?.word, words[0]?.definition);
  renderAutoPlayBar();
  autoPlayNext();
}

function stopAutoPlay(){
  if(autoPlayTimer) clearTimeout(autoPlayTimer);
  autoPlayTimer = null;
  autoPlayState = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  disableBackgroundPlayback();
  renderAutoPlayBar();
}

function toggleAutoPlayPause(){
  if(!autoPlayState) return;
  autoPlayState.paused = !autoPlayState.paused;
  if(autoPlayState.paused){
    if(autoPlayTimer) clearTimeout(autoPlayTimer);
    autoPlayTimer = null;
    window.speechSynthesis && window.speechSynthesis.cancel();
    if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  } else {
    autoPlayNext();
  }
  updateMediaSessionPaused(autoPlayState.paused);
  renderAutoPlayBar();
}

function autoPlaySkip(dir){
  if(!autoPlayState) return;
  if(autoPlayTimer) clearTimeout(autoPlayTimer);
  autoPlayTimer = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  autoPlayState.current += dir;
  if(autoPlayState.current < 0) autoPlayState.current = 0;
  if(autoPlayState.current >= autoPlayState.words.length){ stopAutoPlay(); toast('Auto-play finished!'); return; }
  autoPlayState.phase = 'word';
  if(!autoPlayState.paused) autoPlayNext();
  renderAutoPlayBar();
}

function autoPlayNext(){
  if(!autoPlayState || autoPlayState.paused) return;
  if(autoPlayState.current >= autoPlayState.words.length){ stopAutoPlay(); toast('Auto-play finished!'); return; }
  const w = autoPlayState.words[autoPlayState.current];
  if(bgPlaybackMode === 'autoplay') updateMediaSession(w.word, w.definition);
  renderAutoPlayBar();

  if(autoPlayState.phase === 'word'){
    speak(w.word);
    autoPlayState.phase = 'pause1';
    autoPlayTimer = setTimeout(()=>autoPlayNext(), getSpokenDuration(w.word) + 800);
  } else if(autoPlayState.phase === 'pause1'){
    autoPlayState.phase = 'definition';
    autoPlayNext();
  } else if(autoPlayState.phase === 'definition'){
    speak(w.definition);
    autoPlayState.phase = 'pause2';
    autoPlayTimer = setTimeout(()=>autoPlayNext(), getSpokenDuration(w.definition) + 800);
  } else if(autoPlayState.phase === 'pause2'){
    autoPlayState.phase = 'example';
    autoPlayNext();
  } else if(autoPlayState.phase === 'example'){
    if(w.example){
      speak(w.example);
      autoPlayState.phase = 'gap';
      autoPlayTimer = setTimeout(()=>autoPlayNext(), getSpokenDuration(w.example) + 1200);
    } else {
      autoPlayState.phase = 'gap';
      autoPlayTimer = setTimeout(()=>autoPlayNext(), 600);
    }
  } else if(autoPlayState.phase === 'gap'){
    autoPlayState.current++;
    autoPlayState.phase = 'word';
    autoPlayNext();
  }
}

function getSpokenDuration(text){
  if(!text) return 500;
  const words = text.split(/\s+/).length;
  const rate = state.settings.voiceSpeed || 0.9;
  return Math.max(600, (words / (2.5 * rate)) * 1000);
}

function formatMultiDef(def){

  const parts = def.match(/\d+\.\s+[^;]*/g);

  }
  return def;
}

async function findDuplicateWords(){
  const key = state.settings.apiKey;
  if(!key){ toast('Add your Gemini API key in Settings'); goTo('settings'); return; }
  toast('Scanning for duplicates...');
  const wordList = WORDS.map(w => ({id:w.id, word:w.word, def:w.definition, custom:!!w.custom}));
  const prompt = `You are a vocabulary list deduplication assistant. Find ONLY exact duplicate words that appear more than once in the list.

Rules:
- ONLY flag the SAME word appearing twice with different definitions = duplicate, COMBINE their definitions
- ONLY flag different spellings of the SAME word (e.g. "colour"/"color") = duplicate
- When the same word has genuinely different meanings, combine them into one entry with numbered definitions
- NEVER flag two DIFFERENT words as duplicates, even if they have similar or related meanings
- "loonie" and "toonie" are DIFFERENT words, NOT duplicates
- "sorry" and "excuse me" are DIFFERENT words, NOT duplicates
- If in doubt, do NOT flag it as a duplicate

Return ONLY a JSON array of duplicate groups. Each group:
{"action":"combine" or "remove","keep":{"id":number,"word":"...","reason":"why keep this one"},"remove":[{"id":number,"word":"...","reason":"why remove/merge"}],"combinedDef":"1. first meaning; 2. second meaning"}

- action "combine": the word has multiple valid meanings — merge definitions into one entry
- action "remove": truly redundant entries — just delete the duplicate
- combinedDef: always provide a clean combined definition using numbered format "1. ...; 2. ..."
If no duplicates found, return empty array: []

Word list:
${JSON.stringify(wordList)}`;

  try{
    const res = await callGemini([{role:'user',text:prompt}]);
    if(!res){ toast('AI analysis failed'); return; }
    let clean = res.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const groups = JSON.parse(clean);
    if(!groups.length){ toast('No duplicates found!'); return; }
    showDuplicateReview(groups);
  }catch(e){
    console.error('Duplicate detection error:', e);
    toast('Failed to analyze: ' + (e.message||'parse error'));
  }
}
