async function callGemini(messages, systemInstruction, options){
  const key = state.settings.apiKey;
  if(!key){ toast('Add your Gemini API key in Settings'); goTo('settings'); return null; }
  const contents = messages.map(m => {
    const role = m.role==='assistant'?'model':'user';
    if(m.parts) return {role, parts:m.parts};
    return {role, parts:[{text:m.text||''}]};
  });
  const body = { contents };
  if(systemInstruction) body.systemInstruction = { parts:[{text:systemInstruction}] };
  // Optional structured output: pass { responseMimeType: 'application/json' } to force valid JSON
  if(options && options.responseMimeType){
    body.generationConfig = Object.assign({}, body.generationConfig, { responseMimeType: options.responseMimeType });
  }
  try{
    const res = await fetch(getGeminiUrl(key),
      { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if(!res.ok){
      const err = await res.text().catch(()=>'');
      console.error('Gemini API error:', res.status, err);
      let msg = 'API error: '+res.status;
      try{ const j=JSON.parse(err); msg=j.error?.message||msg; }catch(e){}
      toast(msg);
      return null;
    }
    const data = await res.json();
    console.log('Gemini response:', JSON.stringify(data).substring(0,500));
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!text){
      const reason = data.candidates?.[0]?.finishReason || data.promptFeedback?.blockReason || 'empty response';
      console.error('Gemini no text:', reason, JSON.stringify(data).substring(0,500));
      toast('AI returned no content: '+reason);
      return null;
    }
    return cleanGeminiText(text);
  }catch(e){ console.error('Gemini network error:', e); toast('Network error: '+e.message); return null; }
}

function cleanGeminiText(text){
  if(!text) return text;
  return text.replace(/^```(?:json)?\s*/gi,'').replace(/\s*```$/g,'').replace(/^json\s*\n/i,'').trim();
}

async function callGeminiWithAudio(audioBase64, mimeType, textPrompt, systemInstruction){
  const key = state.settings.apiKey;
  if(!key){ toast('Add your Gemini API key in Settings'); goTo('settings'); return null; }
  const parts = [{inlineData:{mimeType, data:audioBase64}}];
  if(textPrompt) parts.push({text:textPrompt});
  const body = { contents:[{role:'user', parts}] };
  if(systemInstruction) body.systemInstruction = { parts:[{text:systemInstruction}] };
  try{
    const res = await fetch(getGeminiUrl(key),
      { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if(!res.ok){ const err=await res.text(); console.error(err); toast('API error: '+res.status); return null; }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || null;
  }catch(e){ toast('Network error'); console.error(e); return null; }
}

// Audio recording utility
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
const chatRecordings = [];
let pendingChatAudioUrl = null;

let recordResolve = null;

function startRecording(){
  return new Promise((resolve, reject) => {
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'});
      mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t=>t.stop());
        const blob = new Blob(audioChunks, {type:'audio/webm'});
        const blobUrl = URL.createObjectURL(blob);
        const reader = new FileReader();
        reader.onloadend = () => {
          const result = {base64:reader.result.split(',')[1], mimeType:'audio/webm', blobUrl};
          if(recordResolve){ recordResolve(result); recordResolve = null; }
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.onerror = e => reject(e);
      mediaRecorder.start();
      isRecording = true;
      resolve(true);
    }).catch(e => { toast('Microphone access denied'); reject(e); });
  });
}

function stopRecording(){
  return new Promise(resolve => {
    if(mediaRecorder && mediaRecorder.state === 'recording'){
      recordResolve = resolve;
      mediaRecorder.stop();
      isRecording = false;
    } else { resolve(null); }
  });
}

function playRecording(idx){
  if(chatRecordings[idx]){
    const a = new Audio(chatRecordings[idx]);
    a.play().catch(()=>toast('Could not play recording'));
  }
}

let voiceChatActive = false;

async function sendVoiceChat(){
  if(!chatState || chatState.ended) return;
  const el = document.getElementById('screen-chat');
  const micBtn = document.getElementById('voice-chat-mic');

  if(isRecording){
    // Stop recording and send
    if(micBtn){ micBtn.classList.remove('listening'); micBtn.innerHTML = '&#9203;'; }
    const audio = await stopRecording();
    if(!audio){ renderChat(el, false); return; }

    // Single Gemini call: transcribe + respond
    const context = chatState.messages.map(m =>
      (m.role==='user'?'User':'Assistant') + ': ' + m.text
    ).join('\n');
    const textPrompt = `Listen to this audio message from the user.${context?'\n\nPrevious conversation:\n'+context:''}

IMPORTANT: Reply in this exact format (two lines):
HEARD: (write exactly what the user said)
REPLY: (your response in character)`;

    renderChat(el, true);
    const fullReply = await callGeminiWithAudio(audio.base64, audio.mimeType, textPrompt, chatState.systemPrompt);
    if(!fullReply){ renderChat(el,false); return; }

    let userText = '(voice message)';
    let aiText = fullReply;
    const heardMatch = fullReply.match(/HEARD:\s*(.*?)(?:\n|REPLY:)/s);
    const replyMatch = fullReply.match(/REPLY:\s*([\s\S]*)/);
    if(heardMatch) userText = heardMatch[1].trim();
    if(replyMatch) aiText = replyMatch[1].trim();
    if(!heardMatch && !replyMatch) aiText = fullReply;

    const recIdx = chatRecordings.length;
    chatRecordings.push(audio.blobUrl);
    chatState.messages.push({role:'user', text:userText, recIdx});
    chatState.aiMessages.push({role:'user', text:userText});
    chatState.messages.push({role:'ai', text:aiText});
    chatState.aiMessages.push({role:'assistant', text:aiText});

    chatState.targetWords.forEach(w=>{
      const combined = (userText+' '+aiText).toLowerCase();
      if(combined.includes(w.word.toLowerCase())) chatState.usedWords.add(w.word);
    });
    renderChat(el, false);
    speak(aiText);
  } else {
    // Start recording
    try{
      await startRecording();
      if(micBtn){ micBtn.classList.add('listening'); micBtn.innerHTML = '&#9899; Tap to send'; }
    }catch(e){ console.error(e); }
  }
}

async function sendChatAI(){
  const el = document.getElementById('screen-chat');
  renderChat(el, true);
  const msgs = chatState.messages.length===0
    ? [{role:'user',text:'Start the conversation.'}]
    : chatState.aiMessages;
  const reply = await callGemini(msgs, chatState.systemPrompt);
  if(!reply){ renderChat(el,false); return; }
  const aiMsg = {role:'ai', text:reply, flaggedWords:null};
  chatState.messages.push(aiMsg);
  chatState.aiMessages.push({role:'assistant',text:reply});
  chatState.targetWords.forEach(w=>{
    if(reply.toLowerCase().includes(w.word.toLowerCase())) chatState.usedWords.add(w.word);
  });
  renderChat(el, false);
  speak(reply);

  // S1: Vocab Flagging Agent runs async — when it returns, attach to message and re-render
  if(!chatState.flaggedHistory) chatState.flaggedHistory = new Set();
  flagVocabAgent(reply, chatState.flaggedHistory).then(flagged => {
    if(!flagged || !flagged.length) return;
    if(!chatState || chatState.ended) return;
    aiMsg.flaggedWords = flagged;
    flagged.forEach(f => chatState.flaggedHistory.add((f.word||'').toLowerCase()));
    const cur = document.getElementById('screen-chat');
    if(cur && !chatState.ended) renderChat(cur, false);
  }).catch(e => console.warn('Flagging error:', e));

  // S4: Grammar classifier runs async if the AI reply contains a [Correction] block
  const correctionBlock = parseCorrectionBlock(reply);
  if(correctionBlock){
    const lastUser = chatState.messages.filter(m => m.role === 'user').slice(-1)[0];
    if(lastUser && lastUser.text){
      const src = chatState.isFreeChat ? 'freechat'
                : chatState.isLanguageParent ? 'langparent'
                : (chatState.scenario && chatState.scenario.id ? 'scenario:' + chatState.scenario.id : 'chat');
      classifyGrammarErrors(lastUser.text, correctionBlock, src).catch(e => console.warn('Grammar classifier error:', e));
    }
  }
}

function chatVoiceInput(){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    toast('Voice recognition not supported in this browser'); return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-CA';
  recognition.interimResults = false;
  const micBtn = document.getElementById('chat-mic');
  if(micBtn){ micBtn.style.background = 'var(--red)'; micBtn.innerHTML = '&#9899;'; }
  // Also record audio for playback
  let recStream = null, recChunks = [], recorder = null;
  pendingChatAudioUrl = null;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
    recStream = stream;
    try{ recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'}); }
    catch(e){ recorder = new MediaRecorder(stream); }
    recorder.ondataavailable = e => { if(e.data.size>0) recChunks.push(e.data); };
    recorder.start();
  }).catch(()=>{});
  function stopRec(){
    if(recorder && recorder.state==='recording'){
      recorder.onstop = () => {
        if(recStream) recStream.getTracks().forEach(t=>t.stop());
        if(recChunks.length){
          const blob = new Blob(recChunks, {type:'audio/webm'});
          pendingChatAudioUrl = URL.createObjectURL(blob);
        }
      };
      recorder.stop();
    } else if(recStream){ recStream.getTracks().forEach(t=>t.stop()); }
  }
  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    const input = document.getElementById('chat-input');
    if(input){ input.value = transcript; input.focus(); }
    if(micBtn){ micBtn.style.background = 'var(--bg3)'; micBtn.innerHTML = '&#127908;'; }
    stopRec();
  };
  recognition.onerror = () => {
    toast('Could not hear you. Try again.');
    if(micBtn){ micBtn.style.background = 'var(--bg3)'; micBtn.innerHTML = '&#127908;'; }
    stopRec(); pendingChatAudioUrl = null;
  };
  recognition.onend = () => {
    if(micBtn && micBtn.style.background !== 'var(--bg3)'){
      micBtn.style.background = 'var(--bg3)'; micBtn.innerHTML = '&#127908;';
    }
  };
  recognition.start();
}

  chatState.targetWords.forEach(w=>{

      updateSRS(w.id,4,2);
      recordActivity(true);
      awardXP(chatXPSource, w.id, 10);
    }
  });
  // Suggest new words from conversation
  chatState.suggestedWords = [];
  renderChat(el, false);
  if(state.settings.apiKey && chatState.messages.length >= 4){
    const existingWords = WORDS.map(w=>w.word.toLowerCase());
    const existingSample = existingWords.slice(0,200).join(', ');
    const suggestPrompt = 'From this English conversation, list 3-5 useful vocabulary words or phrases that the learner might not know. Do NOT suggest words already in this list: ' + existingSample + '\n\nConversation:\n' + convo + '\n\nReply in JSON array: [{"word":"...","definition":"simple definition for ESL learner","example":"example sentence","category":"..."}]\nCategories: ' + Object.keys(CATEGORIES).filter(k=>k!=='custom').join(', ');
    callGemini([{role:'user',text:suggestPrompt}],'You are an ESL teacher. Suggest vocabulary. Reply only with valid JSON array.').then(r=>{
      if(r){
        try{
          const cleaned = r.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
          const words = JSON.parse(cleaned);
          chatState.suggestedWords = words.filter(w => !existingWords.includes(w.word.toLowerCase()));
        }catch(e){}
      }
      renderChat(document.getElementById('screen-chat'), false);
    });
  }
}

let pronState = null; // {msgIdx, isRecording, recorder, stream, chunks, attempts:[{recIdx}], aiFeedback}

function showPronPractice(msgIdx){
  const msg = chatState.messages[msgIdx];
  if(!msg) return;
  if(!pronState || pronState.msgIdx !== msgIdx){
    // Initialize with existing retries if any
    const existingRetries = msg.retryRecIdxs || [];
    pronState = {msgIdx, isRecording:false, recorder:null, stream:null, chunks:[], attempts:existingRetries.map(r=>({recIdx:r})), aiFeedback:null};
  }

}

function renderPronModal(){

  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this){pronState=null;closeModal()}">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

        </button>

      </div>`).join('')}
      <div id="pron-ai-result">${pronState.aiFeedback?'<div class="pron-ai-feedback">'+pronState.aiFeedback.replace(/\n/g,'<br>')+'</div>':''}</div>

    </div>

async function pronToggleRecord(){
  if(pronState.isRecording){
    // Stop recording
    pronState.isRecording = false;
    if(pronState.recorder && pronState.recorder.state==='recording'){
      pronState.recorder.onstop = () => {
        if(pronState.stream) pronState.stream.getTracks().forEach(t=>t.stop());
        if(pronState.chunks.length){
          const blob = new Blob(pronState.chunks, {type:'audio/webm'});
          const url = URL.createObjectURL(blob);
          const recIdx = chatRecordings.length;
          chatRecordings.push(url);
          pronState.attempts.push({recIdx});
          // Save retries to the message
          const msg = chatState.messages[pronState.msgIdx];
          if(!msg.retryRecIdxs) msg.retryRecIdxs = [];
          msg.retryRecIdxs.push(recIdx);
          pronState.aiFeedback = null;
        }
        pronState.chunks = [];
        renderPronModal();
      };
      pronState.recorder.stop();
    }
  } else {
    // Start recording
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      pronState.stream = stream;
      pronState.chunks = [];
      try{ pronState.recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'}); }
      catch(e){ pronState.recorder = new MediaRecorder(stream); }
      pronState.recorder.ondataavailable = e => { if(e.data.size>0) pronState.chunks.push(e.data); };
      pronState.recorder.start();
      pronState.isRecording = true;
      renderPronModal();
    }catch(e){ toast('Microphone access denied'); }
  }
}

async function blobUrlToBase64(url){
  const resp = await fetch(url);
  const blob = await resp.blob();
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });
}

async function aiEvaluatePron(recIdx){
  const msg = chatState.messages[pronState.msgIdx];
  const resultEl = document.getElementById('pron-ai-result');
  if(resultEl) resultEl.innerHTML = '<div class="ai-loading"><span></span><span></span><span></span></div>';
  const blobUrl = chatRecordings[recIdx];
  if(!blobUrl){ toast('Recording not found'); return; }
  const base64 = await blobUrlToBase64(blobUrl);
  const prompt = `The learner tried to say this sentence in English:
"${msg.text}"

Listen to their audio recording and evaluate their pronunciation. Provide feedback in this format:
- Overall rating: (Good / Needs Work / Keep Practicing)
- Specific words that need improvement and how to fix them
- Tips for better pronunciation

Give feedback in BOTH English and Chinese (中文). Keep it brief and encouraging (4-6 bullet points max).`;
  const result = await callGeminiWithAudio(base64, 'audio/webm', prompt, 'You are a friendly English pronunciation coach. Give specific, actionable feedback. Be encouraging.');
  if(result){
    pronState.aiFeedback = result;
    if(resultEl) resultEl.innerHTML = '<div class="pron-ai-feedback">' + result.replace(/\n/g,'<br>') + '</div>';
  } else {
    if(resultEl) resultEl.innerHTML = '<div style="color:var(--red);font-size:13px">Could not evaluate. Check API key.</div>';
  }
}

async function addWordFromChatInput(){
  const input = document.getElementById('chat-add-word-input');
  const word = input?.value.trim();
  if(!word){ toast('Type a word first'); return; }
  const exists = WORDS.find(w => w.word.toLowerCase() === word.toLowerCase());
  if(exists){ toast('"'+word+'" is already in your library'); closeModal(); return; }
  const btn = document.getElementById('chat-add-word-btn');
  if(btn){ btn.disabled = true; btn.textContent = 'Adding...'; }
  const validCats = Object.keys(CATEGORIES).filter(k=>k!=='custom').join(', ');
  const prompt = 'For the English word/phrase "' + word + '" used in Canadian daily life, provide:\n1. A clear, simple definition (1 sentence, for ESL learners)\n2. An example sentence in a Canadian context\n3. Best category from: ' + validCats + '\n4. Difficulty: 1 (easy), 2 (medium), 3 (hard)\nReply in EXACTLY this JSON: {"definition":"...","example":"...","category":"...","difficulty":1}';
  const result = await callGemini([{role:'user',text:prompt}],'You are a dictionary. Respond only with valid JSON. Keep definitions simple for ESL learners.');
  if(result){
    try{
      const cleaned = result.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
      const data = JSON.parse(cleaned);
      state.customWords.push({
        word, definition:data.definition||word, example:data.example||'',
        category:data.category&&CATEGORIES[data.category]?data.category:'custom',
        difficulty:[1,2,3].includes(data.difficulty)?data.difficulty:2
      });
      saveState(); rebuildWords();
      toast('"'+word+'" added to library!');
      closeModal();
    }catch(e){ toast('AI error, try again'); if(btn){btn.disabled=false;btn.textContent='Add with AI Auto-fill';} }
  } else {
    toast('Could not auto-fill. Check API key.');
    if(btn){btn.disabled=false;btn.textContent='Add with AI Auto-fill';}
  }
}

function addSuggestedWord(idx){
  const w = chatState.suggestedWords[idx];
  if(!w) return;
  const exists = WORDS.find(x => x.word.toLowerCase() === w.word.toLowerCase());
  if(exists){ toast('"'+w.word+'" already in library'); return; }
  state.customWords.push({
    word:w.word, definition:cleanDefinition(w.word, w.definition||''), example:w.example||'',
    category:w.category&&CATEGORIES[w.category]?w.category:'custom', difficulty:2
  });
  saveState(); rebuildWords();
  const btn = document.getElementById('suggest-btn-'+idx);
  if(btn){ btn.textContent='Added'; btn.classList.add('added'); btn.disabled=true; }
  toast('"'+w.word+'" added!');
}

function addAllSuggestedWords(){
  if(!chatState.suggestedWords||!chatState.suggestedWords.length) return;
  let added = 0;
  chatState.suggestedWords.forEach((w,i) => {
    const exists = WORDS.find(x => x.word.toLowerCase() === w.word.toLowerCase());
    if(exists) return;
    state.customWords.push({
      word:w.word, definition:cleanDefinition(w.word, w.definition||''), example:w.example||'',
      category:w.category&&CATEGORIES[w.category]?w.category:'custom', difficulty:2
    });
    added++;
    const btn = document.getElementById('suggest-btn-'+i);
    if(btn){ btn.textContent='Added'; btn.classList.add('added'); btn.disabled=true; }
  });
  saveState(); rebuildWords();
  toast(added + ' words added!');
}

async function aiRephraseWord(wordId){
  const w = WORDS.find(x=>x.id===wordId);
  if(!w) return;
  const explainEl = document.getElementById('ai-explain-content');
  if(explainEl) explainEl.innerHTML = '<div class="ai-loading"><span></span><span></span><span></span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">AI is rephrasing...</div>';

  const vocabPool = getVocabPoolForPrompt(w.word);
  const prompt = `Rephrase the definition and example sentence for the English word/phrase "${w.word}".

Current definition: ${w.definition}
Current example: ${w.example || 'none'}
Category: ${CATEGORIES[w.category] || w.category}

The learner is also studying these words: ${vocabPool}
Try to USE some of these words naturally in the definition or example sentence, so the learner gets extra exposure to them.

Requirements:
- Write a NEW, DIFFERENT definition that explains the same meaning from a different angle
- Do NOT start the definition with the word itself (e.g. don't write "Potluck is..." — just write the meaning directly)
- Use simpler or more vivid language than the current definition
- Prefer using the learner's other vocabulary words in the definition and example when it fits naturally
- Write a NEW example sentence that is completely different from the current one
- The example should be natural and relevant to daily life in Canada
- Keep the definition concise (1-2 sentences max)

Reply in EXACTLY this JSON format, no extra text:
{"definition":"new definition here","example":"new example sentence here"}`;

  const result = await callGemini([{role:'user',text:prompt}],'You are an ESL vocabulary teacher. Rephrase definitions to help learners see the word from a fresh perspective. When possible, use the learner\'s other vocabulary words in definitions and examples for reinforcement. Reply only with valid JSON.');
  if(!result){
    if(explainEl) explainEl.innerHTML = '<div style="color:var(--red);font-size:13px">Could not rephrase. Check your API key.</div>';
    return;
  }
  try{
    const cleaned = result.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
    const data = JSON.parse(cleaned);
    if(!data.definition){ throw new Error('Missing definition'); }

    const oldDef = w.definition;
    const oldExample = w.example;

    // Update customWords
    const cw = state.customWords.find(c => c.word.toLowerCase() === w.word.toLowerCase());
    const cleanDef = cleanDefinition(w.word, data.definition);
    if(cw){
      cw.definition = cleanDef;
      if(data.example) cw.example = data.example;
      saveState();
      rebuildWords();
    }

    if(explainEl) explainEl.innerHTML = `<div class="card card-sm" style="background:var(--bg3)">
      <div style="font-size:11px;color:var(--green);font-weight:700;margin-bottom:6px">&#10003; Definition rephrased!</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:2px">Old: <s>${oldDef}</s></div>
      <div style="font-size:13px;color:var(--text);margin-bottom:6px">New: ${cleanDef}</div>
      ${data.example ? `<div style="font-size:12px;color:var(--text3);margin-bottom:2px">Old example: <s>${oldExample||'none'}</s></div>
      <div style="font-size:13px;color:var(--text);font-style:italic">"${data.example}"</div>` : ''}
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-ghost btn-sm" onclick="aiRephraseWord(${wordId})" style="font-size:11px">&#128260; Rephrase again</button>
        <button class="btn btn-ghost btn-sm" onclick="undoRephrase(${wordId},\`${btoa(unescape(encodeURIComponent(oldDef)))}\`,\`${btoa(unescape(encodeURIComponent(oldExample||'')))}\`)" style="font-size:11px;color:var(--orange)">&#8617; Undo</button>
      </div>
    </div>`;
  }catch(e){
    console.error('Rephrase parse error:', e, result);
    if(explainEl) explainEl.innerHTML = `<div style="color:var(--red);font-size:13px">AI response format error. Try again.</div>`;
  }
}

function undoRephrase(wordId, defB64, exB64){
  const oldDef = decodeURIComponent(escape(atob(defB64)));
  const oldExample = decodeURIComponent(escape(atob(exB64)));
  const w = WORDS.find(x=>x.id===wordId);
  if(!w) return;
  const cw = state.customWords.find(c => c.word.toLowerCase() === w.word.toLowerCase());
  if(cw){
    cw.definition = oldDef;
    if(oldExample) cw.example = oldExample;
    saveState();
    rebuildWords();
    toast('Reverted to original definition');
    showWordDetail(wordId);
  }
}

async function batchRephraseWords(){
  if(!state.settings.apiKey){ toast('Add Gemini API key in Settings'); goTo('settings'); return; }
  const learningWords = WORDS.filter(w => {
    const s = getWordStatus(w.id);
    return s === 'learning' || s === 'beginner';
  });
  if(!learningWords.length){ toast('No learning/beginner words to rephrase'); return; }
  const statusEl = document.getElementById('batch-rephrase-status');
  const count = Math.min(learningWords.length, 10);
  shuffle(learningWords);
  const batch = learningWords.slice(0, count);

  if(statusEl) statusEl.innerHTML = `<div style="font-size:12px;color:var(--accent2);margin-top:6px">Rephrasing ${count} words...</div>`;

  const batchNames = new Set(batch.map(w=>w.word.toLowerCase()));
  const vocabPool = WORDS.filter(w => !batchNames.has(w.word.toLowerCase())).map(w=>w.word).slice(0,60).join(', ');
  const wordList = batch.map(w => `- "${w.word}": current definition: "${w.definition}", current example: "${w.example||'none'}"`).join('\n');
  const prompt = `Rephrase the definitions and example sentences for these English vocabulary words. Use different angles, simpler or more vivid language, and completely new examples relevant to daily life in Canada.

${wordList}

The learner is also studying these words: ${vocabPool}
Try to USE some of these words naturally in the definitions and examples, so the learner gets extra exposure.

Reply in EXACTLY this JSON format, no extra text:
[{"word":"...","definition":"new definition","example":"new example sentence"},...]

Requirements:
- Each new definition must be DIFFERENT from the current one (different wording, different angle)
- Do NOT start definitions with the word itself (e.g. don't write "Potluck is..." — just write the meaning)
- Prefer using the learner's other vocabulary words in definitions and examples when natural
- Each new example must be a COMPLETELY DIFFERENT sentence
- Keep definitions concise (1-2 sentences)
- Examples should be natural Canadian English`;

  const result = await callGemini([{role:'user',text:prompt}],'You are an ESL vocabulary teacher. Rephrase definitions to help learners see words from fresh perspectives. When possible, use the learner\'s other vocabulary words for reinforcement. Reply only with valid JSON array.');
  if(!result){
    if(statusEl) statusEl.innerHTML = '<div style="color:var(--red);font-size:12px;margin-top:6px">Failed. Check API key.</div>';
    return;
  }
  try{
    const cleaned = result.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
    const data = JSON.parse(cleaned);
    let updated = 0;
    for(const item of data){
      if(!item.word || !item.definition) continue;
      const cw = state.customWords.find(c => c.word.toLowerCase() === item.word.toLowerCase());
      if(cw){
        cw.definition = cleanDefinition(item.word, item.definition);
        if(item.example) cw.example = item.example;
        updated++;
      }
    }
    saveState();
    rebuildWords();
    if(statusEl) statusEl.innerHTML = `<div style="font-size:12px;color:var(--green);margin-top:6px">&#10003; Rephrased ${updated} words!</div>`;
    updateWordListResults();
  }catch(e){
    console.error('Batch rephrase error:', e);
    if(statusEl) statusEl.innerHTML = '<div style="color:var(--red);font-size:12px;margin-top:6px">AI response format error. Try again.</div>';
  }
}

async function requestNotificationPermission(){
  if(!('Notification' in window)){ toast('Notifications not supported in this browser'); return; }
  const perm = await Notification.requestPermission();
  if(perm === 'granted'){
    state.settings.notifications.enabled = true;
    saveState();
    toast('Notifications enabled!');
    initNotifications();
  } else {
    toast('Notification permission denied');
  }
  renderSettings(document.getElementById('screen-settings'));
}

function initNotifications(){
  if(!state.settings.notifications?.enabled) return;
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  setInterval(checkNotificationTime, 60000);
  checkNotificationTime();
}

function checkNotificationTime(){
  if(!state.settings.notifications?.enabled) return;
  if(Notification.permission !== 'granted') return;
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const timeStr = hh + ':' + mm;
  const dateStr = now.toISOString().slice(0,10);
  const times = state.settings.notifications.times || ['08:00','12:00','22:00'];
  if(!times.includes(timeStr)) return;
  const key = dateStr + '-' + timeStr;
  if(state._lastNotifTimes[key]) return;
  state._lastNotifTimes[key] = true;
  saveState();
  const due = getDueWords().length;
  const msgs = [
    due > 0 ? 'You have ' + due + ' words due for review!' : 'Time for some English practice!',
    'A few minutes of vocab practice makes a big difference!',
    'Keep your streak going! Review some words now.'
  ];
  const msg = msgs[Math.floor(Math.random()*msgs.length)];
  if(navigator.serviceWorker && navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg => {
      reg.showNotification('Vocab Trainer', {body:msg, tag:'vocab-reminder-'+timeStr});
    });
  } else {
    try{ new Notification('Vocab Trainer', {body:msg, tag:'vocab-reminder-'+timeStr}); }catch(e){}
  }
}

function startLanguageParent(){
  const scenario = {id:'langparent',title:'Language Parent',desc:'Safe, simple conversations with a patient language parent',categories:Object.keys(CATEGORIES),icon:'&#129303;'};
  const due = getDueWords();
  const weak = WORDS.filter(w => {const s=getWordStatus(w.id); return s==='beginner'||s==='learning';});
  const reviewWords = [...due, ...weak];
  shuffle(reviewWords);
  const targetWords = reviewWords.slice(0,10);
  const wordList = targetWords.length ? targetWords.map(w => w.word + ' (' + w.definition + ')').join(', ') : 'none yet';
  const ctx = buildChatContext();
  chatState = { scenario, targetWords, messages:[], aiMessages:[], usedWords:new Set(), ended:false, feedback:null, isFreeChat:false, isLanguageParent:true, srsReviewWords: ctx.reviewWords, flaggedHistory: new Set() };
  const basePrompt = `You are a Language Parent — a warm, patient conversation partner for an adult ESL learner in Canada. You follow Chris Lonsdale's Language Parent method.

Your rules:
1. **Speak simply** — use short sentences (5-10 words), common words, present tense mostly. Match the learner's level.
2. **Never correct directly** — if the learner makes a mistake, DO NOT say "you should say X" or add a [Correction] section. Instead, naturally rephrase what they said correctly in your next response (recasting).
   Example: Learner: "Yesterday I go to store" → You: "Oh, you went to the store? What did you buy?"
3. **Confirm understanding** — show you understood by rephrasing their meaning, then ask a simple follow-up question.
4. **Use body language cues** — describe your reactions with words like *nods*, *smiles*, *thinks* in asterisks to create a safe atmosphere.
5. **Expand gradually** — when the learner seems comfortable, introduce ONE new word or phrase naturally. If they seem confused, simplify immediately.
6. **Be encouraging** — react positively to their attempts. "That's a great way to say it!" / "I understand you perfectly!"
7. **Stay conversational** — talk about everyday Canadian life (weather, food, weekend, work, hobbies). Keep it relevant and interesting.
8. **Keep responses SHORT** — 1-3 sentences max. Leave space for the learner to talk.

The learner is studying these words (use them naturally when relevant): ${wordList}

Start by warmly greeting the learner and asking a simple, friendly question about their day.`;
  chatState.systemPrompt = basePrompt + ctx.promptBlock;
  goTo('chat');
  sendChatAI();
}

// ===== WORD MIXING DRILL (Chris Lonsdale "10 verbs × 10 nouns") =====
function startWordMixing(){
  if(!state.settings.apiKey){ toast('Add Gemini API key in Settings'); goTo('settings'); return; }
  const pool = WORDS.filter(w => w.definition && w.definition.length > 5);
  if(pool.length < 6){ toast('Need at least 6 words to start mixing'); return; }
  shuffle(pool);
  // Create 8 rounds, each with 2-3 words to combine
  const rounds = [];
  for(let i = 0; i < 8 && i * 3 < pool.length; i++){
    const count = 2 + (Math.random() > 0.5 ? 1 : 0); // 2 or 3 words
    const start = i * 3;
    if(start + count <= pool.length){
      rounds.push(pool.slice(start, start + count));
    }
  }
  if(rounds.length < 3){ toast('Not enough words'); return; }
  earState = { mode:'wordmixing', rounds, current:0, score:0, results:[], ended:false };
  goTo('ear');
}

async function submitWordMixing(){
  const inp = document.getElementById('mix-input');
  if(!inp) return;
  const userSentence = inp.value.trim();
  if(!userSentence){ toast('Type a sentence first'); return; }
  const loadEl = document.getElementById('mix-loading');
  if(loadEl) loadEl.innerHTML = '<div class="ai-loading" style="margin-top:12px"><span></span><span></span><span></span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">AI is evaluating...</div>';

  const words = earState.rounds[earState.current];
  const wordNames = words.map(w => w.word).join(', ');
  const wordDefs = words.map(w => `"${w.word}" (${w.definition})`).join(', ');

  const prompt = `Evaluate this Word Mixing exercise.

The learner was asked to make ONE sentence using ALL these words: ${wordDefs}

Learner's sentence: "${userSentence}"

Check:
1. Did the sentence use ALL the required words (${wordNames})? Inflected forms (past tense, plural, etc.) count.
2. Is it grammatically correct?
3. Does it make sense? Is the meaning of each word used correctly?
4. Is it creative/natural?

Reply in JSON: {"rating":"Great","feedback":"Brief feedback in English and Chinese","example":"A good example sentence using all the words","usedAll":true}
rating = "Great" (all words used correctly, good grammar) / "Good" (all words used, minor issues) / "Needs Work" (missing words or major errors)`;

  const result = await callGemini([{role:'user',text:prompt}],'You are a creative English writing coach for ESL learners in Canada. Be encouraging. Respond only with valid JSON.');
  let evalData = { rating:'Needs Work', feedback:'Could not evaluate.', example:'', usedAll:false };
  if(result){
    try{
      const cleaned = cleanGeminiText(result);
      evalData = JSON.parse(cleaned);
    }catch(e){ evalData.feedback = result; }
  }
  const isGood = evalData.rating === 'Great' || evalData.rating === 'Good';
  if(isGood) earState.score++;
  earState.results[earState.current] = { userSentence, rating:evalData.rating, feedback:evalData.feedback, example:evalData.example||'', words };

  // SRS + XP for each word used
  words.forEach(w => {
    updateSRS(w.id, isGood ? 4 : 1, isGood ? 2 : 5);
    awardXP('wordmixing', w.id, isGood ? 15 : 5);
  });
  recordActivity(isGood);
  renderEarActive(document.getElementById('screen-ear'));
}

function skipWordMixing(){
  const words = earState.rounds[earState.current];

}

// ===== BRAIN SOAK (Chris Lonsdale - Passive Immersion) =====
let brainSoakTimer = null;

function startBrainSoak(){
  const pool = WORDS.filter(w => w.example && w.example.length > 10);
  if(pool.length < 3){ toast('Need at least 3 words with example sentences'); return; }
  // Prioritize due/weak words, fill with others
  const due = pool.filter(w => getDueWords().some(d => d.id === w.id));
  const weak = pool.filter(w => {const s=getWordStatus(w.id); return s==='beginner'||s==='learning';});
  const priority = [...new Map([...due,...weak].map(w=>[w.id,w])).values()];
  const rest = pool.filter(w => !priority.find(p=>p.id===w.id));
  shuffle(priority);
  shuffle(rest);
  const words = [...priority, ...rest].slice(0, 30);
  earState = { mode:'brainsoak', words, current:0, paused:false, loop:true, speed:1, ended:false };
  enableBackgroundPlayback('brainsoak', words[0]?.word, words[0]?.example);
  goTo('ear');
  setTimeout(()=>brainSoakPlayNext(), 500);
}

      <button class="btn btn-sm btn-ghost" onclick="setBrainSoakSpeed(1)" style="width:auto;padding:4px 12px;font-size:11px;${earState.speed===1?'border-color:var(--accent);color:var(--accent)':''}">Normal</button>
      <button class="btn btn-sm btn-ghost" onclick="setBrainSoakSpeed(1.2)" style="width:auto;padding:4px 12px;font-size:11px;${earState.speed===1.2?'border-color:var(--accent);color:var(--accent)':''}">Fast</button>
      <button class="btn btn-sm btn-ghost" onclick="toggleBrainSoakLoop()" style="width:auto;padding:4px 12px;font-size:11px;${earState.loop?'border-color:var(--green);color:var(--green)':''}">&#128257; ${earState.loop?'Loop ON':'Loop OFF'}</button>
    </div>`;
}

function brainSoakPlayNext(){
  if(!earState || earState.paused || earState.mode !== 'brainsoak') return;
  if(earState.current >= earState.words.length){
    if(earState.loop){
      earState.current = 0;
    } else {
      earState.ended = true;
      toast('Brain Soak complete!');
      renderEarActive(document.getElementById('screen-ear'));
      return;
    }
  }
  const w = earState.words[earState.current];
  if(bgPlaybackMode === 'brainsoak') updateMediaSession(w.word, w.example);
  renderBrainSoak(document.getElementById('screen-ear'));

  // Passive XP for exposure
  awardXP('brainsoak', w.id, 3);

  // Play the example sentence at the selected speed
  speak(w.example, earState.speed);
  const duration = getSpokenDuration(w.example) / earState.speed;

  // After the sentence, pause, then repeat at slower speed, then move on
  brainSoakTimer = setTimeout(()=>{
    if(!earState || earState.paused || earState.mode !== 'brainsoak') return;
    // Repeat the same sentence slightly slower for reinforcement
    const repeatSpeed = Math.max(0.6, earState.speed - 0.2);
    speak(w.example, repeatSpeed);
    const repeatDuration = getSpokenDuration(w.example) / repeatSpeed;
    brainSoakTimer = setTimeout(()=>{
      if(!earState || earState.paused || earState.mode !== 'brainsoak') return;
      earState.current++;
      brainSoakPlayNext();
    }, repeatDuration + 1500); // gap between sentences
  }, duration + 1000); // pause between first and repeat
}

function toggleBrainSoakPause(){
  if(!earState) return;
  earState.paused = !earState.paused;
  if(earState.paused){
    if(brainSoakTimer) clearTimeout(brainSoakTimer);
    brainSoakTimer = null;
    window.speechSynthesis && window.speechSynthesis.cancel();
    if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  } else {
    brainSoakPlayNext();
  }
  updateMediaSessionPaused(earState.paused);
  renderBrainSoak(document.getElementById('screen-ear'));
}

function brainSoakSkip(dir){
  if(!earState) return;
  if(brainSoakTimer) clearTimeout(brainSoakTimer);
  brainSoakTimer = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  earState.current += dir;
  if(earState.current < 0) earState.current = 0;
  if(earState.current >= earState.words.length){
    if(earState.loop) earState.current = 0;
    else { earState.current = earState.words.length - 1; }
  }
  if(!earState.paused) brainSoakPlayNext();
  else renderBrainSoak(document.getElementById('screen-ear'));
}

function setBrainSoakSpeed(speed){
  if(!earState) return;
  earState.speed = speed;
  renderBrainSoak(document.getElementById('screen-ear'));
}

function toggleBrainSoakLoop(){
  if(!earState) return;
  earState.loop = !earState.loop;
  renderBrainSoak(document.getElementById('screen-ear'));
}

function stopBrainSoak(){
  if(brainSoakTimer) clearTimeout(brainSoakTimer);
  brainSoakTimer = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  disableBackgroundPlayback();
  earState = null;
  goTo('ear');
}

  {w:'gloss over',d:'phrasal',b:'4-6K'},{w:'weed out',d:'phrasal',b:'4-6K'},{w:'hold off',d:'phrasal',b:'4-6K'},
  {w:'branch out',d:'phrasal',b:'4-6K'},{w:'chime in',d:'phrasal',b:'4-6K'},{w:'drum up',d:'phrasal',b:'4-6K'},
  {w:'eke out',d:'phrasal',b:'4-6K'},{w:'iron out',d:'phrasal',b:'4-6K'},{w:'stave off',d:'phrasal',b:'4-6K'},
];

// Plausible nonwords for fake-word penalty (Lextale-style)
const VMAP_FAKES = [
  'plendant','scornify','vornal','morple','snerg','trizard','murvent','plurion',
  'scrabish','terplex','spentrum','frest','gondle','plimp','scrent','druvel',
  'slindle','vornish','plinder','twindler','mervish','blentish','gronch','cromble',
  'dwerk','porgent','ferundle','glistrum','voctent','splending'
];

let vtest = null;

// Migration
if(!state.vmapHistory) state.vmapHistory = [];

function vmapShuffle(arr){ return arr.slice().sort(()=>Math.random()-0.5); }

function startVocabTest(perCell){
  perCell = perCell || 8;
  const sampled = [];
  const seen = new Set();
  VMAP_DOMAINS.forEach(domain => {
    domain.bands.forEach(band => {
      const candidates = VMAP_WORDS.filter(w => w.d === domain.id && w.b === band);
      const shuffled = vmapShuffle(candidates);
      let picked = 0;
      for(const p of shuffled){
        if(picked >= perCell) break;
        const key = p.w.toLowerCase();
        if(seen.has(key)) continue; // skip dupes from data or already sampled in another cell
        seen.add(key);
        sampled.push({word:p.w, domain:p.d, band:p.b, isFake:false});
        picked++;
      }
    });
  });
  // Add ~20 fakes
  const fakes = vmapShuffle(VMAP_FAKES).slice(0, 20);
  fakes.forEach(f => {
    if(seen.has(f.toLowerCase())) return;
    seen.add(f.toLowerCase());
    sampled.push({word:f, domain:'fake', band:'fake', isFake:true});
  });
  vtest = {
    step:'running',
    words: vmapShuffle(sampled),
    idx:0,
    responses:{},  // word -> 'know'|'unsure'|'unknown'
    startedAt: Date.now()
  };
  goTo('vtest');
}

function answerVocabTest(answer){
  if(!vtest || vtest.step !== 'running') return;
  const w = vtest.words[vtest.idx];
  vtest.responses[w.word] = answer;
  vtest.idx++;
  if(vtest.idx >= vtest.words.length){
    finishVocabTest();
  } else {
    renderVocabTest(document.getElementById('screen-vtest'));
  }
}

function finishVocabTest(){
  vtest.step = 'results';
  vtest.results = computeVocabEstimate();
  renderVocabTest(document.getElementById('screen-vtest'));
}

function computeVocabEstimate(){
  const cellStats = {}; // 'domain|band' -> {known, unsure, unknown, total, knownPct}
  let fakeKnown = 0, fakeUnsure = 0, fakeTotal = 0;

  vtest.words.forEach(w => {
    const ans = vtest.responses[w.word];
    if(w.isFake){
      fakeTotal++;
      if(ans === 'know') fakeKnown++;
      else if(ans === 'unsure') fakeUnsure++;
      return;
    }
    const key = w.domain + '|' + w.band;
    if(!cellStats[key]) cellStats[key] = {known:0, unsure:0, unknown:0, total:0};
    cellStats[key].total++;
    if(ans === 'know') cellStats[key].known++;
    else if(ans === 'unsure') cellStats[key].unsure++;
    else cellStats[key].unknown++;
  });
  Object.keys(cellStats).forEach(k => {
    const s = cellStats[k];
    s.knownPct = s.total > 0 ? Math.round((s.known + s.unsure*0.4)/s.total*100) : 0;
  });

  const fakeYesRate = fakeTotal > 0 ? fakeKnown/fakeTotal : 0;
  const correction = Math.max(0.5, 1 - fakeYesRate * 1.5);

  // Aggregate by band across all domains
  const bandStats = {};
  Object.entries(cellStats).forEach(([k, s]) => {
    const [domain, band] = k.split('|');
    if(!bandStats[band]) bandStats[band] = {known:0, unsure:0, total:0};
    bandStats[band].known += s.known;
    bandStats[band].unsure += s.unsure;
    bandStats[band].total += s.total;
  });

  let totalEstimate = 0;
  Object.entries(bandStats).forEach(([band, s]) => {
    if(s.total === 0) return;
    const propKnown = (s.known + s.unsure * 0.4) / s.total;
    totalEstimate += VMAP_BAND_SIZES[band] * propKnown;
  });
  totalEstimate = Math.round(totalEstimate * correction);

  const cefr = totalEstimate >= 5000 ? 'C2'
              : totalEstimate >= 4000 ? 'C1'
              : totalEstimate >= 2500 ? 'B2'
              : totalEstimate >= 1500 ? 'B1'
              : totalEstimate >= 500 ? 'A2' : 'A1';

  return {
    totalEstimate, cefr, cellStats, bandStats,
    fakeYesRate, fakeKnown, fakeUnsure, fakeTotal, correction,
    completedAt: Date.now()
  };
}

function commitVocabTestToLibrary(){
  if(!vtest || !vtest.results) return;
  if(!state.customWords) state.customWords = [];
  const existingLower = new Set([
    ...((state.customWords||[]).map(w => w.word.toLowerCase())),
    ...((WORDS_RAW||[]).map(w => w[0].toLowerCase()))
  ]);
  let added = 0, mastered = 0, learning = 0, newCount = 0;
  const now = Date.now();

  vtest.words.forEach(w => {
    if(w.isFake) return;
    const key = w.word.toLowerCase();
    const ans = vtest.responses[w.word];
    if(existingLower.has(key)) return;

    const diff = w.band === '1K' ? 1 : w.band === '2-3K' ? 2 : w.band === '4-6K' ? 3 : w.band === '7-10K' ? 4 : 5;
    state.customWords.push({
      word: w.word,
      definition: '',
      example: '',
      category: 'vmap-' + w.domain,
      difficulty: diff,
      phonetic: '',
      grammar: null,
      vmapBand: w.band,
      vmapDomain: w.domain,
      vmapTested: now
    });
    existingLower.add(key);
    added++;
  });
  rebuildWords();

  // Set wordProgress for tested words
  vtest.words.forEach(w => {
    if(w.isFake) return;
    const ans = vtest.responses[w.word];
    const wObj = (WORDS||[]).find(ww => ww.word.toLowerCase() === w.word.toLowerCase());
    if(!wObj) return;

    if(ans === 'know'){
      state.wordProgress[wObj.id] = {
        interval: 21, easeFactor: 2.5,
        nextReview: now + 21*86400000,
        repetitions: 4, lastQuality: 5, lastRT: null,
        vmapTested: now
      };
      mastered++;
    } else if(ans === 'unsure'){
      state.wordProgress[wObj.id] = {
        interval: 3, easeFactor: 2.3,
        nextReview: now + 3*86400000,
        repetitions: 2, lastQuality: 3, lastRT: null,
        vmapTested: now
      };
      learning++;
    } else {
      // unknown — leave as new (no wordProgress)
      newCount++;
    }
  });

  // Save test history
  if(!state.vmapHistory) state.vmapHistory = [];
  state.vmapHistory.push({
    completedAt: vtest.results.completedAt,
    totalEstimate: vtest.results.totalEstimate,
    cefr: vtest.results.cefr,
    cellStats: vtest.results.cellStats,
    bandStats: vtest.results.bandStats,
    fakeYesRate: vtest.results.fakeYesRate
  });
  // Cap history at 20 tests
  if(state.vmapHistory.length > 20) state.vmapHistory = state.vmapHistory.slice(-20);

  saveState();
  return {added, mastered, learning, newCount};
}

function abandonVocabTest(){
  if(confirm('Quit the test? Your answers so far will be lost.')){
    vtest = null;
    goTo('home');
  }
}

function inferStatusFromVmap(domain, band){
  // Returns 'mastered'|'familiar'|'learning'|'beginner'|'new' based on last test's cell or band score.
  if(!state.vmapHistory || state.vmapHistory.length === 0) return 'new';
  const last = state.vmapHistory[state.vmapHistory.length - 1];

  // Try cell-specific first (domain × band)
  let pct = null;
  if(last.cellStats){
    const cell = last.cellStats[domain + '|' + band];
    if(cell && cell.total > 0){
      pct = cell.knownPct;
    }
  }
  // Fallback: band aggregate across all domains
  if(pct === null && last.bandStats){
    const ba = last.bandStats[band];
    if(ba && ba.total > 0){
      pct = (ba.known + (ba.unsure||0)*0.4) / ba.total * 100;
    }
  }
  if(pct === null) return 'new';

  if(pct >= 80) return 'mastered';
  if(pct >= 60) return 'familiar';
  if(pct >= 40) return 'learning';
  if(pct >= 20) return 'beginner';
  return 'new';
}

function statusToProgress(status, now){
  if(status === 'mastered') return {interval:21, easeFactor:2.5, nextReview:now+21*86400000, repetitions:4, lastQuality:5, lastRT:null};
  if(status === 'familiar') return {interval:10, easeFactor:2.4, nextReview:now+10*86400000, repetitions:3, lastQuality:4, lastRT:null};
  if(status === 'learning') return {interval:3,  easeFactor:2.3, nextReview:now+3*86400000,  repetitions:2, lastQuality:3, lastRT:null};
  if(status === 'beginner') return {interval:1,  easeFactor:2.3, nextReview:now+1*86400000,  repetitions:1, lastQuality:2, lastRT:null};
  return null; // 'new' → no wordProgress entry
}

let bulkImport = null; // {step, wordList, plan, spotCheckIdx, spotCheckResults}

function startBulkImport(listKey){
  const lists = {
    'ngsl-1k': {data:VMAP_NGSL_1K, label:'NGSL 1K (most common 1000 words)'},
    'ngsl-2k': {data:VMAP_NGSL_2K, label:'NGSL 2K (high-value second-tier words)'},
  };
  const chosen = lists[listKey];
  if(!chosen || chosen.data.length === 0){
    toast('That word list is not yet bundled. Coming in next update.');
    return;
  }
  // Compute plan
  const existingLower = new Set([
    ...((state.customWords||[]).map(w => w.word.toLowerCase())),
    ...((WORDS_RAW||[]).map(w => w[0].toLowerCase()))
  ]);
  const buckets = {mastered:[], familiar:[], learning:[], beginner:[], new:[], skipped:[]};
  chosen.data.forEach(entry => {
    if(existingLower.has(entry.w.toLowerCase())){
      buckets.skipped.push(entry);
      return;
    }
    const status = inferStatusFromVmap(entry.dom, entry.b);
    buckets[status].push(entry);
  });
  bulkImport = {
    step:'preview',
    listKey,
    listLabel:chosen.label,
    wordList:chosen.data,
    plan:buckets,
    spotCheckIdx:0,
    spotCheckResults:[],
    downgrade:false
  };
  renderBulkImportScreen();
}

function renderBulkImportScreen(){
  // Render in a modal overlay (no new screen needed)
  const root = document.getElementById('modal-root');
  if(!bulkImport){ root.style.display = 'none'; return; }
  if(bulkImport.step === 'preview') renderBulkPreview(root);
  else if(bulkImport.step === 'spotcheck') renderBulkSpotCheck(root);
  else if(bulkImport.step === 'done') renderBulkDone(root);
  root.style.display = 'flex';
}

  root.innerHTML = `<div class="modal-overlay" onclick="if(event.target===this){bulkImport=null;renderBulkImportScreen();}">

      <h3 style="margin:0 0 4px">Bulk Import Preview</h3>
      <p style="font-size:12px;color:var(--text3);margin:0 0 12px">${bulkImport.listLabel}</p>

      <div style="background:var(--bg);border-radius:8px;padding:12px;margin-bottom:12px">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">Will add <b style="color:var(--accent)">${total}</b> new words to your library:</div>
        ${[
          ['mastered','Mastered','#00b894','21d interval, skip early review'],
          ['familiar','Familiar','#27ae60','10d interval'],
          ['learning','Learning','#fdcb6e','3d interval, mid priority'],
          ['beginner','Beginner','#e17055','1d interval, soon'],
          ['new','New','#636e72','no progress, will appear in quizzes'],
        ].map(([k,lab,c,desc]) => p[k].length > 0 ? `

            <span style="font-weight:600;color:${c}">${p[k].length}</span>
            <span style="font-size:12px">${lab}</span>
            <span style="font-size:11px;color:var(--text3);flex:1">— ${desc}</span>
          </div>` : '').join('')}
        ${p.skipped.length > 0 ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--bg3);font-size:11px;color:var(--text3)">${p.skipped.length} already in your library — skipped</div>` : ''}
      </div>

      <div style="background:rgba(255,165,0,.06);border:1px solid var(--orange);border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;color:var(--text2);line-height:1.5">
        <b style="color:var(--orange)">Spot check next:</b> Before committing, you'll verify a random sample of words I'm marking as "Mastered". If you fail too many, the import gets scaled back to "Familiar" automatically.

      ${p.mastered.length === 0 ? `
        <button class="btn mb" onclick="executeBulkImport()" style="width:100%">Skip Spot Check & Commit</button>

        <button class="btn mb" onclick="bulkImport.step='spotcheck';renderBulkImportScreen()" style="width:100%">Continue to Spot Check (10 words)</button>

      <button class="btn btn-ghost btn-sm" onclick="bulkImport=null;renderBulkImportScreen()" style="width:100%">Cancel</button>
    </div>
  </div>`;
}

function renderBulkSpotCheck(root){
  if(!bulkImport.spotCheckPicked){
    // Pick 10 random mastered candidates
    const pool = bulkImport.plan.mastered.slice().sort(()=>Math.random()-0.5);
    bulkImport.spotCheckPicked = pool.slice(0, Math.min(10, pool.length));
  }
  const idx = bulkImport.spotCheckIdx;
  if(idx >= bulkImport.spotCheckPicked.length){
    // Compute pass/fail
    const wrong = bulkImport.spotCheckResults.filter(r => !r).length;
    bulkImport.downgrade = wrong >= 3; // ≥3 wrong → downgrade mastered to familiar
    bulkImport.step = 'done';
    renderBulkImportScreen();
    return;
  }
  const w = bulkImport.spotCheckPicked[idx];
  root.innerHTML = `<div class="modal-overlay">
    <div class="modal" style="max-width:480px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:8px">SPOT CHECK · ${idx+1}/${bulkImport.spotCheckPicked.length} · ${bulkImport.spotCheckResults.filter(r=>!r).length} wrong so far</div>
      <h3 style="margin:0 0 4px">Do you actually know this word?</h3>
      <p style="font-size:12px;color:var(--text3);margin:0 0 16px">If you can use it in a sentence and explain its meaning, click "Yes". If not, click "No".</p>

      <div style="text-align:center;padding:32px 16px;background:linear-gradient(135deg,var(--bg2),var(--bg));border-radius:12px;margin-bottom:16px">
        <div style="font-size:32px;font-weight:800;color:var(--text)">${w.w}</div>
        ${w.p?'<div style="font-size:13px;color:var(--text3);margin-top:4px">'+w.p+'</div>':''}
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <button class="btn" style="background:linear-gradient(135deg,var(--green),#00d2a0)" onclick="answerSpotCheck(true)">&#9989; Yes, I know it</button>
        <button class="btn" style="background:linear-gradient(135deg,#636e72,#2d3436)" onclick="answerSpotCheck(false)">&#10060; No, I don't</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="bulkImport=null;renderBulkImportScreen()" style="width:100%">Cancel Import</button>
    </div>
  </div>`;
}

function answerSpotCheck(correct){
  bulkImport.spotCheckResults.push(correct);
  bulkImport.spotCheckIdx++;
  renderBulkImportScreen();
}

function renderBulkDone(root){
  const p = bulkImport.plan;
  const downgrade = bulkImport.downgrade;
  const wrong = bulkImport.spotCheckResults.filter(r => !r).length;
  const right = bulkImport.spotCheckResults.filter(r => r).length;
  root.innerHTML = `<div class="modal-overlay">
    <div class="modal" style="max-width:480px">
      <h3 style="margin:0 0 8px">Spot Check Result</h3>

      <div style="background:${downgrade?'rgba(214,48,49,.08)':'rgba(0,184,148,.06)'};border:1px solid ${downgrade?'var(--red)':'var(--green)'};border-radius:8px;padding:12px;margin-bottom:12px">
        <div style="font-weight:700;color:${downgrade?'var(--red)':'var(--green)'};margin-bottom:4px">
          ${downgrade ? '⚠ Scaling Back' : '✓ Looks Good'}
        </div>
        <div style="font-size:12px;color:var(--text2);line-height:1.5">
          You got <b>${right}/${right+wrong}</b> right.
          ${downgrade
            ? ` That's below the 70% threshold. I'll downgrade all <b>${p.mastered.length}</b> "Mastered" candidates to <b>Familiar</b> instead — they'll show up in reviews to confirm.`
            : ` That's above the 70% threshold. I'll proceed with the original plan.`}
        </div>
      </div>

      <button class="btn mb" onclick="executeBulkImport()" style="width:100%">Commit to Library</button>
      <button class="btn btn-ghost btn-sm" onclick="bulkImport=null;renderBulkImportScreen()" style="width:100%">Cancel</button>
    </div>
  </div>`;
}

function executeBulkImport(){
  if(!bulkImport) return;
  const p = bulkImport.plan;
  const downgrade = bulkImport.downgrade;
  const now = Date.now();
  if(!state.customWords) state.customWords = [];
  const existingLower = new Set([
    ...((state.customWords||[]).map(w => w.word.toLowerCase())),
    ...((WORDS_RAW||[]).map(w => w[0].toLowerCase()))
  ]);
  let added = 0;
  const counts = {mastered:0, familiar:0, learning:0, beginner:0, new:0};

  function addBatch(entries, baseStatus){
    const effectiveStatus = (baseStatus === 'mastered' && downgrade) ? 'familiar' : baseStatus;
    entries.forEach(entry => {
      const key = entry.w.toLowerCase();
      if(existingLower.has(key)) return;
      const diff = entry.b === '1K' ? 1 : entry.b === '2-3K' ? 2 : entry.b === '4-6K' ? 3 : entry.b === '7-10K' ? 4 : 5;
      state.customWords.push({
        word: entry.w,
        definition: entry.d || '',
        example: entry.e || '',
        category: 'vmap-' + (entry.dom || 'general'),
        difficulty: diff,
        phonetic: entry.p || '',
        grammar: null,
        vmapBand: entry.b,
        vmapDomain: entry.dom,
        vmapInferred: true,
        vmapImportedAt: now
      });
      existingLower.add(key);
      added++;
      counts[effectiveStatus]++;
    });
  }
  addBatch(p.mastered, 'mastered');
  addBatch(p.familiar, 'familiar');
  addBatch(p.learning, 'learning');
  addBatch(p.beginner, 'beginner');
  addBatch(p['new'], 'new');
  rebuildWords();

  // Now set wordProgress
  const allEntries = [
    ...p.mastered.map(e => ({entry:e, status:downgrade?'familiar':'mastered'})),
    ...p.familiar.map(e => ({entry:e, status:'familiar'})),
    ...p.learning.map(e => ({entry:e, status:'learning'})),
    ...p.beginner.map(e => ({entry:e, status:'beginner'})),
    // 'new' entries get no wordProgress
  ];
  allEntries.forEach(({entry, status}) => {
    const wObj = (WORDS||[]).find(w => w.word.toLowerCase() === entry.w.toLowerCase());
    if(!wObj) return;
    const prog = statusToProgress(status, now);
    if(prog){
      state.wordProgress[wObj.id] = {...prog, vmapImported:now};
    }
  });
  saveState();

  toast(`Added ${added} words: ${counts.mastered} mastered, ${counts.familiar} familiar, ${counts.learning} learning, ${counts.beginner} beginner, ${counts.new} new`);
  bulkImport = null;
  renderBulkImportScreen();
  goTo('words');
}
