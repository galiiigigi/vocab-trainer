function deleteDupWord(groupIdx, which){
  const groups = document.getElementById('modal-root')._dupGroups;
  if(!groups || !groups[groupIdx]) return;
  const g = groups[groupIdx];
  const wordName = which === 'keep' ? g.keep.word : g.remove[which]?.word;
  if(!wordName) return;
  state.customWords = (state.customWords||[]).filter(cw=>cw.word.toLowerCase()!==wordName.toLowerCase());
  saveState();
  rebuildWords();
  const rowId = which === 'keep' ? `dup-word-${groupIdx}-keep` : `dup-word-${groupIdx}-${which}`;
  const row = document.getElementById(rowId);
  if(row){
    row.style.opacity = '0.3';
    row.innerHTML = `<div style="font-size:12px;color:var(--red);padding:4px 0">"${wordName}" deleted</div>`;
  }
  toast('"' + wordName + '" deleted');
}

function applyDuplicateFix(groupIdx, apply){
  const groups = document.getElementById('modal-root')._dupGroups;
  if(!groups || !groups[groupIdx]) return;
  const g = groups[groupIdx];
  const el = document.getElementById('dup-group-'+groupIdx);
  if(apply){
    const newDef = g.combinedDef || null;
    // Remove duplicate entries
    g.remove.forEach(r => {
      state.customWords = (state.customWords||[]).filter(cw=>cw.word.toLowerCase()!==r.word.toLowerCase());
    });
    // Update kept word's definition (combined or improved)
    if(newDef){
      const cw = (state.customWords||[]).find(c=>c.word.toLowerCase()===g.keep.word.toLowerCase());
      if(cw) cw.definition = newDef;
    }
    saveState();
    rebuildWords();
    if(el) el.style.opacity = '0.4';
    if(el) el.innerHTML = '<div style="text-align:center;color:var(--green);padding:12px">Done — ' + (g.action==='combine'?'definitions combined':'duplicates removed') + '</div>';
    toast(g.action==='combine'?'Definitions combined!':'Duplicates removed!');
  } else {
    if(el) el.style.opacity = '0.4';
    if(el) el.innerHTML = '<div style="text-align:center;color:var(--text3);padding:12px">Skipped</div>';
  }
}

function renderHeatmap(){
  const today = new Date();
  const weeks = 20;
  let html = '<div class="heatmap-grid">';
  for(let w=weeks-1; w>=0; w--){
    html += '<div class="heatmap-col">';
    for(let d=0; d<7; d++){
      const date = new Date(today);
      date.setDate(date.getDate() - (w*7 + (6-d)));
      const key = date.toISOString().slice(0,10);
      const data = state.dailyActivity[key];
      let level = '';
      if(data){
        if(data.reviewed >= 40) level = 'l4';
        else if(data.reviewed >= 20) level = 'l3';
        else if(data.reviewed >= 10) level = 'l2';
        else level = 'l1';
      }
      const isFuture = date > today;
      html += `<div class="heatmap-cell ${isFuture?'':level}" title="${key}${data?' - '+data.reviewed+' reviewed':''}"></div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

const SENSITIVE_KEYS = ['apiKey', 'googleTtsKey', 'githubGistToken'];
function stripApiKeys(settings){
  const clean = Object.assign({}, settings);
  SENSITIVE_KEYS.forEach(k => delete clean[k]);
  return clean;
}

function getSyncOptions(){
  return { words:true, progress:true, settings:true, stats:true, apiKeys:false };

function getExportSettings(opt){
  if(!opt.settings) return null;
  return opt.apiKeys ? state.settings : stripApiKeys(state.settings);

// ===== GEMINI IMPORT (Smart JSON Parser) =====
let geminiImportPending = null;

function parseGeminiImport(){
  const el = document.getElementById('gemini-import-input');
  const preview = document.getElementById('gemini-import-preview');
  if(!el || !preview) return;
  let raw = el.value.trim();
  if(!raw){ toast('Paste some JSON first'); return; }

  // Strip markdown code fences if present
  raw = raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();

  let parsed;
  try{ parsed = JSON.parse(raw); }catch(e){ toast('Invalid JSON: '+e.message); return; }

  // Normalize to array of word objects
  const words = normalizeGeminiWords(parsed);
  if(!words || !words.length){ toast('Could not find any words in the JSON'); return; }

  // Dedupe against existing library
  const existing = new Set(WORDS.map(w=>w.word.toLowerCase()));
  const newWords = words.filter(w => !existing.has(w.word.toLowerCase()));
  const dupes = words.length - newWords.length;
  geminiImportPending = newWords;

  preview.innerHTML = `
    <div style="margin-top:10px;font-size:13px;color:var(--text2)">
      Found <b>${words.length}</b> words${dupes>0?' <span style="color:var(--text3)">('+dupes+' already in library)</span>':''}
    </div>
    ${newWords.length > 0 ? `
      <div style="max-height:240px;overflow-y:auto;margin:8px 0;border:1px solid var(--bg4);border-radius:8px;padding:4px 8px">
        ${newWords.map((w,i) => `<div style="padding:5px 0;border-bottom:1px solid var(--bg3);font-size:12px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <b style="color:var(--text)">${w.word}</b>
            ${w.phonetic?'<span style="color:var(--accent2);font-size:11px">/'+w.phonetic+'/</span>':''}
          </div>
          <div style="color:var(--text2)">${w.definition}</div>
          ${w.example?'<div style="color:var(--text3);font-style:italic;font-size:11px">"'+w.example+'"</div>':''}
        </div>`).join('')}
      </div>
      <button class="btn btn-sm" onclick="importGeminiWords()">Add ${newWords.length} Words to Library</button>
    ` : '<div style="color:var(--orange);font-size:12px;margin-top:8px">All words already in your library!</div>'}`;
}

function normalizeGeminiWords(data){
  // Case 1: Array of word objects [{word,definition,...}]
  if(Array.isArray(data)){
    if(data.length && typeof data[0] === 'object' && data[0] !== null){
      return data.map(normalizeWordObj).filter(Boolean);
    }
    return null;
  }

  if(typeof data !== 'object' || data === null) return null;

  // Case 2: {words:[...]} or {vocabulary:[...]} or {word_list:[...]}
  for(const key of Object.keys(data)){
    const v = data[key];
    if(Array.isArray(v) && v.length && typeof v[0] === 'object'){
      return v.map(normalizeWordObj).filter(Boolean);
    }
  }

  // Case 3: {"word": "definition"} flat dictionary
  const entries = Object.entries(data);
  if(entries.length && entries.every(([k,v]) => typeof v === 'string')){
    return entries.map(([word, definition]) => ({
      word, definition, example:'', category:'custom', difficulty:2, phonetic:'', grammar:null
    }));
  }

  // Case 4: {"word": {definition, example, ...}} nested dictionary
  if(entries.length && entries.every(([k,v]) => typeof v === 'object' && v !== null)){
    return entries.map(([word, obj]) => {
      const w = normalizeWordObj({word, ...obj});
      return w;
    }).filter(Boolean);
  }

  return null;
}

function normalizeWordObj(obj){
  if(!obj || typeof obj !== 'object') return null;
  // Flexible field mapping
  const word = obj.word || obj.term || obj.vocabulary || obj.phrase || obj.name || '';
  const definition = obj.definition || obj.meaning || obj.def || obj.explanation || obj.describe || obj.description || obj.chinese || obj.translation || obj['中文'] || obj['释义'] || obj['意思'] || '';
  const example = obj.example || obj.example_sentence || obj.sentence || obj.usage || obj.examples || obj['例句'] || '';
  const phonetic = obj.phonetic || obj.pronunciation || obj.ipa || obj['发音'] || '';
  const category = obj.category || obj.type || obj.tag || obj.group || 'custom';
  const difficulty = obj.difficulty || obj.level || 2;

  if(!word || !definition) return null;

  // Handle example as array
  const exStr = Array.isArray(example) ? example[0] || '' : String(example);

  const wordStr = String(word).trim();
  return {
    word: wordStr,
    definition: cleanDefinition(wordStr, String(definition).trim()),
    example: exStr.trim(),
    category: mapCategory(String(category).toLowerCase().trim()),
    difficulty: typeof difficulty === 'number' ? Math.min(3,Math.max(1,difficulty)) : 2,
    phonetic: String(phonetic).trim(),
    grammar: obj.grammar || null
  };
}

function mapCategory(cat){
  const map = {
    'slang':'slang','俚语':'slang',
    'workplace':'workplace','work':'workplace','office':'workplace','职场':'workplace','工作':'workplace',
    'social':'social','社交':'social',
    'idiom':'idioms','idioms':'idioms','成语':'idioms','习语':'idioms',
    'food':'food','饮食':'food',
    'weather':'weather','天气':'weather',
    'canadian':'canadian','canada':'canadian','加拿大':'canadian',
    'geography':'geography','地理':'geography',
    'essential':'essentials','essentials':'essentials','基础':'essentials','日常':'essentials',
    'engineering':'engineering','技术':'engineering','tech':'engineering',
    'academic':'academic','学术':'academic',
    'phrasal verb':'idioms','phrasal_verb':'idioms','短语动词':'idioms'
  };
  return map[cat] || 'custom';
}

function importGeminiWords(){
  if(!geminiImportPending || !geminiImportPending.length){ toast('No words to import'); return; }
  if(!state.customWords) state.customWords = [];
  let added = 0;
  geminiImportPending.forEach(w => {
    state.customWords.push(w);
    added++;
  });
  saveState();
  rebuildWords();
  geminiImportPending = null;
  toast(added + ' words added!');
  const preview = document.getElementById('gemini-import-preview');
  if(preview) preview.innerHTML = '<div style="color:var(--green);font-size:13px;padding:8px">&#10003; '+added+' words imported successfully!</div>';
  const input = document.getElementById('gemini-import-input');
  if(input) input.value = '';
}

function exportSyncFile(){
  const opt = getSyncOptions();
  const syncData = { v: 3 };
  if(opt.words){ syncData.cw = state.customWords || []; syncData.ash = state.aiSuggestHistory || []; }
  if(opt.progress){ syncData.wp = state.wordProgress; }
  if(opt.settings){ syncData.st = getExportSettings(opt); syncData.tu = state.ttsUsage; }
  if(opt.stats){ syncData.da = state.dailyActivity; syncData.s = state.streak; syncData.la = state.lastActiveDate; syncData.tq = state.totalQuizzes; syncData.tc = state.totalCorrect; syncData.ta = state.totalAnswered; syncData.xp = state.xp; syncData.rth = state.rtHistory; }
  const json = JSON.stringify(syncData, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vocab-sync-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  if(opt.settings && opt.apiKeys) toast('File exported! Warning: contains API keys, store safely.');
  else toast('File exported!');
}

function importSyncFile(input){
  const file = input.files[0];
  if(!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      const imported = [];
      if(data.cw){ state.customWords = data.cw; imported.push(data.cw.length+' words'); }
      if(data.ash) state.aiSuggestHistory = data.ash;
      if(data.wp){ state.wordProgress = data.wp; imported.push('progress'); }
      if(data.st){ Object.assign(state.settings, data.st); applyTheme(); imported.push('settings'); }
      if(data.tu) state.ttsUsage = data.tu;
      if(data.da) state.dailyActivity = data.da;
      if(data.s !== undefined) state.streak = data.s;
      if(data.la) state.lastActiveDate = data.la;
      if(data.tq !== undefined){ state.totalQuizzes = data.tq; imported.push('stats'); }
      if(data.tc !== undefined) state.totalCorrect = data.tc;
      if(data.ta !== undefined) state.totalAnswered = data.ta;
      if(data.xp) state.xp = data.xp;
      if(data.rth) state.rtHistory = data.rth;
      saveState();
      rebuildWords();
      toast('Imported: ' + (imported.join(', ') || 'data'));
      goTo('home');
    }catch(err){
      toast('Invalid file: ' + err.message);

  };

}

async function findSyncGist(token){
  const headers = { 'Authorization': 'token ' + token };
  const listResp = await fetch('https://api.github.com/gists?per_page=100', { headers, cache: 'no-store' });
  if(!listResp.ok) throw new Error('Failed to list gists: ' + listResp.status + (listResp.status===401?' (bad token)':''));
  const gists = await listResp.json();
  const gist = gists.find(g => g.files && Object.keys(g.files).some(f => /^vocab-slot-\d\.json$/.test(f) || f === 'vocab-sync.json'));
  if(!gist) return { gistId: null, slots: {}, legacyFile: null };
  const fullResp = await fetch('https://api.github.com/gists/' + gist.id, { headers, cache: 'no-store' });
  if(!fullResp.ok) throw new Error('Failed to fetch gist: ' + fullResp.status);
  const full = await fullResp.json();
  const slots = {};
  let legacyFile = null;
  for(const [name, file] of Object.entries(full.files)){
    const slotMatch = name.match(/^vocab-slot-(\d)\.json$/);
    if(slotMatch){
      try{
        const data = JSON.parse(file.content);
        const meta = data._meta || {};
        slots[parseInt(slotMatch[1])] = { words: meta.words || 0, date: meta.date || null };
      }catch(e){
        slots[parseInt(slotMatch[1])] = { words: 0, date: null };
      }
    } else if(name === 'vocab-sync.json'){
      try{
        const data = JSON.parse(file.content);
        legacyFile = { words: (data.cw || []).length, date: null };
      }catch(e){
        legacyFile = { words: 0, date: null };
      }
    }
  }
  return { gistId: gist.id, slots, legacyFile };
}

function renderSlotPicker(mode, gistId, slots, legacyFile){
  const area = document.getElementById('sync-code-area');
  let html = '<div style="margin-top:10px">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text)">' + (mode === 'export' ? 'Save to Slot' : 'Load from Slot') + '</div>';
  for(let i = 1; i <= 5; i++){
    const s = slots[i];
    const occupied = !!s;
    const info = occupied ? s.words + ' words' + (s.date ? ' \u00b7 ' + new Date(s.date).toLocaleDateString() : '') : 'Empty';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:4px">';
    html += '<div><span style="font-size:13px;font-weight:600;color:var(--accent)">Slot ' + i + '</span> <span style="font-size:12px;color:var(--text3);margin-left:6px">' + info + '</span></div>';
    const delBtn = occupied && gistId ? '<button class="btn btn-sm" style="width:auto;min-height:32px;padding:4px 10px;font-size:11px;color:var(--red);border-color:var(--red)" onclick="deleteGistSlot(' + i + ',\'' + gistId + '\',\'' + mode + '\')">\u2715</button>' : '';
    if(mode === 'export'){
      const label = occupied ? 'Overwrite' : 'Save';
      html += '<div style="display:flex;gap:4px">' + delBtn + '<button class="btn btn-sm" style="width:auto;min-height:32px;padding:4px 14px;font-size:12px" onclick="saveToGistSlot(' + i + ',\'' + (gistId || '') + '\',' + occupied + ')">' + label + '</button></div>';
    } else {
      if(occupied){
        html += '<div style="display:flex;gap:4px">' + delBtn + '<button class="btn btn-sm" style="width:auto;min-height:32px;padding:4px 14px;font-size:12px" onclick="loadGist(\'' + gistId + '\',\'vocab-slot-' + i + '.json\')">Load</button></div>';
      } else {
        html += '<span style="font-size:12px;color:var(--text3)">--</span>';
      }
    }
    html += '</div>';
  }
  if(legacyFile && mode === 'import'){
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border:2px dashed var(--orange);border-radius:8px;margin-top:6px">';
    html += '<div><span style="font-size:13px;font-weight:600;color:var(--orange)">Legacy</span> <span style="font-size:12px;color:var(--text3);margin-left:6px">' + legacyFile.words + ' words \u00b7 vocab-sync.json</span></div>';
    html += '<button class="btn btn-sm" style="width:auto;min-height:32px;padding:4px 14px;font-size:12px" onclick="loadGist(\'' + gistId + '\',\'vocab-sync.json\')">Load</button>';
    html += '</div>';
  }
  html += '</div>';
  area.innerHTML = html;
}

function buildGistSyncData(){
  const opt = getSyncOptions();
  const syncData = { v: 3 };
  if(opt.words){ syncData.cw = state.customWords || []; syncData.ash = state.aiSuggestHistory || []; }
  if(opt.progress){ syncData.wp = state.wordProgress; }
  if(opt.settings){ syncData.st = getExportSettings(opt); syncData.tu = state.ttsUsage; }
  if(opt.stats){ syncData.da = state.dailyActivity; syncData.s = state.streak; syncData.la = state.lastActiveDate; syncData.tq = state.totalQuizzes; syncData.tc = state.totalCorrect; syncData.ta = state.totalAnswered; syncData.xp = state.xp; syncData.rth = state.rtHistory; }
  syncData._meta = { words: (state.customWords || []).length, date: new Date().toISOString() };
  return { syncData, opt };
}

async function exportToGist(){
  if(!state.settings.githubGistToken){
    toast('Set GitHub token in Settings first');
    return;
  }
  try{
    toast('Loading save slots...');
    const token = state.settings.githubGistToken;
    const { gistId, slots, legacyFile } = await findSyncGist(token);
    renderSlotPicker('export', gistId, slots, legacyFile);
  }catch(e){
    console.error('Gist export error:', e);
    toast('Gist export failed: ' + e.message);
  }
}

async function saveToGistSlot(slotNum, gistId, isOccupied){
  if(isOccupied && !confirm('Slot ' + slotNum + ' already has data. Overwrite it?')) return;
  const { syncData, opt } = buildGistSyncData();
  if(opt.settings && opt.apiKeys){
    if(!confirm('You are about to upload API keys to GitHub Gist. This is a remote server — are you sure?')) return;
  }
  try{
    toast('Saving to Slot ' + slotNum + '...');
    const token = state.settings.githubGistToken;
    const json = JSON.stringify(syncData, null, 2);
    const fileName = 'vocab-slot-' + slotNum + '.json';
    const headers = { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' };
    let resp;
    if(gistId){
      resp = await fetch('https://api.github.com/gists/' + gistId, {
        method: 'PATCH', headers,
        body: JSON.stringify({ files: { [fileName]: { content: json } } })
      });
    } else {
      resp = await fetch('https://api.github.com/gists', {
        method: 'POST', headers,
        body: JSON.stringify({ description: 'Vocab Trainer Sync', public: false, files: { [fileName]: { content: json } } })
      });
    }
    if(!resp.ok) throw new Error('Upload failed: ' + resp.status);
    toast('Saved to Slot ' + slotNum + '! (' + new Date().toLocaleTimeString() + ')');
    const { gistId: newId, slots, legacyFile } = await findSyncGist(token);
    renderSlotPicker('export', newId, slots, legacyFile);
  }catch(e){
    console.error('Gist save error:', e);
    toast('Gist save failed: ' + e.message);
  }
}

async function deleteGistSlot(slotNum, gistId, mode){
  if(!confirm('Delete Slot ' + slotNum + '? This removes the data from GitHub.')) return;
  try{
    toast('Deleting Slot ' + slotNum + '...');
    const token = state.settings.githubGistToken;
    const fileName = 'vocab-slot-' + slotNum + '.json';
    const headers = { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' };
    const resp = await fetch('https://api.github.com/gists/' + gistId, {
      method: 'PATCH', headers,
      body: JSON.stringify({ files: { [fileName]: null } })
    });
    if(!resp.ok) throw new Error('Delete failed: ' + resp.status);
    toast('Slot ' + slotNum + ' deleted');
    const { gistId: newId, slots, legacyFile } = await findSyncGist(token);
    if(newId){
      renderSlotPicker(mode, newId, slots, legacyFile);
    } else {
      document.getElementById('sync-code-area').innerHTML = '<div style="margin-top:8px;font-size:13px;color:var(--text3)">All slots cleared. Export to create a new save.</div>';
    }
  }catch(e){
    console.error('Gist delete error:', e);
    toast('Gist delete failed: ' + e.message);
  }
}

async function importFromGist(){
  if(!state.settings.githubGistToken){

    console.error('Gist import error:', e);

  }
}

async function loadGist(gistId, fileName){
  try{
    toast('Downloading gist...');
    const token = state.settings.githubGistToken;
    const resp = await fetch('https://api.github.com/gists/' + gistId, {
      headers: { 'Authorization': 'token ' + token }, cache: 'no-store'
    });
    if(!resp.ok) throw new Error('Download failed: ' + resp.status);
    const gist = await resp.json();
    const file = gist.files[fileName];
    if(!file) throw new Error('File not found in gist');
    const data = JSON.parse(file.content);
    const imported = [];
    if(data.cw){ state.customWords = data.cw; imported.push(data.cw.length + ' words'); }
    if(data.ash) state.aiSuggestHistory = data.ash;
    if(data.wp){ state.wordProgress = data.wp; imported.push('progress'); }
    if(data.st){ Object.assign(state.settings, data.st); applyTheme(); imported.push('settings'); }
    if(data.tu) state.ttsUsage = data.tu;
    if(data.da) state.dailyActivity = data.da;
    if(data.s !== undefined) state.streak = data.s;
    if(data.la) state.lastActiveDate = data.la;
    if(data.tq !== undefined){ state.totalQuizzes = data.tq; imported.push('stats'); }
    if(data.tc !== undefined) state.totalCorrect = data.tc;
    if(data.ta !== undefined) state.totalAnswered = data.ta;
    if(data.xp) state.xp = data.xp;
    if(data.rth) state.rtHistory = data.rth;
    saveState();
    rebuildWords();
    toast('Imported: ' + (imported.join(', ') || 'data'));
    goTo('home');
  }catch(e){
    console.error('Gist load error:', e);
    toast('Failed to load gist: ' + e.message);
  }
}

function previewWordPack(){
  const el = document.getElementById('word-pack-input');
  if(!el) return;
  const raw = el.value.trim();
  if(!raw){ toast('Paste a JSON word pack first'); return; }
  try{
    let words = JSON.parse(raw);
    if(!Array.isArray(words)){ toast('Must be a JSON array'); return; }
    const existing = new Set(WORDS.map(w=>w.word.toLowerCase()));
    const newWords = words.filter(w=>w.word && w.definition && !existing.has(w.word.toLowerCase()));
    const dupes = words.length - newWords.length;
    const preview = document.getElementById('word-pack-preview');
    preview.innerHTML = `
      <div style="margin-top:12px;font-size:13px;color:var(--text2)">
        <b>${newWords.length}</b> new words${dupes>0?' <span style="color:var(--text3)">('+dupes+' duplicates skipped)</span>':''}
      </div>
      <div style="max-height:200px;overflow-y:auto;margin:8px 0">
        ${newWords.slice(0,30).map(w => '<div style="padding:4px 0;border-bottom:1px solid var(--bg3);font-size:12px"><b style="color:var(--text)">'+w.word+'</b> <span style="color:var(--text3)">'+w.definition.substring(0,60)+'</span></div>').join('')}
        ${newWords.length>30?'<div style="color:var(--text3);font-size:11px;padding:4px">...and '+(newWords.length-30)+' more</div>':''}
      </div>
      ${newWords.length>0?'<button class="btn btn-sm" onclick="importWordPack()">Add '+newWords.length+' Words to Library</button>':'<div style="color:var(--orange);font-size:12px">No new words to add</div>'}`;
    preview._pendingWords = newWords;
  }catch(e){
    toast('Invalid JSON: '+e.message);
    console.error('Word pack parse error:', e);
  }
}

function importWordPack(){
  const preview = document.getElementById('word-pack-preview');
  const words = preview?._pendingWords;
  if(!words || !words.length){ toast('No words to import'); return; }
  if(!state.customWords) state.customWords = [];
  let added = 0;
  words.forEach(w => {
    state.customWords.push({
      word: w.word,
      definition: w.definition,
      example: w.example || '',
      category: w.category || 'custom',
      difficulty: w.difficulty || 2,
      phonetic: w.phonetic || '',
      grammar: w.grammar || null
    });
    added++;
  });
  saveState();
  rebuildWords();
  toast(added + ' words added!');
  const area = document.getElementById('word-pack-area');
  if(area) area.innerHTML = '<div style="color:var(--green);font-size:13px;padding:8px">'+added+' words imported successfully!</div>';
}

// ===== REBUILD WORDS (includes custom) =====
function rebuildWords(){
  const base = WORDS_RAW.map((w,i) => ({
    id:i, word:w[0], definition:w[1], example:w[2], category:w[3], difficulty:w[4], phonetic:w[5]||'', grammar:w[6]||null
  }));
  // Auto-dedup custom words: remove duplicates of built-in words and duplicates within custom list
  const baseSet = new Set(base.map(w=>w.word.toLowerCase()));
  const seen = new Set();
  let deduped = false;
  const cleanCustom = (state.customWords || []).filter(w=>{
    const key = w.word.toLowerCase();
    if(baseSet.has(key) || seen.has(key)){ deduped = true; return false; }
    seen.add(key);
    return true;
  });
  if(deduped){ state.customWords = cleanCustom; saveState(); }
  const custom = cleanCustom.map((w,i) => ({
    id:10000+i, word:w.word, definition:w.definition, example:w.example||'', category:w.category||'custom', difficulty:w.difficulty||2, phonetic:w.phonetic||'', grammar:w.grammar||null, custom:true
  }));
  WORDS = [...base, ...custom];
}

async function toggleShadowRecord(){
  if(shadowRec && shadowRec.recording){
    // Stop
    shadowRec.recording = false;
    if(shadowRec.recorder && shadowRec.recorder.state === 'recording'){
      shadowRec.recorder.onstop = () => {
        if(shadowRec.stream) shadowRec.stream.getTracks().forEach(t=>t.stop());
        if(shadowRec.chunks.length){
          const blob = new Blob(shadowRec.chunks, {type:'audio/webm'});
          shadowRec.blobUrl = URL.createObjectURL(blob);
        }
        renderShadowing(document.getElementById('screen-ear'));
      };
      shadowRec.recorder.stop();
    }
  } else {
    // Start
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      shadowRec = { recording:true, recorder:null, stream, chunks:[], blobUrl:null };
      try{ shadowRec.recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'}); }
      catch(e){ shadowRec.recorder = new MediaRecorder(stream); }
      shadowRec.recorder.ondataavailable = e => { if(e.data.size>0) shadowRec.chunks.push(e.data); };
      shadowRec.recorder.start();
      renderShadowing(document.getElementById('screen-ear'));
    }catch(e){ toast('Microphone access denied'); }
  }
}

function playShadowRecording(){
  if(shadowRec && shadowRec.blobUrl) new Audio(shadowRec.blobUrl).play();
}

function playShadowResult(idx){
  const r = earState.results[idx];
  if(r && r.blobUrl) new Audio(r.blobUrl).play();
}

async function submitShadowRecording(){
  if(!shadowRec || !shadowRec.blobUrl) return;
  const loadEl = document.getElementById('shadow-loading');
  if(loadEl) loadEl.innerHTML = '<div class="ai-loading" style="margin-top:12px"><span></span><span></span><span></span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">AI is evaluating...</div>';

  const w = earState.words[earState.current];
  const resp = await fetch(shadowRec.blobUrl);
  const blob = await resp.blob();
  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });

  const prompt = `The learner is practicing English shadowing (repeat-after-me). They tried to say this sentence:
"${w.example}"

Listen to their recording and evaluate:
1. **Overall Rating**: Good / Needs Work / Keep Practicing
2. **Accuracy**: Did they say all the words correctly? Note any missing or wrong words.
3. **Pronunciation**: Point out specific sounds or words that need improvement. Give tips.
4. **Fluency**: Was it smooth and natural, or choppy/hesitant?

Give feedback in BOTH English and Chinese (中文). Keep it brief and encouraging (5-7 lines max). Start with the rating on the first line like: "Rating: Good"`;

  const result = await callGeminiWithAudio(base64, 'audio/webm', prompt, 'You are a friendly, encouraging English pronunciation coach for ESL learners in Canada. Give specific, actionable feedback. Always start with the overall rating.');

  if(result){
    // Extract rating from response
    let rating = 'Evaluated';
    if(/good/i.test(result.split('\n')[0])) rating = 'Good';
    else if(/needs?\s*work/i.test(result.split('\n')[0])) rating = 'Needs Work';
    else if(/keep\s*practicing/i.test(result.split('\n')[0])) rating = 'Keep Practicing';

    const isGood = rating === 'Good';
    if(isGood) earState.score++;
    earState.results[earState.current] = { feedback:result, rating, blobUrl:shadowRec.blobUrl, word:w };
    updateSRS(w.id, isGood ? 4 : 2, isGood ? 2 : 5);
    recordActivity(isGood);
    awardXP('shadowing', w.id, isGood ? 8 : 3);
  } else {
    earState.results[earState.current] = { feedback:'Could not evaluate. Check your Gemini API key.', rating:'Error', blobUrl:shadowRec.blobUrl, word:w };
  }
  renderShadowing(document.getElementById('screen-ear'));
}

async function startEarListening(){

  const due = getDueWords();
  const learning = WORDS.filter(w=>['beginner','learning','familiar'].includes(getWordStatus(w.id)));
  const pool = due.length >= 4 ? due : learning.length >= 4 ? learning : WORDS;
  shuffle(pool);
  const targetWords = pool.slice(0,5);
  earState = { mode:'listening', targetWords, passage:null, questions:null, answers:{}, revealed:false, score:0, ended:false, loading:true };
  goTo('ear');
  renderEarActive(document.getElementById('screen-ear'));

  const wordList = targetWords.map(w=>w.word).join(', ');
  const prompt = `Create a short listening comprehension exercise for ESL learners in Canada.

Use these vocabulary words naturally in a short passage (4-5 sentences): ${wordList}

The passage should be about everyday life in Canada (commuting, weather, shopping, work, etc).

Then create 3 multiple-choice questions about the passage. Each question has 4 options (A-D).

Reply in EXACTLY this JSON format, no extra text:
{"passage":"...","questions":[{"q":"...","options":["A) ...","B) ...","C) ...","D) ..."],"answer":0}]}

The "answer" field is the index (0-3) of the correct option.`;
  const result = await callGemini([{role:'user',text:prompt}],'You are an ESL listening comprehension test creator. Respond only with valid JSON. Keep language at intermediate level.');

      <button class="btn mb" onclick="startEarListening()">New Passage</button>
    ` : ''}
    <button class="btn btn-ghost" onclick="earState=null;goTo('ear')">Back</button>`;
  if(!earState.hasPlayed){ earState.hasPlayed = true; setTimeout(()=>speak(earState.passage),500); }
}

function answerListening(qi, oi){
  if(earState.answers[qi] !== undefined) return;
  earState.answers[qi] = oi;
  const correct = oi === earState.questions[qi].answer;
  if(correct) earState.score++;
  // Update SRS for target words used in this passage
  if(earState.targetWords){
    const perQ = Math.ceil(earState.targetWords.length / (earState.questions||[]).length);
    const startIdx = qi * perQ;
    const wordsForQ = earState.targetWords.slice(startIdx, startIdx + perQ);
    wordsForQ.forEach(w => {
      updateSRS(w.id, correct ? 4 : 2, correct ? 2 : 4);
      recordActivity(correct);
      awardXP('listening', w.id, correct ? 8 : 3);
    });
  }
  renderEarActive(document.getElementById('screen-ear'));
}

// ===== SUBSTITUTION DRILL (FSI) =====
let subDrillRec = null;

function startSubDrill(){
  if(!state.settings.apiKey){ toast('Add Gemini API key in Settings'); goTo('settings'); return; }
  const pool = WORDS.filter(w => w.example && w.example.length > 10);
  if(pool.length < 4){ toast('Need at least 4 words with examples'); return; }
  shuffle(pool);
  earState = { mode:'subdrill', words:pool.slice(0,8), current:0, score:0, results:[], loading:true, currentDrill:null, ended:false };
  subDrillRec = null;
  goTo('ear');
  generateSubDrill();
}

async function generateSubDrill(){
  const w = earState.words[earState.current];
  const vocabPool = getVocabPoolForPrompt(w.word, 30);
  const prompt = `Create a substitution drill for ESL learners.

Target word: "${w.word}" (${w.definition})

The learner knows these words: ${vocabPool}

Create a natural English sentence using "${w.word}", then identify the part that can be substituted with another word to make a different but grammatically correct sentence.

Reply in EXACTLY this JSON format:
{"sentence":"I need to commute to work every morning.","highlightWord":"commute","hint":"Replace the highlighted word with another word from your vocabulary","possibleSubs":["travel","drive","walk"]}

Keep the sentence at intermediate ESL level. The highlighted word should be the target word or closely related.`;

  const result = await callGemini([{role:'user',text:prompt}],'You are an FSI-style drill instructor for Canadian English ESL. Respond only with valid JSON.');
  earState.loading = false;
  if(result){
    try{
      const cleaned = cleanGeminiText(result);
      const data = JSON.parse(cleaned);
      earState.currentDrill = data;
    }catch(e){ earState.currentDrill = { sentence:w.example||`Use "${w.word}" in a sentence.`, highlightWord:w.word, hint:'Replace the highlighted word', possibleSubs:[] }; }
  } else { earState.currentDrill = { sentence:w.example||`Use "${w.word}" in a sentence.`, highlightWord:w.word, hint:'Replace the highlighted word', possibleSubs:[] }; }
  renderEarActive(document.getElementById('screen-ear'));
}

function renderSubDrill(el){
  if(earState.current >= earState.words.length){ renderSubDrillSummary(el); return; }
  if(earState.loading){
    el.innerHTML = `<div class="text-center" style="padding-top:60px"><div style="font-size:32px;margin-bottom:12px">&#128260;</div><h3>Generating drill...</h3><p class="subtitle">AI is creating a substitution exercise</p></div>`;
    return;
  }
  const w = earState.words[earState.current];
  const drill = earState.currentDrill;
  const result = earState.results[earState.current];
  const highlighted = drill.sentence.replace(new RegExp('\\b(' + escapeRegex(drill.highlightWord) + ')\\b','gi'), '<span class="highlight-word">$1</span>');

  el.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(earState.current/earState.words.length)*100}%"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text3);margin-bottom:12px">
      <span>${earState.current+1} / ${earState.words.length}</span>
      <button onclick="endSessionEarly('ear')" style="background:none;border:none;color:var(--red);font-size:12px;font-weight:600;cursor:pointer">&#10005; End</button>
      <span>Score: ${earState.score}</span>
    </div>
    <div class="card text-center mb">
      <div style="font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">&#128260; Substitution Drill</div>
      <div style="font-size:16px;color:var(--text);margin-bottom:8px;line-height:1.6">${highlighted}</div>
      <button class="btn btn-ghost btn-sm" onclick="speak(\`${drill.sentence.replace(/`/g,'').replace(/'/g,"\\'")}\`)" style="font-size:16px">&#128264; Listen</button>
      <div style="font-size:12px;color:var(--text3);margin-top:8px">${drill.hint}</div>
    </div>
    ${!result ? `
      <div class="card mb">
        <div style="font-size:12px;color:var(--text3);margin-bottom:8px">Type your new sentence (replacing "<strong>${drill.highlightWord}</strong>"):</div>
        <input type="text" id="sub-input" class="input" placeholder="Type your substituted sentence..." style="margin-bottom:8px" onkeydown="if(event.key==='Enter')submitSubDrill()">
        <div style="display:flex;gap:8px">
          <button class="btn" onclick="submitSubDrill()" style="flex:2">Submit</button>
          <button class="btn btn-ghost" onclick="skipSubDrill()" style="flex:1">Skip</button>
        </div>
        <div id="sub-loading"></div>
      </div>
    ` : `
      <div class="card mb">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <span style="font-weight:700;font-size:14px;color:${result.correct?'var(--green)':'var(--orange)'}">${result.correct?'&#10003; Correct':'&#10007; Needs Work'}</span>
        </div>
        <div style="font-size:13px;color:var(--text3);margin-bottom:4px">Your sentence:</div>
        <div style="font-size:14px;color:var(--text);margin-bottom:8px;font-style:italic">"${result.userSentence}"</div>
        <div style="font-size:13px;color:var(--text2);line-height:1.6">${result.feedback.replace(/\n/g,'<br>')}</div>
        ${result.corrected?`<div style="font-size:12px;color:var(--green);margin-top:6px">Suggested: "${result.corrected}"</div>`:''}
      </div>
      <button class="btn" onclick="nextSubDrill()">Next &#8594;</button>
    `}`;
  if(!result) setTimeout(()=>{const inp=document.getElementById('sub-input');if(inp)inp.focus()},100);
}

async function submitSubDrill(){
  const inp = document.getElementById('sub-input');
  if(!inp) return;
  const userSentence = inp.value.trim();
  if(!userSentence){ toast('Type a sentence first'); return; }
  const loadEl = document.getElementById('sub-loading');
  if(loadEl) loadEl.innerHTML = '<div class="ai-loading" style="margin-top:12px"><span></span><span></span><span></span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">AI is evaluating...</div>';

  const w = earState.words[earState.current];
  const drill = earState.currentDrill;
  const prompt = `Evaluate this substitution drill answer.

Original sentence: "${drill.sentence}"
Highlighted word to replace: "${drill.highlightWord}"
Learner's new sentence: "${userSentence}"

Check:
1. Did the learner successfully replace "${drill.highlightWord}" with a different word?
2. Is the new sentence grammatically correct?
3. Does it make sense semantically?

Reply in JSON: {"correct":true,"feedback":"Brief feedback in English and Chinese","corrected":"Optional corrected version if wrong"}
If mostly correct with minor issues, still mark correct:true but mention the issues.`;

  const result = await callGemini([{role:'user',text:prompt}],'You are an FSI drill evaluator for Canadian English ESL. Be encouraging. Respond only with valid JSON.');
  let evalData = { correct:false, feedback:'Could not evaluate.', corrected:'' };
  if(result){
    try{
      const cleaned = cleanGeminiText(result);
      evalData = JSON.parse(cleaned);
    }catch(e){ evalData.feedback = result; }
  }
  if(evalData.correct) earState.score++;
  earState.results[earState.current] = { userSentence, correct:evalData.correct, feedback:evalData.feedback, corrected:evalData.corrected||'', word:w, drill };
  updateSRS(w.id, evalData.correct ? 4 : 1, evalData.correct ? 2 : 5);
  recordActivity(evalData.correct);
  awardXP('subdrill', w.id, evalData.correct ? 10 : 3);
  renderEarActive(document.getElementById('screen-ear'));
}

function skipSubDrill(){
  const w = earState.words[earState.current];
  earState.results[earState.current] = { userSentence:'(skipped)', correct:false, feedback:'Skipped', corrected:'', word:w, drill:earState.currentDrill };
  updateSRS(w.id, 0, 10);
  recordActivity(false);
  renderEarActive(document.getElementById('screen-ear'));
}

function nextSubDrill(){
  earState.current++;
  if(earState.current < earState.words.length){
    earState.loading = true;
    earState.currentDrill = null;
    renderEarActive(document.getElementById('screen-ear'));
    generateSubDrill();
  } else {
    renderEarActive(document.getElementById('screen-ear'));
  }
}

function renderSubDrillSummary(el){
  earState.ended = true;

async function generateLRPrompts(scenarioId){
  const scenario = LISTEN_RESPOND_SCENARIOS.find(s=>s.id===scenarioId);
  const vocabPool = getVocabPoolForPrompt('', 40);
  const prompt = `Create 6 conversational prompts for a Pimsleur-style listen-and-respond drill.

Scenario: ${scenario.label}
Difficulty: ${scenario.difficulty}/3
The learner knows these words: ${vocabPool}

For each prompt, create a realistic thing someone might say to the learner in this scenario. The learner must respond naturally.

Reply in EXACTLY this JSON format:
{"prompts":[{"prompt":"Good morning! How was your weekend?","expectedIdea":"Respond with a greeting and briefly share what you did","keyPhrases":["It was great","I went to","Thanks for asking"],"difficulty":${scenario.difficulty}}]}

Create 6 prompts, gradually increasing in complexity. Use Canadian English. Keep prompts natural and workplace-appropriate.`;

  const result = await callGemini([{role:'user',text:prompt}],'You are a Pimsleur-style drill instructor for Canadian English. Create realistic workplace conversation prompts. Respond only with valid JSON.');
  if(result){
    try{
      const cleaned = cleanGeminiText(result);
      const data = JSON.parse(cleaned);
      earState.prompts = data.prompts || [];
      earState.phase = 'speak';
    }catch(e){ toast('AI format error, try again'); earState = { mode:'listenrespond', phase:'pick' }; }
  } else { toast('AI error'); earState = { mode:'listenrespond', phase:'pick' }; }
  renderEarActive(document.getElementById('screen-ear'));
  // Auto-speak first prompt
  if(earState.phase === 'speak' && earState.prompts.length > 0){
    setTimeout(()=>speak(earState.prompts[0].prompt), 500);

}

function startLRThink(){
  earState.phase = 'think';
  renderEarActive(document.getElementById('screen-ear'));
}

function startLRCountdown(){
  let count = 3;
  const timerEl = document.getElementById('lr-timer');
  if(!timerEl) return;
  const interval = setInterval(()=>{
    count--;
    if(count <= 0){
      clearInterval(interval);
      earState.phase = 'record';
      renderEarActive(document.getElementById('screen-ear'));
      // Auto-start recording
      setTimeout(()=>toggleLRRecord(), 300);
    } else {
      if(timerEl) timerEl.textContent = count;
    }
  }, 1000);
}

async function toggleLRRecord(){
  if(lrRec && lrRec.recording){
    lrRec.recording = false;
    if(lrRec.recorder && lrRec.recorder.state === 'recording'){
      lrRec.recorder.onstop = () => {
        if(lrRec.stream) lrRec.stream.getTracks().forEach(t=>t.stop());
        if(lrRec.chunks.length){
          const blob = new Blob(lrRec.chunks, {type:'audio/webm'});
          lrRec.blobUrl = URL.createObjectURL(blob);
        }
        renderEarActive(document.getElementById('screen-ear'));
      };
      lrRec.recorder.stop();
    }
  } else {
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      lrRec = { recording:true, recorder:null, stream, chunks:[], blobUrl:null };
      try{ lrRec.recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'}); }
      catch(e){ lrRec.recorder = new MediaRecorder(stream); }
      lrRec.recorder.ondataavailable = e => { if(e.data.size>0) lrRec.chunks.push(e.data); };
      lrRec.recorder.start();
      renderEarActive(document.getElementById('screen-ear'));
    }catch(e){ toast('Microphone access denied'); }
  }
}

function playLRRecording(){
  if(lrRec && lrRec.blobUrl) new Audio(lrRec.blobUrl).play();
}

function playLRResult(idx){
  const r = earState.results[idx];
  if(r && r.blobUrl) new Audio(r.blobUrl).play();
}

async function submitLRResponse(){
  if(!lrRec || !lrRec.blobUrl) return;
  const loadEl = document.getElementById('lr-loading');
  if(loadEl) loadEl.innerHTML = '<div class="ai-loading" style="margin-top:12px"><span></span><span></span><span></span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">AI is evaluating...</div>';

  const p = earState.prompts[earState.current];
  const resp = await fetch(lrRec.blobUrl);
  const blob = await resp.blob();
  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });

  const prompt = `The learner is doing a Pimsleur-style listen-and-respond drill.

Scenario: ${earState.scenario.label}
They were asked: "${p.prompt}"
A good response would: ${p.expectedIdea}
Key phrases to look for: ${p.keyPhrases.join(', ')}

Listen to the learner's spoken response and evaluate:
1. **Rating**: Good / Needs Work / Try Again
2. **Content**: Did they respond appropriately to the prompt?
3. **Grammar**: Any grammar issues?
4. **Pronunciation**: Any notable pronunciation issues?
5. **Suggested Response**: Give a natural example response

Give feedback in BOTH English and Chinese (中文). Keep it brief and encouraging (5-7 lines max). Start with the rating on the first line like: "Rating: Good"
Then after feedback, on a new line write: "Suggested: [a natural example response]"`;

  const result = await callGeminiWithAudio(base64, 'audio/webm', prompt, 'You are a friendly Pimsleur-style conversation coach for Canadian English ESL learners. Be encouraging and specific.');

  if(result){
    let rating = 'Evaluated';
    if(/good/i.test(result.split('\n')[0])) rating = 'Good';
    else if(/needs?\s*work/i.test(result.split('\n')[0])) rating = 'Needs Work';
    else if(/try\s*again/i.test(result.split('\n')[0])) rating = 'Try Again';

    let suggested = '';
    const sugMatch = result.match(/Suggested:\s*"?([^"]+)"?/i);
    if(sugMatch) suggested = sugMatch[1].trim();

    const isGood = rating === 'Good';
    if(isGood) earState.score++;
    earState.results[earState.current] = { feedback:result.replace(/Suggested:.*$/im,'').trim(), rating, blobUrl:lrRec.blobUrl, prompt:p, suggested };
    recordActivity(isGood);
    // XP for Listen & Respond (scenario-based, no word ID)
    awardXP('listen-respond:' + earState.scenario.id, null, isGood ? 25 : 10);
  } else {
    earState.results[earState.current] = { feedback:'Could not evaluate. Check your API key.', rating:'Error', blobUrl:lrRec.blobUrl, prompt:p, suggested:'' };
  }
  earState.phase = 'evaluated';
  renderEarActive(document.getElementById('screen-ear'));
}

async function generatePlacementQuiz(){

  pretestState.step = 'loading';
  renderPretest(document.getElementById('screen-pretest'));
  const bg = pretestState.bg;
  const prompt = `Generate a 15-question multiple-choice vocabulary assessment for a Canadian English learner.

Learner profile:
- Time in Canada: ${bg.time}
- Field: ${bg.field}
- Self-assessed level: ${bg.level}
- Wants to improve: ${[...bg.focus].join(', ')}

Requirements:
- 5 easy questions (common Canadian terms, basic workplace words)
- 5 medium questions (idioms, slang, workplace phrases)
- 5 hard questions (advanced jargon, cultural nuances, tricky pronunciation)
- Cover these areas: Canadian slang, workplace language, social phrases, Canadian culture, pronunciation
- Each question tests if the learner knows what a Canadian English word/phrase means
- Make questions relevant to their field and focus area

Return ONLY a JSON array of 15 questions:
[{"q":"What does 'toque' mean in Canada?","options":["A winter hat","A type of cake","A greeting","A sport"],"answer":0,"category":"slang","difficulty":1},...]

answer = index of correct option (0-3)
category = one of: slang, workplace, social, culture, pronunciation, technical
difficulty = 1 (easy), 2 (medium), 3 (hard)`;

  try{

async function analyzePlacementResults(){
  pretestState.step = 'analyzing';
  renderPretest(document.getElementById('screen-pretest'));
  const bg = pretestState.bg;
  const results = pretestState.answers;
  const totalCorrect = results.filter(r=>r.correct).length;
  const byCategory = {};
  results.forEach(r => {
    if(!byCategory[r.category]) byCategory[r.category] = {correct:0, total:0};
    byCategory[r.category].total++;
    if(r.correct) byCategory[r.category].correct++;
  });

  const prompt = `A Canadian English learner just completed a vocabulary assessment.

Profile: ${bg.time} in Canada, works in ${bg.field}, self-assessed ${bg.level}, wants to improve ${[...bg.focus].join(', ')}.

Score: ${totalCorrect}/${results.length}
By category: ${JSON.stringify(byCategory)}
Wrong answers: ${JSON.stringify(results.filter(r=>!r.correct).map(r=>pretestState.questions[r.qIdx].q))}

Based on these results, recommend 4-6 vocabulary packs. For each pack, generate 15 words with definitions and example sentences relevant to Canadian English and the learner's profile.

Return ONLY JSON:
{"level":"beginner/intermediate/advanced",
"summary":"1-2 sentence assessment",
"packs":[
  {"name":"Pack Name","desc":"short description","match":85,"words":[
    {"word":"...","definition":"...","example":"...","category":"slang","difficulty":2},
    ...15 words
  ]},
  ...4-6 packs
]}

Categories to use: slang, workplace, social, culture, essentials, idioms
Difficulty: 1-3
Make words practical and Canada-specific. Include Canadian spelling (colour, centre, etc).`;

  try{
    const res = await callGemini([{role:'user',text:prompt}]);
    if(!res){ toast('Analysis failed'); pretestState.step='background'; renderPretest(document.getElementById('screen-pretest')); return; }
    let clean = res.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const data = JSON.parse(clean);
    pretestState.result = data;
    pretestState.selectedPacks = new Set(data.packs.map((_,i)=>i));
    pretestState.step = 'results';
    renderPretest(document.getElementById('screen-pretest'));
  }catch(e){
    console.error(e);
    toast('Error: '+e.message);
    pretestState.step = 'background';
    renderPretest(document.getElementById('screen-pretest'));
  }
}

async function addPlacementPacks(){
  const data = pretestState.result;
  const sel = pretestState.selectedPacks;
  if(!state.customWords) state.customWords = [];
  const existingWords = new Set(WORDS.map(w=>w.word.toLowerCase()));
  let added = 0;
  data.packs.forEach((p,i) => {
    if(!sel.has(i)) return;
    p.words.forEach(w => {
      const key = w.word.toLowerCase();
      if(existingWords.has(key)) return;
      existingWords.add(key);
      state.customWords.push({word:w.word, definition:w.definition, example:w.example||'', category:w.category||'custom', difficulty:w.difficulty||2});
      added++;
    });
  });
  saveState();
  rebuildWords();
  toast(added+' words added to your library!');
  pretestState = null;
  goTo('home');
}

function addCustomWord(){
  const word = document.getElementById('add-word')?.value.trim();
  const def = document.getElementById('add-def')?.value.trim();
  const example = document.getElementById('add-example')?.value.trim();
  const cat = document.getElementById('add-cat')?.value;
  const diff = +(document.getElementById('add-diff')?.value || 2);
  if(!word || !def){ toast('Word and definition are required'); return; }
  const exists = WORDS.find(w=>w.word.toLowerCase()===word.toLowerCase());
  if(exists){
    showDuplicateWarning(exists, {word, definition:def, example:example||'', category:cat, difficulty:diff});
    return;
  }
  const newWord = { word, definition:def, example:example||'', category:cat, difficulty:diff };
  if(pendingGrammar) newWord.grammar = pendingGrammar;
  state.customWords.push(newWord);
  pendingGrammar = null;
  pendingMeanings = [];
  saveState();
  rebuildWords();
  // XP for learning a new word
  const addedWord = WORDS.find(w => w.word.toLowerCase() === word.toLowerCase());
  if(addedWord) awardXP('newword', addedWord.id, 20);
  toast('"'+word+'" added!');
  renderAddWords(document.getElementById('screen-addwords'));

      </div>

        <button class="btn btn-sm" onclick="forceAddWord('replace')">Replace Existing</button>
        <button class="btn btn-sm btn-ghost" style="color:var(--blue)" onclick="forceAddWord('combine')">Combine Definitions</button>
        <button class="btn btn-sm btn-ghost" onclick="forceAddWord('both')">Keep Both</button>
        <button class="btn btn-sm btn-ghost" style="color:var(--text3)" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>`;

  root._pendingExisting = existing;
}

function forceAddWord(action){
  const root = document.getElementById('modal-root');
  const newWord = root._pendingNewWord;
  const existing = root._pendingExisting;
  if(!newWord || !existing) return;
  if(action === 'replace'){
    const idx = (state.customWords||[]).findIndex(c=>c.word.toLowerCase()===existing.word.toLowerCase());
    if(idx >= 0){
      state.customWords[idx] = newWord;
      if(pendingGrammar) state.customWords[idx].grammar = pendingGrammar;
    }
    toast('"'+newWord.word+'" replaced!');
  } else if(action === 'combine'){
    const idx = (state.customWords||[]).findIndex(c=>c.word.toLowerCase()===existing.word.toLowerCase());
    if(idx >= 0){
      const oldDef = state.customWords[idx].definition;
      const hasMutliple = oldDef.match(/^\d+\./);
      if(hasMutliple){
        const count = (oldDef.match(/\d+\./g)||[]).length;
        state.customWords[idx].definition = oldDef + '; ' + (count+1) + '. ' + newWord.definition;
      } else {
        state.customWords[idx].definition = '1. ' + oldDef + '; 2. ' + newWord.definition;
      }
      if(newWord.example && !state.customWords[idx].example.includes(newWord.example)){
        state.customWords[idx].example += ' / ' + newWord.example;
      }
    }
    toast('Definitions combined!');
  } else if(action === 'both'){
    if(pendingGrammar) newWord.grammar = pendingGrammar;
    state.customWords.push(newWord);
    toast('"'+newWord.word+'" added as second entry!');
  }
  pendingGrammar = null;
  pendingMeanings = [];
  closeModal();
  saveState();
  rebuildWords();
  renderAddWords(document.getElementById('screen-addwords'));
}

{"meanings":[{"definition":"...","example":"..."}],"category":"...","difficulty":1,"grammar":{"pos":"...","related":"...","usage":"..."}}

  const result = await callGemini([{role:'user',text:prompt}],'You are a dictionary. Respond only with valid JSON. Keep definitions simple for ESL learners. When possible, use the learner\'s other vocabulary words in definitions and examples.');

        syncMeaningsToFields();
        renderMeaningsList();
      }
      if(data.category && CATEGORIES[data.category]){
        document.getElementById('add-cat').value = data.category;

      if(data.difficulty && [1,2,3].includes(data.difficulty)){

  const prompt = `Generate 15 useful English words/phrases related to "${topic}" that a newcomer to Canada should learn.

IMPORTANT RULES:
- Do NOT include any of these words: ${allExclude.slice(0,120).join(', ')}

// ===== GEMINI API =====
async function callGemini(messages, systemInstruction){
  const key = state.settings.apiKey;
  if(!key){ toast('Add your Gemini API key in Settings'); goTo('settings'); return null; }
  const contents = messages.map(m => {
    const role = m.role==='assistant'?'model':'user';
    if(m.parts) return {role, parts:m.parts};
    return {role, parts:[{text:m.text||''}]};
  });
  const body = { contents };
  if(systemInstruction) body.systemInstruction = { parts:[{text:systemInstruction}] };
  try{
    const res = await fetch(getGeminiUrl(key),
      { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if(!res.ok){
      const err = await res.text().catch(()=>'');
      console.error('Gemini API error:', res.status, err);
      let msg = 'API error: '+res.status;
      try{ const j=JSON.parse(err); msg=j.error?.message||msg; }catch(e){}
      toast(msg);
      return null;
    }
    const data = await res.json();
    console.log('Gemini response:', JSON.stringify(data).substring(0,500));
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!text){
      const reason = data.candidates?.[0]?.finishReason || data.promptFeedback?.blockReason || 'empty response';
      console.error('Gemini no text:', reason, JSON.stringify(data).substring(0,500));
      toast('AI returned no content: '+reason);
      return null;
    }
    return cleanGeminiText(text);
  }catch(e){ console.error('Gemini network error:', e); toast('Network error: '+e.message); return null; }
}

function cleanGeminiText(text){
  if(!text) return text;
  return text.replace(/^```(?:json)?\s*/gi,'').replace(/\s*```$/g,'').replace(/^json\s*\n/i,'').trim();
}

async function callGeminiWithAudio(audioBase64, mimeType, textPrompt, systemInstruction){
  const key = state.settings.apiKey;
  if(!key){ toast('Add your Gemini API key in Settings'); goTo('settings'); return null; }
  const parts = [{inlineData:{mimeType, data:audioBase64}}];
  if(textPrompt) parts.push({text:textPrompt});
  const body = { contents:[{role:'user', parts}] };
  if(systemInstruction) body.systemInstruction = { parts:[{text:systemInstruction}] };
  try{
    const res = await fetch(getGeminiUrl(key),
      { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    if(!res.ok){ const err=await res.text(); console.error(err); toast('API error: '+res.status); return null; }
    const data = await res.json();
    return data.candidates?.[0]?.content?.parts?.[0]?.text || null;
  }catch(e){ toast('Network error'); console.error(e); return null; }
}

// Audio recording utility
let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
const chatRecordings = [];
let pendingChatAudioUrl = null;

let recordResolve = null;

function startRecording(){
  return new Promise((resolve, reject) => {
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
      audioChunks = [];
      mediaRecorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'});
      mediaRecorder.ondataavailable = e => { if(e.data.size>0) audioChunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t=>t.stop());
        const blob = new Blob(audioChunks, {type:'audio/webm'});
        const blobUrl = URL.createObjectURL(blob);
        const reader = new FileReader();
        reader.onloadend = () => {
          const result = {base64:reader.result.split(',')[1], mimeType:'audio/webm', blobUrl};
          if(recordResolve){ recordResolve(result); recordResolve = null; }
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.onerror = e => reject(e);
      mediaRecorder.start();
      isRecording = true;
      resolve(true);
    }).catch(e => { toast('Microphone access denied'); reject(e); });
  });
}

function stopRecording(){
  return new Promise(resolve => {
    if(mediaRecorder && mediaRecorder.state === 'recording'){
      recordResolve = resolve;
      mediaRecorder.stop();
      isRecording = false;
    } else { resolve(null); }
  });
}

function playRecording(idx){
  if(chatRecordings[idx]){
    const a = new Audio(chatRecordings[idx]);
    a.play().catch(()=>toast('Could not play recording'));
  }
}

let voiceChatActive = false;

async function sendVoiceChat(){
  if(!chatState || chatState.ended) return;
  const el = document.getElementById('screen-chat');
  const micBtn = document.getElementById('voice-chat-mic');

  if(isRecording){
    // Stop recording and send
    if(micBtn){ micBtn.classList.remove('listening'); micBtn.innerHTML = '&#9203;'; }
    const audio = await stopRecording();
    if(!audio){ renderChat(el, false); return; }

    // Single Gemini call: transcribe + respond
    const context = chatState.messages.map(m =>
      (m.role==='user'?'User':'Assistant') + ': ' + m.text
    ).join('\n');
    const textPrompt = `Listen to this audio message from the user.${context?'\n\nPrevious conversation:\n'+context:''}

IMPORTANT: Reply in this exact format (two lines):
HEARD: (write exactly what the user said)
REPLY: (your response in character)`;

    renderChat(el, true);
    const fullReply = await callGeminiWithAudio(audio.base64, audio.mimeType, textPrompt, chatState.systemPrompt);
    if(!fullReply){ renderChat(el,false); return; }

    let userText = '(voice message)';
    let aiText = fullReply;
    const heardMatch = fullReply.match(/HEARD:\s*(.*?)(?:\n|REPLY:)/s);
    const replyMatch = fullReply.match(/REPLY:\s*([\s\S]*)/);
    if(heardMatch) userText = heardMatch[1].trim();
    if(replyMatch) aiText = replyMatch[1].trim();
    if(!heardMatch && !replyMatch) aiText = fullReply;

    const recIdx = chatRecordings.length;
    chatRecordings.push(audio.blobUrl);
    chatState.messages.push({role:'user', text:userText, recIdx});
    chatState.aiMessages.push({role:'user', text:userText});
    chatState.messages.push({role:'ai', text:aiText});
    chatState.aiMessages.push({role:'assistant', text:aiText});

    chatState.targetWords.forEach(w=>{
      const combined = (userText+' '+aiText).toLowerCase();
      if(combined.includes(w.word.toLowerCase())) chatState.usedWords.add(w.word);
    });
    renderChat(el, false);
    speak(aiText);
  } else {
    // Start recording
    try{
      await startRecording();
      if(micBtn){ micBtn.classList.add('listening'); micBtn.innerHTML = '&#9899; Tap to send'; }
    }catch(e){ console.error(e); }
  }
}

let chatState = null;

function startChat(scenarioId){
  const scenario = scenarioId ? SCENARIOS.find(s=>s.id===scenarioId) : SCENARIOS[Math.floor(Math.random()*SCENARIOS.length)];
  const vocabWords = WORDS.filter(w=>scenario.categories.includes(w.category));
  shuffle(vocabWords);
  const targetWords = vocabWords.slice(0,8);
  chatState = { scenario, targetWords, messages:[], aiMessages:[], usedWords:new Set(), ended:false, feedback:null };
  if(scenario.customPrompt){
    chatState.systemPrompt = scenario.customPrompt;
  } else {
    chatState.systemPrompt = `You are a friendly Canadian person in this scenario: "${scenario.title}" - ${scenario.desc}.
Role-play naturally as the other person in this conversation. You are helping a newcomer to Canada practice English.
Rules:
- Keep responses SHORT (1-3 sentences max)
- Use natural, casual Canadian English
- Gently use some of these vocabulary words in your responses when appropriate: ${targetWords.map(w=>w.word).join(', ')}
- If the user makes grammar/vocab mistakes, don't correct them mid-conversation — just respond naturally
- Be warm, patient, and encouraging
- Stay in character for the scenario
- Do NOT break character or mention that you're an AI
Start the conversation by greeting the user in character.`;
  }
  goTo('chat');
  sendChatAI();
}

  const topic = document.getElementById('custom-scenario-input')?.value.trim();

  const vocabWords = WORDS;
  shuffle(vocabWords);
  const targetWords = vocabWords.slice(0,8);
  chatState = { scenario, targetWords, messages:[], aiMessages:[], usedWords:new Set(), ended:false, feedback:null };
  chatState.systemPrompt = `You are a friendly Canadian person in this scenario: "${topic}".
Role-play naturally as the other person in this conversation. You are helping a newcomer to Canada practice English.
Rules:
- Keep responses SHORT (1-3 sentences max)
- Use natural, casual Canadian English
- Gently use some of these vocabulary words in your responses when appropriate: ${targetWords.map(w=>w.word).join(', ')}
- If the user makes grammar/vocab mistakes, don't correct them mid-conversation — just respond naturally
- Be warm, patient, and encouraging
- Stay in character for the scenario
- Do NOT break character or mention that you're an AI
Start the conversation by greeting the user in character.`;

function startFreeChat(){
  const scenario = {id:'free',title:'Free Chat',desc:'Chat freely about anything with grammar correction',categories:Object.keys(CATEGORIES),icon:'&#128172;'};
  const due = getDueWords();
  const weak = WORDS.filter(w => {const s=getWordStatus(w.id); return s==='beginner'||s==='learning';});
  const reviewWords = [...due, ...weak];
  shuffle(reviewWords);
  const targetWords = reviewWords.slice(0,10);
  const wordList = targetWords.length ? targetWords.map(w => w.word + ' (' + w.definition + ')').join(', ') : 'none yet';
  chatState = { scenario, targetWords, messages:[], aiMessages:[], usedWords:new Set(), ended:false, feedback:null, isFreeChat:true };
  chatState.systemPrompt = `You are a bilingual English-Chinese language tutor for a Chinese speaker learning Canadian English.
Rules:
- Chat freely about ANY topic the user wants to discuss
- Respond naturally in English, keep responses concise (2-4 sentences)
- IMPORTANT: After your main response, if the user made ANY grammar, vocabulary, spelling, or phrasing errors in their last message, add a correction section on new lines:
[Correction]
X: [user's incorrect text]
O: [corrected version]
Tip: [brief explanation in Chinese - why this is wrong and the correct usage]
- You may have multiple X/O/Tip groups if there are multiple errors
- If the user's English was perfect, do NOT add any correction section
- If the user writes in Chinese, respond in English and encourage them to try in English
- Try to naturally incorporate these vocabulary words when relevant: ${wordList}
- Be warm, patient, and encouraging
Start by greeting the user warmly in English and asking what they'd like to chat about today.`;
  goTo('chat');
  sendChatAI();
}

async function sendChatAI(){
  const el = document.getElementById('screen-chat');
  renderChat(el, true);
  const msgs = chatState.messages.length===0
    ? [{role:'user',text:'Start the conversation.'}]
    : chatState.aiMessages;
  const reply = await callGemini(msgs, chatState.systemPrompt);
  if(!reply){ renderChat(el,false); return; }
  chatState.messages.push({role:'ai',text:reply});
  chatState.aiMessages.push({role:'assistant',text:reply});
  chatState.targetWords.forEach(w=>{
    if(reply.toLowerCase().includes(w.word.toLowerCase())) chatState.usedWords.add(w.word);
  });
  renderChat(el, false);
  speak(reply);
}

async function sendChatUser(){
  const input = document.getElementById('chat-input');
  if(!input) return;
  const text = input.value.trim();
  if(!text) return;
  const msg = {role:'user', text};
  if(pendingChatAudioUrl){
    msg.recIdx = chatRecordings.length;
    chatRecordings.push(pendingChatAudioUrl);
    pendingChatAudioUrl = null;
  }
  chatState.messages.push(msg);
  chatState.aiMessages.push({role:'user',text});
  chatState.targetWords.forEach(w=>{
    if(text.toLowerCase().includes(w.word.toLowerCase())) chatState.usedWords.add(w.word);
  });
  input.value = '';
  await sendChatAI();
}

function chatVoiceInput(){
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)){
    toast('Voice recognition not supported in this browser'); return;
  }
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-CA';
  recognition.interimResults = false;
  const micBtn = document.getElementById('chat-mic');
  if(micBtn){ micBtn.style.background = 'var(--red)'; micBtn.innerHTML = '&#9899;'; }
  // Also record audio for playback
  let recStream = null, recChunks = [], recorder = null;
  pendingChatAudioUrl = null;
  navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
    recStream = stream;
    try{ recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'}); }
    catch(e){ recorder = new MediaRecorder(stream); }
    recorder.ondataavailable = e => { if(e.data.size>0) recChunks.push(e.data); };
    recorder.start();
  }).catch(()=>{});
  function stopRec(){
    if(recorder && recorder.state==='recording'){
      recorder.onstop = () => {
        if(recStream) recStream.getTracks().forEach(t=>t.stop());
        if(recChunks.length){
          const blob = new Blob(recChunks, {type:'audio/webm'});
          pendingChatAudioUrl = URL.createObjectURL(blob);
        }
      };
      recorder.stop();
    } else if(recStream){ recStream.getTracks().forEach(t=>t.stop()); }
  }
  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    const input = document.getElementById('chat-input');
    if(input){ input.value = transcript; input.focus(); }
    if(micBtn){ micBtn.style.background = 'var(--bg3)'; micBtn.innerHTML = '&#127908;'; }
    stopRec();
  };
  recognition.onerror = () => {
    toast('Could not hear you. Try again.');
    if(micBtn){ micBtn.style.background = 'var(--bg3)'; micBtn.innerHTML = '&#127908;'; }
    stopRec(); pendingChatAudioUrl = null;
  };
  recognition.onend = () => {
    if(micBtn && micBtn.style.background !== 'var(--bg3)'){
      micBtn.style.background = 'var(--bg3)'; micBtn.innerHTML = '&#127908;';
    }
  };
  recognition.start();
}

async function endChat(){
  chatState.ended = true;
  const convo = chatState.messages.map(m=>`${m.role==='user'?'Learner':'Partner'}: ${m.text}`).join('\n');
  const targetList = chatState.targetWords.map(w=>`${w.word}: ${w.definition}`).join('\n');
  const feedbackPrompt = chatState.isLanguageParent
    ? `You were a Language Parent (Chris Lonsdale method) for an ESL learner.
Here is the conversation:
${convo}

Give brief, warm feedback (3-5 bullet points):
- What topics they communicated about successfully (focus on WHAT they said, not HOW)
- New words or phrases they picked up during the conversation
- Their confidence growth during the session
- One simple phrase they could try using tomorrow in real life
- Overall encouragement — emphasize how much they communicated, not accuracy
Keep it very encouraging and simple. Use bullet points with -. Include Chinese translation for any suggested phrases.`
    : `You helped a newcomer to Canada practice English in this scenario: "${chatState.scenario.title}".
Here is the conversation:
${convo}

The target vocabulary words were:
${targetList}

Give brief, encouraging feedback (3-5 bullet points):
- Which vocab words they used well
- 1-2 grammar or phrasing tips if relevant
- A natural Canadian phrase they could try next time
- Overall encouragement
Keep it short and friendly. Use bullet points with -.`;
  const el = document.getElementById('screen-chat');
  renderChat(el, true);
  const feedback = await callGemini([{role:'user',text:feedbackPrompt}],'You are a friendly ESL teacher giving brief feedback on a conversation practice session.');
  chatState.feedback = feedback;
  const chatXPSource = chatState.isLanguageParent ? 'langparent' : chatState.isFreeChat ? 'freechat' : 'chat:' + chatState.scenario.id;
  chatState.targetWords.forEach(w=>{
    if(chatState.usedWords.has(w.word)){
      updateSRS(w.id,4,2);
      recordActivity(true);
      awardXP(chatXPSource, w.id, 10);
    }
  });
  // Suggest new words from conversation
  chatState.suggestedWords = [];
  renderChat(el, false);
  if(state.settings.apiKey && chatState.messages.length >= 4){
    const existingWords = WORDS.map(w=>w.word.toLowerCase());
    const existingSample = existingWords.slice(0,200).join(', ');
    const suggestPrompt = 'From this English conversation, list 3-5 useful vocabulary words or phrases that the learner might not know. Do NOT suggest words already in this list: ' + existingSample + '\n\nConversation:\n' + convo + '\n\nReply in JSON array: [{"word":"...","definition":"simple definition for ESL learner","example":"example sentence","category":"..."}]\nCategories: ' + Object.keys(CATEGORIES).filter(k=>k!=='custom').join(', ');
    callGemini([{role:'user',text:suggestPrompt}],'You are an ESL teacher. Suggest vocabulary. Reply only with valid JSON array.').then(r=>{
      if(r){
        try{
          const cleaned = r.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
          const words = JSON.parse(cleaned);
          chatState.suggestedWords = words.filter(w => !existingWords.includes(w.word.toLowerCase()));
        }catch(e){}
      }
      renderChat(document.getElementById('screen-chat'), false);
    });
  }
}

let pronState = null; // {msgIdx, isRecording, recorder, stream, chunks, attempts:[{recIdx}], aiFeedback}

function showPronPractice(msgIdx){
  const msg = chatState.messages[msgIdx];
  if(!msg) return;
  if(!pronState || pronState.msgIdx !== msgIdx){
    // Initialize with existing retries if any
    const existingRetries = msg.retryRecIdxs || [];
    pronState = {msgIdx, isRecording:false, recorder:null, stream:null, chunks:[], attempts:existingRetries.map(r=>({recIdx:r})), aiFeedback:null};
  }
  renderPronModal();
}

function renderPronModal(){
  const msg = chatState.messages[pronState.msgIdx];
  const root = document.getElementById('modal-root');
  const allAttempts = [{recIdx:msg.recIdx, label:'Original'}];

async function pronToggleRecord(){
  if(pronState.isRecording){
    // Stop recording
    pronState.isRecording = false;
    if(pronState.recorder && pronState.recorder.state==='recording'){
      pronState.recorder.onstop = () => {
        if(pronState.stream) pronState.stream.getTracks().forEach(t=>t.stop());
        if(pronState.chunks.length){
          const blob = new Blob(pronState.chunks, {type:'audio/webm'});
          const url = URL.createObjectURL(blob);
          const recIdx = chatRecordings.length;
          chatRecordings.push(url);
          pronState.attempts.push({recIdx});
          // Save retries to the message
          const msg = chatState.messages[pronState.msgIdx];
          if(!msg.retryRecIdxs) msg.retryRecIdxs = [];
          msg.retryRecIdxs.push(recIdx);
          pronState.aiFeedback = null;
        }
        pronState.chunks = [];
        renderPronModal();
      };
      pronState.recorder.stop();
    }
  } else {
    // Start recording
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      pronState.stream = stream;
      pronState.chunks = [];
      try{ pronState.recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'}); }
      catch(e){ pronState.recorder = new MediaRecorder(stream); }
      pronState.recorder.ondataavailable = e => { if(e.data.size>0) pronState.chunks.push(e.data); };
      pronState.recorder.start();
      pronState.isRecording = true;
      renderPronModal();
    }catch(e){ toast('Microphone access denied'); }
  }
}

async function blobUrlToBase64(url){
  const resp = await fetch(url);
  const blob = await resp.blob();
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });
}

async function aiEvaluatePron(recIdx){

  const blobUrl = chatRecordings[recIdx];

  const base64 = await blobUrlToBase64(blobUrl);
  const prompt = `The learner tried to say this sentence in English:
"${msg.text}"

Listen to their audio recording and evaluate their pronunciation. Provide feedback in this format:
- Overall rating: (Good / Needs Work / Keep Practicing)
- Specific words that need improvement and how to fix them
- Tips for better pronunciation

Give feedback in BOTH English and Chinese (中文). Keep it brief and encouraging (4-6 bullet points max).`;
  const result = await callGeminiWithAudio(base64, 'audio/webm', prompt, 'You are a friendly English pronunciation coach. Give specific, actionable feedback. Be encouraging.');
  if(result){
