let autoPlayState = null;
let autoPlayTimer = null;

function getFilteredWords(){
  let filtered = WORDS;
  if(wordFilter !== 'all') filtered = filtered.filter(w => w.category === wordFilter);
  if(wordSearch) filtered = filtered.filter(w => w.word.toLowerCase().includes(wordSearch.toLowerCase()) || w.definition.toLowerCase().includes(wordSearch.toLowerCase()));
  return filtered;
}

function startAutoPlay(){
  const words = getFilteredWords();
  if(!words.length){ toast('No words to play'); return; }
  autoPlayState = { words, current:0, phase:'word', paused:false };
  enableBackgroundPlayback('autoplay', words[0]?.word, words[0]?.definition);
  renderAutoPlayBar();
  autoPlayNext();
}

function stopAutoPlay(){
  if(autoPlayTimer) clearTimeout(autoPlayTimer);
  autoPlayTimer = null;
  autoPlayState = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  disableBackgroundPlayback();
  renderAutoPlayBar();
}

function toggleAutoPlayPause(){
  if(!autoPlayState) return;
  autoPlayState.paused = !autoPlayState.paused;
  if(autoPlayState.paused){
    if(autoPlayTimer) clearTimeout(autoPlayTimer);
    autoPlayTimer = null;
    window.speechSynthesis && window.speechSynthesis.cancel();
    if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  } else {
    autoPlayNext();
  }
  updateMediaSessionPaused(autoPlayState.paused);
  renderAutoPlayBar();
}

function autoPlaySkip(dir){
  if(!autoPlayState) return;
  if(autoPlayTimer) clearTimeout(autoPlayTimer);
  autoPlayTimer = null;
  window.speechSynthesis && window.speechSynthesis.cancel();
  if(googleAudio){ googleAudio.pause(); googleAudio = null; }
  autoPlayState.current += dir;
  if(autoPlayState.current < 0) autoPlayState.current = 0;
  if(autoPlayState.current >= autoPlayState.words.length){ stopAutoPlay(); toast('Auto-play finished!'); return; }
  autoPlayState.phase = 'word';
  if(!autoPlayState.paused) autoPlayNext();
  renderAutoPlayBar();
}

function autoPlayNext(){
  if(!autoPlayState || autoPlayState.paused) return;
  if(autoPlayState.current >= autoPlayState.words.length){ stopAutoPlay(); toast('Auto-play finished!'); return; }
  const w = autoPlayState.words[autoPlayState.current];
  if(bgPlaybackMode === 'autoplay') updateMediaSession(w.word, w.definition);
  renderAutoPlayBar();

  if(autoPlayState.phase === 'word'){
    speak(w.word);
    autoPlayState.phase = 'pause1';
    autoPlayTimer = setTimeout(()=>autoPlayNext(), getSpokenDuration(w.word) + 800);
  } else if(autoPlayState.phase === 'pause1'){
    autoPlayState.phase = 'definition';
    autoPlayNext();
  } else if(autoPlayState.phase === 'definition'){
    speak(w.definition);
    autoPlayState.phase = 'pause2';
    autoPlayTimer = setTimeout(()=>autoPlayNext(), getSpokenDuration(w.definition) + 800);
  } else if(autoPlayState.phase === 'pause2'){
    autoPlayState.phase = 'example';
    autoPlayNext();
  } else if(autoPlayState.phase === 'example'){
    if(w.example){
      speak(w.example);
      autoPlayState.phase = 'gap';
      autoPlayTimer = setTimeout(()=>autoPlayNext(), getSpokenDuration(w.example) + 1200);
    } else {
      autoPlayState.phase = 'gap';
      autoPlayTimer = setTimeout(()=>autoPlayNext(), 600);
    }
  } else if(autoPlayState.phase === 'gap'){
    autoPlayState.current++;
    autoPlayState.phase = 'word';
    autoPlayNext();
  }
}

function getSpokenDuration(text){
  if(!text) return 500;
  const words = text.split(/\s+/).length;
  const rate = state.settings.voiceSpeed || 0.9;
  return Math.max(600, (words / (2.5 * rate)) * 1000);
}

function formatMultiDef(def){

  }
  return def;
}

async function findDuplicateWords(){
  const key = state.settings.apiKey;
  if(!key){ toast('Add your Gemini API key in Settings'); goTo('settings'); return; }
  toast('Scanning for duplicates...');
  const wordList = WORDS.map(w => ({id:w.id, word:w.word, def:w.definition, custom:!!w.custom}));
  const prompt = `You are a vocabulary list deduplication assistant. Find ONLY exact duplicate words that appear more than once in the list.

Rules:
- ONLY flag the SAME word appearing twice with different definitions = duplicate, COMBINE their definitions
- ONLY flag different spellings of the SAME word (e.g. "colour"/"color") = duplicate
- When the same word has genuinely different meanings, combine them into one entry with numbered definitions
- NEVER flag two DIFFERENT words as duplicates, even if they have similar or related meanings
- "loonie" and "toonie" are DIFFERENT words, NOT duplicates
- "sorry" and "excuse me" are DIFFERENT words, NOT duplicates
- If in doubt, do NOT flag it as a duplicate

Return ONLY a JSON array of duplicate groups. Each group:
{"action":"combine" or "remove","keep":{"id":number,"word":"...","reason":"why keep this one"},"remove":[{"id":number,"word":"...","reason":"why remove/merge"}],"combinedDef":"1. first meaning; 2. second meaning"}

- action "combine": the word has multiple valid meanings — merge definitions into one entry
- action "remove": truly redundant entries — just delete the duplicate
- combinedDef: always provide a clean combined definition using numbered format "1. ...; 2. ..."
If no duplicates found, return empty array: []

Word list:
${JSON.stringify(wordList)}`;

  try{
    const res = await callGemini([{role:'user',text:prompt}]);
    if(!res){ toast('AI analysis failed'); return; }
    let clean = res.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const groups = JSON.parse(clean);
    if(!groups.length){ toast('No duplicates found!'); return; }
    showDuplicateReview(groups);
  }catch(e){
    console.error('Duplicate detection error:', e);

function deleteDupWord(groupIdx, which){
  const groups = document.getElementById('modal-root')._dupGroups;
  if(!groups || !groups[groupIdx]) return;
  const g = groups[groupIdx];
  const wordName = which === 'keep' ? g.keep.word : g.remove[which]?.word;
  if(!wordName) return;
  state.customWords = (state.customWords||[]).filter(cw=>cw.word.toLowerCase()!==wordName.toLowerCase());
  saveState();
  rebuildWords();
  const rowId = which === 'keep' ? `dup-word-${groupIdx}-keep` : `dup-word-${groupIdx}-${which}`;
  const row = document.getElementById(rowId);
  if(row){
    row.style.opacity = '0.3';
    row.innerHTML = `<div style="font-size:12px;color:var(--red);padding:4px 0">"${wordName}" deleted</div>`;
  }
  toast('"' + wordName + '" deleted');
}

function applyDuplicateFix(groupIdx, apply){
  const groups = document.getElementById('modal-root')._dupGroups;
  if(!groups || !groups[groupIdx]) return;
  const g = groups[groupIdx];
  const el = document.getElementById('dup-group-'+groupIdx);
  if(apply){
    const newDef = g.combinedDef || null;
    // Remove duplicate entries
    g.remove.forEach(r => {
      state.customWords = (state.customWords||[]).filter(cw=>cw.word.toLowerCase()!==r.word.toLowerCase());
    });
    // Update kept word's definition (combined or improved)
    if(newDef){
      const cw = (state.customWords||[]).find(c=>c.word.toLowerCase()===g.keep.word.toLowerCase());
      if(cw) cw.definition = newDef;
    }
    saveState();
    rebuildWords();
    if(el) el.style.opacity = '0.4';
    if(el) el.innerHTML = '<div style="text-align:center;color:var(--green);padding:12px">Done — ' + (g.action==='combine'?'definitions combined':'duplicates removed') + '</div>';
    toast(g.action==='combine'?'Definitions combined!':'Duplicates removed!');
  } else {
    if(el) el.style.opacity = '0.4';
    if(el) el.innerHTML = '<div style="text-align:center;color:var(--text3);padding:12px">Skipped</div>';
  }
}

function renderHeatmap(){
  const today = new Date();
  const weeks = 20;
  let html = '<div class="heatmap-grid">';
  for(let w=weeks-1; w>=0; w--){
    html += '<div class="heatmap-col">';
    for(let d=0; d<7; d++){
      const date = new Date(today);
      date.setDate(date.getDate() - (w*7 + (6-d)));
      const key = date.toISOString().slice(0,10);
      const data = state.dailyActivity[key];
      let level = '';
      if(data){
        if(data.reviewed >= 40) level = 'l4';
        else if(data.reviewed >= 20) level = 'l3';
        else if(data.reviewed >= 10) level = 'l2';
        else level = 'l1';
      }
      const isFuture = date > today;
      html += `<div class="heatmap-cell ${isFuture?'':level}" title="${key}${data?' - '+data.reviewed+' reviewed':''}"></div>`;
    }
    html += '</div>';
  }
  html += '</div>';
  return html;
}

}
function setErrorsFilter(f){ errorsState.filter = f; renderErrors(document.getElementById('screen-errors')); }

function escapeErr(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatRelTime(ts){
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if(m < 1) return 'just now';
  if(m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if(h < 24) return h + 'h ago';
  const d = Math.floor(h / 24);
  if(d < 7) return d + 'd ago';
  return new Date(ts).toISOString().slice(0,10);
}

function renderErrors(el){
  if(!el) return;
  const stats = getErrorStats();
  const log = state.errorLog || [];
  const filterFn = errorsState.filter === 'all'
    ? (e => true)
    : errorsState.filter === 'resolved'
      ? (e => e.resolved)
      : (e => !e.resolved);

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <button class="btn btn-ghost btn-sm" onclick="goTo('home')">&larr; Home</button>

      <div style="width:60px"></div>
    </div>

    <div class="card card-sm mb" style="display:flex;gap:14px;justify-content:space-around;text-align:center;padding:14px">
      <div>

        <div style="font-size:11px;color:var(--text3)">Active</div>
      </div>
      <div>
        <div style="font-size:22px;font-weight:800;color:var(--orange)">${stats.recentCount}</div>

        <div style="font-size:36px;margin-bottom:8px">📝</div>

        <p style="font-size:13px;color:var(--text2);margin-top:6px;line-height:1.5">
          Open <b>Free Chat</b> and the tutor will spot grammar errors. Each one gets categorized and tracked here so you can see your weak spots.
        </p>
        <button class="btn mt" onclick="startFreeChat()" style="width:auto;padding:10px 24px">&#128172; Start Free Chat</button>
      </div>
    ` : `
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <button class="btn btn-sm ${errorsState.filter==='active'?'':'btn-ghost'}" style="flex:1" onclick="setErrorsFilter('active')">Active (${stats.totalActive})</button>
        <button class="btn btn-sm ${errorsState.filter==='resolved'?'':'btn-ghost'}" style="flex:1" onclick="setErrorsFilter('resolved')">Resolved (${stats.totalResolved})</button>

      </div>

      <div style="display:flex;flex-direction:column;gap:8px">
        ${stats.ranked.filter(g => {
          const items = log.filter(e => Array.isArray(e.categories) && e.categories.includes(g.cat) && filterFn(e));
          return items.length > 0;
        }).map(g => {
          const info = GRAMMAR_CATEGORIES[g.cat];
          const items = log.filter(e => Array.isArray(e.categories) && e.categories.includes(g.cat) && filterFn(e))
                           .sort((a,b) => b.ts - a.ts);
          const expanded = errorsState.expanded.has(g.cat);
          return `<div class="card card-sm" style="padding:0;overflow:hidden;border-left:3px solid ${info.color}">
            <div style="padding:12px 14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="toggleErrorCategory('${g.cat}')">
              <div style="display:flex;align-items:center;gap:10px">

                </div>

                ${errorsState.filter === 'active' && items.length > 0 ? `<button class="btn btn-sm btn-ghost" style="width:auto;font-size:11px;padding:4px 10px" onclick="event.stopPropagation();markCategoryResolved('${g.cat}')">Mark all resolved</button>` : ''}

              </div>
            </div>
            ${expanded ? `<div style="padding:0 14px 12px;display:flex;flex-direction:column;gap:8px">
              ${items.slice(0, 30).map(e => `<div style="background:var(--bg3);padding:10px 12px;border-radius:8px;font-size:13px;${e.resolved?'opacity:.55':''}">

            </div>` : ''}
          </div>`;
        }).join('')}
      </div>

      ${stats.totalResolved > 0 ? `<button class="btn btn-ghost btn-sm mt" style="color:var(--red);font-size:12px" onclick="clearResolvedErrors()">Delete all resolved errors</button>` : ''}
    `}
  `;
}

// ===== GEMINI IMPORT (Smart JSON Parser) =====
let geminiImportPending = null;

function parseGeminiImport(){
  const el = document.getElementById('gemini-import-input');
  const preview = document.getElementById('gemini-import-preview');
  if(!el || !preview) return;
  let raw = el.value.trim();
  if(!raw){ toast('Paste some JSON first'); return; }

  // Strip markdown code fences if present
  raw = raw.replace(/^```(?:json)?\s*/i,'').replace(/\s*```$/,'').trim();

  let parsed;
  try{ parsed = JSON.parse(raw); }catch(e){ toast('Invalid JSON: '+e.message); return; }

  // Normalize to array of word objects
  const words = normalizeGeminiWords(parsed);
  if(!words || !words.length){ toast('Could not find any words in the JSON'); return; }

  // Dedupe against existing library
  const existing = new Set(WORDS.map(w=>w.word.toLowerCase()));
  const newWords = words.filter(w => !existing.has(w.word.toLowerCase()));
  const dupes = words.length - newWords.length;
  geminiImportPending = newWords;

  preview.innerHTML = `
    <div style="margin-top:10px;font-size:13px;color:var(--text2)">
      Found <b>${words.length}</b> words${dupes>0?' <span style="color:var(--text3)">('+dupes+' already in library)</span>':''}
    </div>
    ${newWords.length > 0 ? `
      <div style="max-height:240px;overflow-y:auto;margin:8px 0;border:1px solid var(--bg4);border-radius:8px;padding:4px 8px">
        ${newWords.map((w,i) => `<div style="padding:5px 0;border-bottom:1px solid var(--bg3);font-size:12px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <b style="color:var(--text)">${w.word}</b>
            ${w.phonetic?'<span style="color:var(--accent2);font-size:11px">/'+w.phonetic+'/</span>':''}
          </div>
          <div style="color:var(--text2)">${w.definition}</div>
          ${w.example?'<div style="color:var(--text3);font-style:italic;font-size:11px">"'+w.example+'"</div>':''}
        </div>`).join('')}
      </div>
      <button class="btn btn-sm" onclick="importGeminiWords()">Add ${newWords.length} Words to Library</button>
    ` : '<div style="color:var(--orange);font-size:12px;margin-top:8px">All words already in your library!</div>'}`;
}

function normalizeGeminiWords(data){
  // Case 1: Array of word objects [{word,definition,...}]
  if(Array.isArray(data)){
    if(data.length && typeof data[0] === 'object' && data[0] !== null){
      return data.map(normalizeWordObj).filter(Boolean);
    }
    return null;
  }

  if(typeof data !== 'object' || data === null) return null;

  // Case 2: {words:[...]} or {vocabulary:[...]} or {word_list:[...]}
  for(const key of Object.keys(data)){
    const v = data[key];
    if(Array.isArray(v) && v.length && typeof v[0] === 'object'){
      return v.map(normalizeWordObj).filter(Boolean);
    }
  }

  // Case 3: {"word": "definition"} flat dictionary
  const entries = Object.entries(data);
  if(entries.length && entries.every(([k,v]) => typeof v === 'string')){
    return entries.map(([word, definition]) => ({
      word, definition, example:'', category:'custom', difficulty:2, phonetic:'', grammar:null
    }));
  }

  // Case 4: {"word": {definition, example, ...}} nested dictionary
  if(entries.length && entries.every(([k,v]) => typeof v === 'object' && v !== null)){
    return entries.map(([word, obj]) => {
      const w = normalizeWordObj({word, ...obj});
      return w;
    }).filter(Boolean);
  }

  return null;
}

function normalizeWordObj(obj){
  if(!obj || typeof obj !== 'object') return null;
  // Flexible field mapping
  const word = obj.word || obj.term || obj.vocabulary || obj.phrase || obj.name || '';
  const definition = obj.definition || obj.meaning || obj.def || obj.explanation || obj.describe || obj.description || obj.chinese || obj.translation || obj['中文'] || obj['释义'] || obj['意思'] || '';
  const example = obj.example || obj.example_sentence || obj.sentence || obj.usage || obj.examples || obj['例句'] || '';
  const phonetic = obj.phonetic || obj.pronunciation || obj.ipa || obj['发音'] || '';
  const category = obj.category || obj.type || obj.tag || obj.group || 'custom';
  const difficulty = obj.difficulty || obj.level || 2;

  if(!word || !definition) return null;

  // Handle example as array
  const exStr = Array.isArray(example) ? example[0] || '' : String(example);

  const wordStr = String(word).trim();
  return {
    word: wordStr,
    definition: cleanDefinition(wordStr, String(definition).trim()),
    example: exStr.trim(),
    category: mapCategory(String(category).toLowerCase().trim()),
    difficulty: typeof difficulty === 'number' ? Math.min(3,Math.max(1,difficulty)) : 2,
    phonetic: String(phonetic).trim(),
    grammar: obj.grammar || null
  };
}

function mapCategory(cat){
  const map = {
    'slang':'slang','俚语':'slang',
    'workplace':'workplace','work':'workplace','office':'workplace','职场':'workplace','工作':'workplace',
    'social':'social','社交':'social',
    'idiom':'idioms','idioms':'idioms','成语':'idioms','习语':'idioms',
    'food':'food','饮食':'food',
    'weather':'weather','天气':'weather',
    'canadian':'canadian','canada':'canadian','加拿大':'canadian',
    'geography':'geography','地理':'geography',
    'essential':'essentials','essentials':'essentials','基础':'essentials','日常':'essentials',
    'engineering':'engineering','技术':'engineering','tech':'engineering',
    'academic':'academic','学术':'academic',
    'phrasal verb':'idioms','phrasal_verb':'idioms','短语动词':'idioms'
  };
  return map[cat] || 'custom';
}

function importGeminiWords(){
  if(!geminiImportPending || !geminiImportPending.length){ toast('No words to import'); return; }
  if(!state.customWords) state.customWords = [];
  let added = 0;
  geminiImportPending.forEach(w => {
    state.customWords.push(w);
    added++;
  });
  saveState();
  rebuildWords();
  geminiImportPending = null;
  toast(added + ' words added!');
  const preview = document.getElementById('gemini-import-preview');
  if(preview) preview.innerHTML = '<div style="color:var(--green);font-size:13px;padding:8px">&#10003; '+added+' words imported successfully!</div>';
  const input = document.getElementById('gemini-import-input');
  if(input) input.value = '';
}

function exportSyncFile(){
  const opt = getSyncOptions();
  const syncData = { v: 3 };
  if(opt.words){ syncData.cw = state.customWords || []; syncData.ash = state.aiSuggestHistory || []; }
  if(opt.progress){ syncData.wp = state.wordProgress; }
  if(opt.settings){ syncData.st = getExportSettings(opt); syncData.tu = state.ttsUsage; }
  if(opt.stats){ syncData.da = state.dailyActivity; syncData.s = state.streak; syncData.la = state.lastActiveDate; syncData.tq = state.totalQuizzes; syncData.tc = state.totalCorrect; syncData.ta = state.totalAnswered; syncData.xp = state.xp; syncData.rth = state.rtHistory; }
  const json = JSON.stringify(syncData, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'vocab-sync-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  if(opt.settings && opt.apiKeys) toast('File exported! Warning: contains API keys, store safely.');
  else toast('File exported!');
}

function importSyncFile(input){
  const file = input.files[0];
  if(!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = JSON.parse(e.target.result);
      const imported = [];
      if(data.cw){ state.customWords = data.cw; imported.push(data.cw.length+' words'); }
      if(data.ash) state.aiSuggestHistory = data.ash;
      if(data.wp){ state.wordProgress = data.wp; imported.push('progress'); }
      if(data.st){ Object.assign(state.settings, data.st); applyTheme(); imported.push('settings'); }
      if(data.tu) state.ttsUsage = data.tu;
      if(data.da) state.dailyActivity = data.da;
      if(data.s !== undefined) state.streak = data.s;
      if(data.la) state.lastActiveDate = data.la;
      if(data.tq !== undefined){ state.totalQuizzes = data.tq; imported.push('stats'); }
      if(data.tc !== undefined) state.totalCorrect = data.tc;
      if(data.ta !== undefined) state.totalAnswered = data.ta;
      if(data.xp) state.xp = data.xp;
      if(data.rth) state.rtHistory = data.rth;
      saveState();
      rebuildWords();
      toast('Imported: ' + (imported.join(', ') || 'data'));
      goTo('home');
    }catch(err){
      toast('Invalid file: ' + err.message);
      console.error('Sync file import error:', err);
    }
  };
  reader.readAsText(file);
}

async function findSyncGist(token){
  const headers = { 'Authorization': 'token ' + token };
  const listResp = await fetch('https://api.github.com/gists?per_page=100', { headers, cache: 'no-store' });
  if(!listResp.ok) throw new Error('Failed to list gists: ' + listResp.status + (listResp.status===401?' (bad token)':''));
  const gists = await listResp.json();
  const gist = gists.find(g => g.files && Object.keys(g.files).some(f => /^vocab-slot-\d\.json$/.test(f) || f === 'vocab-sync.json'));
  if(!gist) return { gistId: null, slots: {}, legacyFile: null };
  const fullResp = await fetch('https://api.github.com/gists/' + gist.id, { headers, cache: 'no-store' });
  if(!fullResp.ok) throw new Error('Failed to fetch gist: ' + fullResp.status);
  const full = await fullResp.json();
  const slots = {};
  let legacyFile = null;
  for(const [name, file] of Object.entries(full.files)){
    const slotMatch = name.match(/^vocab-slot-(\d)\.json$/);
    if(slotMatch){
      try{
        const data = JSON.parse(file.content);
        const meta = data._meta || {};
        slots[parseInt(slotMatch[1])] = { words: meta.words || 0, date: meta.date || null };
      }catch(e){
        slots[parseInt(slotMatch[1])] = { words: 0, date: null };
      }
    } else if(name === 'vocab-sync.json'){
      try{
        const data = JSON.parse(file.content);
        legacyFile = { words: (data.cw || []).length, date: null };
      }catch(e){
        legacyFile = { words: 0, date: null };
      }
    }
  }
  return { gistId: gist.id, slots, legacyFile };
}

function renderSlotPicker(mode, gistId, slots, legacyFile){
  const area = document.getElementById('sync-code-area');
  let html = '<div style="margin-top:10px">';
  html += '<div style="font-size:13px;font-weight:600;margin-bottom:8px;color:var(--text)">' + (mode === 'export' ? 'Save to Slot' : 'Load from Slot') + '</div>';
  for(let i = 1; i <= 5; i++){
    const s = slots[i];
    const occupied = !!s;
    const info = occupied ? s.words + ' words' + (s.date ? ' \u00b7 ' + new Date(s.date).toLocaleDateString() : '') : 'Empty';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:4px">';
    html += '<div><span style="font-size:13px;font-weight:600;color:var(--accent)">Slot ' + i + '</span> <span style="font-size:12px;color:var(--text3);margin-left:6px">' + info + '</span></div>';
    const delBtn = occupied && gistId ? '<button class="btn btn-sm" style="width:auto;min-height:32px;padding:4px 10px;font-size:11px;color:var(--red);border-color:var(--red)" onclick="deleteGistSlot(' + i + ',\'' + gistId + '\',\'' + mode + '\')">\u2715</button>' : '';
    if(mode === 'export'){
      const label = occupied ? 'Overwrite' : 'Save';
      html += '<div style="display:flex;gap:4px">' + delBtn + '<button class="btn btn-sm" style="width:auto;min-height:32px;padding:4px 14px;font-size:12px" onclick="saveToGistSlot(' + i + ',\'' + (gistId || '') + '\',' + occupied + ')">' + label + '</button></div>';
    } else {
      if(occupied){
        html += '<div style="display:flex;gap:4px">' + delBtn + '<button class="btn btn-sm" style="width:auto;min-height:32px;padding:4px 14px;font-size:12px" onclick="loadGist(\'' + gistId + '\',\'vocab-slot-' + i + '.json\')">Load</button></div>';
      } else {
        html += '<span style="font-size:12px;color:var(--text3)">--</span>';
      }
    }
    html += '</div>';
  }
  if(legacyFile && mode === 'import'){
    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:var(--bg3);border:2px dashed var(--orange);border-radius:8px;margin-top:6px">';
    html += '<div><span style="font-size:13px;font-weight:600;color:var(--orange)">Legacy</span> <span style="font-size:12px;color:var(--text3);margin-left:6px">' + legacyFile.words + ' words \u00b7 vocab-sync.json</span></div>';
    html += '<button class="btn btn-sm" style="width:auto;min-height:32px;padding:4px 14px;font-size:12px" onclick="loadGist(\'' + gistId + '\',\'vocab-sync.json\')">Load</button>';
    html += '</div>';
  }
  html += '</div>';
  area.innerHTML = html;
}

function buildGistSyncData(){
  const opt = getSyncOptions();
  const syncData = { v: 3 };
  if(opt.words){ syncData.cw = state.customWords || []; syncData.ash = state.aiSuggestHistory || []; }
  if(opt.progress){ syncData.wp = state.wordProgress; }
  if(opt.settings){ syncData.st = getExportSettings(opt); syncData.tu = state.ttsUsage; }
  if(opt.stats){ syncData.da = state.dailyActivity; syncData.s = state.streak; syncData.la = state.lastActiveDate; syncData.tq = state.totalQuizzes; syncData.tc = state.totalCorrect; syncData.ta = state.totalAnswered; syncData.xp = state.xp; syncData.rth = state.rtHistory; }
  syncData._meta = { words: (state.customWords || []).length, date: new Date().toISOString() };
  return { syncData, opt };
}

async function exportToGist(){
  if(!state.settings.githubGistToken){
    toast('Set GitHub token in Settings first');
    return;
  }
  try{
    toast('Loading save slots...');
    const token = state.settings.githubGistToken;
    const { gistId, slots, legacyFile } = await findSyncGist(token);
    renderSlotPicker('export', gistId, slots, legacyFile);
  }catch(e){
    console.error('Gist export error:', e);
    toast('Gist export failed: ' + e.message);
  }
}

async function saveToGistSlot(slotNum, gistId, isOccupied){
  if(isOccupied && !confirm('Slot ' + slotNum + ' already has data. Overwrite it?')) return;
  const { syncData, opt } = buildGistSyncData();
  if(opt.settings && opt.apiKeys){
    if(!confirm('You are about to upload API keys to GitHub Gist. This is a remote server — are you sure?')) return;
  }
  try{
    toast('Saving to Slot ' + slotNum + '...');
    const token = state.settings.githubGistToken;
    const json = JSON.stringify(syncData, null, 2);
    const fileName = 'vocab-slot-' + slotNum + '.json';
    const headers = { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' };
    let resp;
    if(gistId){
      resp = await fetch('https://api.github.com/gists/' + gistId, {
        method: 'PATCH', headers,
        body: JSON.stringify({ files: { [fileName]: { content: json } } })
      });
    } else {
      resp = await fetch('https://api.github.com/gists', {
        method: 'POST', headers,
        body: JSON.stringify({ description: 'Vocab Trainer Sync', public: false, files: { [fileName]: { content: json } } })
      });
    }
    if(!resp.ok) throw new Error('Upload failed: ' + resp.status);
    toast('Saved to Slot ' + slotNum + '! (' + new Date().toLocaleTimeString() + ')');
    const { gistId: newId, slots, legacyFile } = await findSyncGist(token);
    renderSlotPicker('export', newId, slots, legacyFile);
  }catch(e){
    console.error('Gist save error:', e);
    toast('Gist save failed: ' + e.message);
  }
}

async function deleteGistSlot(slotNum, gistId, mode){
  if(!confirm('Delete Slot ' + slotNum + '? This removes the data from GitHub.')) return;
  try{
    toast('Deleting Slot ' + slotNum + '...');
    const token = state.settings.githubGistToken;
    const fileName = 'vocab-slot-' + slotNum + '.json';
    const headers = { 'Authorization': 'token ' + token, 'Content-Type': 'application/json' };
    const resp = await fetch('https://api.github.com/gists/' + gistId, {
      method: 'PATCH', headers,
      body: JSON.stringify({ files: { [fileName]: null } })
    });
    if(!resp.ok) throw new Error('Delete failed: ' + resp.status);
    toast('Slot ' + slotNum + ' deleted');
    const { gistId: newId, slots, legacyFile } = await findSyncGist(token);
    if(newId){
      renderSlotPicker(mode, newId, slots, legacyFile);
    } else {
      document.getElementById('sync-code-area').innerHTML = '<div style="margin-top:8px;font-size:13px;color:var(--text3)">All slots cleared. Export to create a new save.</div>';
    }
  }catch(e){
    console.error('Gist delete error:', e);
    toast('Gist delete failed: ' + e.message);
  }
}

async function importFromGist(){

async function loadGist(gistId, fileName){
  try{
    toast('Downloading gist...');
    const token = state.settings.githubGistToken;
    const resp = await fetch('https://api.github.com/gists/' + gistId, {
      headers: { 'Authorization': 'token ' + token }, cache: 'no-store'
    });
    if(!resp.ok) throw new Error('Download failed: ' + resp.status);
    const gist = await resp.json();
    const file = gist.files[fileName];
    if(!file) throw new Error('File not found in gist');
    const data = JSON.parse(file.content);
    const imported = [];
    if(data.cw){ state.customWords = data.cw; imported.push(data.cw.length + ' words'); }
    if(data.ash) state.aiSuggestHistory = data.ash;
    if(data.wp){ state.wordProgress = data.wp; imported.push('progress'); }
    if(data.st){ Object.assign(state.settings, data.st); applyTheme(); imported.push('settings'); }
    if(data.tu) state.ttsUsage = data.tu;
    if(data.da) state.dailyActivity = data.da;
    if(data.s !== undefined) state.streak = data.s;
    if(data.la) state.lastActiveDate = data.la;
    if(data.tq !== undefined){ state.totalQuizzes = data.tq; imported.push('stats'); }
    if(data.tc !== undefined) state.totalCorrect = data.tc;
    if(data.ta !== undefined) state.totalAnswered = data.ta;
    if(data.xp) state.xp = data.xp;
    if(data.rth) state.rtHistory = data.rth;
    saveState();
    rebuildWords();
    toast('Imported: ' + (imported.join(', ') || 'data'));
    goTo('home');
  }catch(e){
    console.error('Gist load error:', e);
    toast('Failed to load gist: ' + e.message);
  }
}

// ===== REBUILD WORDS (includes custom) =====
function rebuildWords(){
  const base = WORDS_RAW.map((w,i) => ({
    id:i, word:w[0], definition:w[1], example:w[2], category:w[3], difficulty:w[4], phonetic:w[5]||'', grammar:w[6]||null
  }));
  // Auto-dedup custom words: remove duplicates of built-in words and duplicates within custom list
  const baseSet = new Set(base.map(w=>w.word.toLowerCase()));
  const seen = new Set();
  let deduped = false;
  const cleanCustom = (state.customWords || []).filter(w=>{
    const key = w.word.toLowerCase();
    if(baseSet.has(key) || seen.has(key)){ deduped = true; return false; }
    seen.add(key);
    return true;
  });
  if(deduped){ state.customWords = cleanCustom; saveState(); }
  const custom = cleanCustom.map((w,i) => ({
    id:10000+i, word:w.word, definition:w.definition, example:w.example||'', category:w.category||'custom', difficulty:w.difficulty||2, phonetic:w.phonetic||'', grammar:w.grammar||null, custom:true
  }));
  WORDS = [...base, ...custom];
}

let earState = null;

function renderEarTraining(el){
  if(earState && !earState.ended){ renderEarActive(el); return; }

  goTo('home');
}

// --- Dictation Mode ---
function startEarDictation(){
  const active = WORDS.filter(w=>w.example && w.example.length > 10);
  if(active.length < 5){ toast('Not enough words with examples'); return; }
  shuffle(active);
  earState = { mode:'dictation', words:active.slice(0,10), current:0, score:0, results:[], ended:false };
  goTo('ear');
}

function renderEarActive(el){
  if(earState.mode==='dictation') renderDictation(el);
  else if(earState.mode==='pairs') renderMinimalPairs(el);
  else if(earState.mode==='shadowing') renderShadowing(el);
  else if(earState.mode==='listening') renderListening(el);
  else if(earState.mode==='subdrill') renderSubDrill(el);
  else if(earState.mode==='listenrespond') renderListenRespond(el);
  else if(earState.mode==='wordmixing') renderWordMixing(el);
  else if(earState.mode==='brainsoak') renderBrainSoak(el);
}

function renderDictation(el){
  if(earState.current >= earState.words.length){ renderEarSummary(el); return; }
  const w = earState.words[earState.current];
  const answered = earState.results[earState.current];
  el.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${(earState.current/earState.words.length)*100}%"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text3);margin-bottom:12px">

      <button onclick="endSessionEarly('ear')" style="background:none;border:none;color:var(--red);font-size:12px;font-weight:600;cursor:pointer">&#10005; End</button>
      <span>Score: ${earState.score}</span>
    </div>

      <div style="font-size:13px;color:var(--text3);margin-bottom:8px">Listen and type the sentence you hear</div>

      <button class="btn btn-ghost btn-sm" onclick="speakSlow(\`${w.example.replace(/`/g,'').replace(/'/g,"\\'")}\`)" style="font-size:11px;margin-top:4px">&#128034; Slow</button>
    </div>
    ${answered ? `
      <div class="card mb">
        <div style="font-size:13px;color:${answered.correct?'var(--green)':'var(--red)'};font-weight:700;margin-bottom:6px">${answered.correct?'Correct!':'Not quite'}</div>
        <div style="font-size:12px;color:var(--text3);margin-bottom:4px">You typed:</div>

      </div>

function checkDictation(){
  const input = document.getElementById('ear-dict-input')?.value.trim();
  if(!input){ toast('Type something first'); return; }
  const w = earState.words[earState.current];
  const normalize = s => s.toLowerCase().replace(/[^a-z0-9\s]/g,'').replace(/\s+/g,' ').trim();
  const correct = normalize(input) === normalize(w.example);
  if(correct) earState.score++;
  earState.results[earState.current] = { userInput:input, correct, word:w };
  // Update SRS for the word
  updateSRS(w.id, correct ? 4 : 1, correct ? 2 : 5);

async function toggleShadowRecord(){
  if(shadowRec && shadowRec.recording){
    // Stop
    shadowRec.recording = false;
    if(shadowRec.recorder && shadowRec.recorder.state === 'recording'){
      shadowRec.recorder.onstop = () => {
        if(shadowRec.stream) shadowRec.stream.getTracks().forEach(t=>t.stop());
        if(shadowRec.chunks.length){
          const blob = new Blob(shadowRec.chunks, {type:'audio/webm'});
          shadowRec.blobUrl = URL.createObjectURL(blob);
        }
        renderShadowing(document.getElementById('screen-ear'));
      };
      shadowRec.recorder.stop();
    }
  } else {
    // Start
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      shadowRec = { recording:true, recorder:null, stream, chunks:[], blobUrl:null };
      try{ shadowRec.recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'}); }
      catch(e){ shadowRec.recorder = new MediaRecorder(stream); }
      shadowRec.recorder.ondataavailable = e => { if(e.data.size>0) shadowRec.chunks.push(e.data); };
      shadowRec.recorder.start();
      renderShadowing(document.getElementById('screen-ear'));
    }catch(e){ toast('Microphone access denied'); }
  }
}

function playShadowRecording(){
  if(shadowRec && shadowRec.blobUrl) new Audio(shadowRec.blobUrl).play();
}

function playShadowResult(idx){
  const r = earState.results[idx];
  if(r && r.blobUrl) new Audio(r.blobUrl).play();
}

async function submitShadowRecording(){
  if(!shadowRec || !shadowRec.blobUrl) return;
  const loadEl = document.getElementById('shadow-loading');
  if(loadEl) loadEl.innerHTML = '<div class="ai-loading" style="margin-top:12px"><span></span><span></span><span></span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">AI is evaluating...</div>';

  const w = earState.words[earState.current];
  const resp = await fetch(shadowRec.blobUrl);
  const blob = await resp.blob();
  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });

  const prompt = `The learner is practicing English shadowing (repeat-after-me). They tried to say this sentence:
"${w.example}"

Listen to their recording and evaluate:
1. **Overall Rating**: Good / Needs Work / Keep Practicing
2. **Accuracy**: Did they say all the words correctly? Note any missing or wrong words.
3. **Pronunciation**: Point out specific sounds or words that need improvement. Give tips.
4. **Fluency**: Was it smooth and natural, or choppy/hesitant?

Give feedback in BOTH English and Chinese (中文). Keep it brief and encouraging (5-7 lines max). Start with the rating on the first line like: "Rating: Good"`;

  const result = await callGeminiWithAudio(base64, 'audio/webm', prompt, 'You are a friendly, encouraging English pronunciation coach for ESL learners in Canada. Give specific, actionable feedback. Always start with the overall rating.');

  if(result){
    // Extract rating from response
    let rating = 'Evaluated';
    if(/good/i.test(result.split('\n')[0])) rating = 'Good';
    else if(/needs?\s*work/i.test(result.split('\n')[0])) rating = 'Needs Work';
    else if(/keep\s*practicing/i.test(result.split('\n')[0])) rating = 'Keep Practicing';

    const isGood = rating === 'Good';
    if(isGood) earState.score++;
    earState.results[earState.current] = { feedback:result, rating, blobUrl:shadowRec.blobUrl, word:w };
    updateSRS(w.id, isGood ? 4 : 2, isGood ? 2 : 5);
    recordActivity(isGood);
    awardXP('shadowing', w.id, isGood ? 8 : 3);
  } else {
    earState.results[earState.current] = { feedback:'Could not evaluate. Check your Gemini API key.', rating:'Error', blobUrl:shadowRec.blobUrl, word:w };
  }
  renderShadowing(document.getElementById('screen-ear'));
}

function answerListening(qi, oi){

  // Update SRS for target words used in this passage
  if(earState.targetWords){
    const perQ = Math.ceil(earState.targetWords.length / (earState.questions||[]).length);
    const startIdx = qi * perQ;
    const wordsForQ = earState.targetWords.slice(startIdx, startIdx + perQ);
    wordsForQ.forEach(w => {
      updateSRS(w.id, correct ? 4 : 2, correct ? 2 : 4);
      recordActivity(correct);
      awardXP('listening', w.id, correct ? 8 : 3);
    });
  }
  renderEarActive(document.getElementById('screen-ear'));
}

async function submitSubDrill(){
  const inp = document.getElementById('sub-input');
  if(!inp) return;
  const userSentence = inp.value.trim();
  if(!userSentence){ toast('Type a sentence first'); return; }
  const loadEl = document.getElementById('sub-loading');
  if(loadEl) loadEl.innerHTML = '<div class="ai-loading" style="margin-top:12px"><span></span><span></span><span></span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">AI is evaluating...</div>';

  const w = earState.words[earState.current];
  const drill = earState.currentDrill;
  const prompt = `Evaluate this substitution drill answer.

Original sentence: "${drill.sentence}"
Highlighted word to replace: "${drill.highlightWord}"
Learner's new sentence: "${userSentence}"

Check:
1. Did the learner successfully replace "${drill.highlightWord}" with a different word?
2. Is the new sentence grammatically correct?
3. Does it make sense semantically?

Reply in JSON: {"correct":true,"feedback":"Brief feedback in English and Chinese","corrected":"Optional corrected version if wrong"}
If mostly correct with minor issues, still mark correct:true but mention the issues.`;

  const result = await callGemini([{role:'user',text:prompt}],'You are an FSI drill evaluator for Canadian English ESL. Be encouraging. Respond only with valid JSON.');
  let evalData = { correct:false, feedback:'Could not evaluate.', corrected:'' };
  if(result){
    try{
      const cleaned = cleanGeminiText(result);
      evalData = JSON.parse(cleaned);
    }catch(e){ evalData.feedback = result; }
  }
  if(evalData.correct) earState.score++;
  earState.results[earState.current] = { userSentence, correct:evalData.correct, feedback:evalData.feedback, corrected:evalData.corrected||'', word:w, drill };
  updateSRS(w.id, evalData.correct ? 4 : 1, evalData.correct ? 2 : 5);
  recordActivity(evalData.correct);
  awardXP('subdrill', w.id, evalData.correct ? 10 : 3);
  renderEarActive(document.getElementById('screen-ear'));
}

function skipSubDrill(){
  const w = earState.words[earState.current];
  earState.results[earState.current] = { userSentence:'(skipped)', correct:false, feedback:'Skipped', corrected:'', word:w, drill:earState.currentDrill };
  updateSRS(w.id, 0, 10);
  recordActivity(false);
  renderEarActive(document.getElementById('screen-ear'));
}

function nextSubDrill(){
  earState.current++;
  if(earState.current < earState.words.length){
    earState.loading = true;
    earState.currentDrill = null;
    renderEarActive(document.getElementById('screen-ear'));
    generateSubDrill();
  } else {
    renderEarActive(document.getElementById('screen-ear'));
  }
}

const LISTEN_RESPOND_SCENARIOS = [

  {id:'smalltalk', label:'Office Small Talk', icon:'&#128172;', difficulty:1},

  {id:'meeting', label:'Meeting Participation', icon:'&#128188;', difficulty:2},
  {id:'directions', label:'Giving Directions', icon:'&#128506;', difficulty:1},
  {id:'interview', label:'Job Interview Q&A', icon:'&#127775;', difficulty:3},
  {id:'shopping', label:'Store Interactions', icon:'&#128722;', difficulty:1},
  {id:'appointment', label:'Making Appointments', icon:'&#128197;', difficulty:2},
  {id:'complaint', label:'Polite Complaints', icon:'&#128556;', difficulty:3},
  {id:'emergency', label:'Emergency Situations', icon:'&#128680;', difficulty:2},

let lrRec = null;

function startListenRespond(scenarioId){
  if(!state.settings.apiKey){ toast('Add Gemini API key in Settings'); goTo('settings'); return; }
  if(!scenarioId){
    earState = { mode:'listenrespond', phase:'pick' };
    goTo('ear');
    return;
  }
  const scenario = LISTEN_RESPOND_SCENARIOS.find(s=>s.id===scenarioId);
  earState = { mode:'listenrespond', phase:'loading', scenario, prompts:[], current:0, score:0, results:[], ended:false };
  lrRec = null;
  goTo('ear');
  generateLRPrompts(scenarioId);
}

async function generateLRPrompts(scenarioId){
  const scenario = LISTEN_RESPOND_SCENARIOS.find(s=>s.id===scenarioId);
  const vocabPool = getVocabPoolForPrompt('', 40);
  const prompt = `Create 6 conversational prompts for a Pimsleur-style listen-and-respond drill.

Scenario: ${scenario.label}
Difficulty: ${scenario.difficulty}/3
The learner knows these words: ${vocabPool}

For each prompt, create a realistic thing someone might say to the learner in this scenario. The learner must respond naturally.

Reply in EXACTLY this JSON format:
{"prompts":[{"prompt":"Good morning! How was your weekend?","expectedIdea":"Respond with a greeting and briefly share what you did","keyPhrases":["It was great","I went to","Thanks for asking"],"difficulty":${scenario.difficulty}}]}

Create 6 prompts, gradually increasing in complexity. Use Canadian English. Keep prompts natural and workplace-appropriate.`;

  const result = await callGemini([{role:'user',text:prompt}],'You are a Pimsleur-style drill instructor for Canadian English. Create realistic workplace conversation prompts. Respond only with valid JSON.');
  if(result){
    try{
      const cleaned = cleanGeminiText(result);
      const data = JSON.parse(cleaned);
      earState.prompts = data.prompts || [];
      earState.phase = 'speak';
    }catch(e){ toast('AI format error, try again'); earState = { mode:'listenrespond', phase:'pick' }; }
  } else { toast('AI error'); earState = { mode:'listenrespond', phase:'pick' }; }
  renderEarActive(document.getElementById('screen-ear'));
  // Auto-speak first prompt
  if(earState.phase === 'speak' && earState.prompts.length > 0){
    setTimeout(()=>speak(earState.prompts[0].prompt), 500);
  }
}

        ${result.suggested?`<div style="font-size:12px;color:var(--green);margin-top:8px;padding:8px;background:rgba(0,184,148,.08);border-radius:6px"><strong>Suggested response:</strong> "${result.suggested}"</div>`:''}

function startLRThink(){
  earState.phase = 'think';
  renderEarActive(document.getElementById('screen-ear'));

function startLRCountdown(){
  let count = 3;
  const timerEl = document.getElementById('lr-timer');
  if(!timerEl) return;
  const interval = setInterval(()=>{
    count--;
    if(count <= 0){
      clearInterval(interval);
      earState.phase = 'record';
      renderEarActive(document.getElementById('screen-ear'));
      // Auto-start recording
      setTimeout(()=>toggleLRRecord(), 300);
    } else {
      if(timerEl) timerEl.textContent = count;
    }
  }, 1000);
}

async function toggleLRRecord(){
  if(lrRec && lrRec.recording){
    lrRec.recording = false;
    if(lrRec.recorder && lrRec.recorder.state === 'recording'){
      lrRec.recorder.onstop = () => {
        if(lrRec.stream) lrRec.stream.getTracks().forEach(t=>t.stop());
        if(lrRec.chunks.length){
          const blob = new Blob(lrRec.chunks, {type:'audio/webm'});
          lrRec.blobUrl = URL.createObjectURL(blob);
        }
        renderEarActive(document.getElementById('screen-ear'));
      };
      lrRec.recorder.stop();
    }
  } else {
    try{
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      lrRec = { recording:true, recorder:null, stream, chunks:[], blobUrl:null };
      try{ lrRec.recorder = new MediaRecorder(stream, {mimeType:'audio/webm;codecs=opus'}); }
      catch(e){ lrRec.recorder = new MediaRecorder(stream); }
      lrRec.recorder.ondataavailable = e => { if(e.data.size>0) lrRec.chunks.push(e.data); };
      lrRec.recorder.start();
      renderEarActive(document.getElementById('screen-ear'));
    }catch(e){ toast('Microphone access denied'); }
  }
}

function playLRRecording(){
  if(lrRec && lrRec.blobUrl) new Audio(lrRec.blobUrl).play();
}

function playLRResult(idx){
  const r = earState.results[idx];
  if(r && r.blobUrl) new Audio(r.blobUrl).play();
}

async function submitLRResponse(){
  if(!lrRec || !lrRec.blobUrl) return;
  const loadEl = document.getElementById('lr-loading');
  if(loadEl) loadEl.innerHTML = '<div class="ai-loading" style="margin-top:12px"><span></span><span></span><span></span></div><div style="font-size:11px;color:var(--text3);margin-top:4px">AI is evaluating...</div>';

  const p = earState.prompts[earState.current];
  const resp = await fetch(lrRec.blobUrl);
  const blob = await resp.blob();
  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onloadend = () => resolve(reader.result.split(',')[1]);
    reader.readAsDataURL(blob);
  });

  const prompt = `The learner is doing a Pimsleur-style listen-and-respond drill.

Scenario: ${earState.scenario.label}
They were asked: "${p.prompt}"
A good response would: ${p.expectedIdea}
Key phrases to look for: ${p.keyPhrases.join(', ')}

Listen to the learner's spoken response and evaluate:
1. **Rating**: Good / Needs Work / Try Again
2. **Content**: Did they respond appropriately to the prompt?
3. **Grammar**: Any grammar issues?
4. **Pronunciation**: Any notable pronunciation issues?
5. **Suggested Response**: Give a natural example response

Give feedback in BOTH English and Chinese (中文). Keep it brief and encouraging (5-7 lines max). Start with the rating on the first line like: "Rating: Good"
Then after feedback, on a new line write: "Suggested: [a natural example response]"`;

  const result = await callGeminiWithAudio(base64, 'audio/webm', prompt, 'You are a friendly Pimsleur-style conversation coach for Canadian English ESL learners. Be encouraging and specific.');

  if(result){
    let rating = 'Evaluated';
    if(/good/i.test(result.split('\n')[0])) rating = 'Good';
    else if(/needs?\s*work/i.test(result.split('\n')[0])) rating = 'Needs Work';
    else if(/try\s*again/i.test(result.split('\n')[0])) rating = 'Try Again';

    let suggested = '';
    const sugMatch = result.match(/Suggested:\s*"?([^"]+)"?/i);
    if(sugMatch) suggested = sugMatch[1].trim();

    const isGood = rating === 'Good';
    if(isGood) earState.score++;
    earState.results[earState.current] = { feedback:result.replace(/Suggested:.*$/im,'').trim(), rating, blobUrl:lrRec.blobUrl, prompt:p, suggested };
    recordActivity(isGood);
    // XP for Listen & Respond (scenario-based, no word ID)
    awardXP('listen-respond:' + earState.scenario.id, null, isGood ? 25 : 10);
  } else {
    earState.results[earState.current] = { feedback:'Could not evaluate. Check your API key.', rating:'Error', blobUrl:lrRec.blobUrl, prompt:p, suggested:'' };
  }
  earState.phase = 'evaluated';
  renderEarActive(document.getElementById('screen-ear'));
}

async function generatePlacementQuiz(){
  const key = state.settings.apiKey;
  if(!key){ toast('Add your Gemini API key in Settings'); goTo('settings'); return; }
  pretestState.step = 'loading';
  renderPretest(document.getElementById('screen-pretest'));
  const bg = pretestState.bg;
  const prompt = `Generate a 15-question multiple-choice vocabulary assessment for a Canadian English learner.

Learner profile:
- Time in Canada: ${bg.time}
- Field: ${bg.field}
- Self-assessed level: ${bg.level}
- Wants to improve: ${[...bg.focus].join(', ')}

Requirements:
- 5 easy questions (common Canadian terms, basic workplace words)
- 5 medium questions (idioms, slang, workplace phrases)
- 5 hard questions (advanced jargon, cultural nuances, tricky pronunciation)
- Cover these areas: Canadian slang, workplace language, social phrases, Canadian culture, pronunciation
- Each question tests if the learner knows what a Canadian English word/phrase means
- Make questions relevant to their field and focus area

Return ONLY a JSON array of 15 questions:
[{"q":"What does 'toque' mean in Canada?","options":["A winter hat","A type of cake","A greeting","A sport"],"answer":0,"category":"slang","difficulty":1},...]

answer = index of correct option (0-3)
category = one of: slang, workplace, social, culture, pronunciation, technical
difficulty = 1 (easy), 2 (medium), 3 (hard)`;

  try{
    const res = await callGemini([{role:'user',text:prompt}]);
    if(!res){ toast('Failed to generate quiz'); pretestState.step='background'; renderPretest(document.getElementById('screen-pretest')); return; }
    let clean = res.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    pretestState.questions = JSON.parse(clean);
    pretestState.current = 0;
    pretestState.answers = [];
    pretestState.step = 'quiz';
    renderPretest(document.getElementById('screen-pretest'));
  }catch(e){
    console.error(e);
    toast('Error parsing quiz: '+e.message);
    pretestState.step = 'background';
    renderPretest(document.getElementById('screen-pretest'));
  }
}

function renderPretestQuiz(el){
  const qs = pretestState.questions;
  if(pretestState.current >= qs.length){ analyzePlacementResults(); return; }
  const q = qs[pretestState.current];
  const pct = (pretestState.current / qs.length) * 100;
  const answered = pretestState._answered;
  el.innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin:12px 0">
      <span>Question ${pretestState.current+1} / ${qs.length}</span>
      <span style="color:${q.difficulty===1?'var(--green)':q.difficulty===2?'var(--orange)':'var(--red)'}">
        ${q.difficulty===1?'Easy':q.difficulty===2?'Medium':'Hard'}
      </span>
    </div>
    <div class="card mb">
      <div style="font-size:11px;color:var(--accent2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${q.category||''}</div>
      <div style="font-size:16px;font-weight:700;color:var(--text);margin-bottom:16px">${q.q}</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${q.options.map((opt,i) => {
          let style = 'background:var(--bg3);color:var(--text);border:2px solid var(--bg4);';
          if(answered !== undefined){
            if(i === q.answer) style = 'background:rgba(0,168,132,.15);color:var(--green);border:2px solid var(--green);';

          return '<button style="'+style+'padding:12px 16px;border-radius:10px;font-size:14px;text-align:left;cursor:pointer" '+(answered!==undefined?'disabled':'')+' onclick="answerPlacement('+i+')">'+opt+'</button>';

}

function answerPlacement(idx){
  const q = pretestState.questions[pretestState.current];
  pretestState._answered = idx;
  pretestState.answers.push({qIdx:pretestState.current, chosen:idx, correct:idx===q.answer, category:q.category, difficulty:q.difficulty});
  renderPretestQuiz(document.getElementById('screen-pretest'));
}

function nextPlacementQ(){
  pretestState._answered = undefined;

async function analyzePlacementResults(){
  pretestState.step = 'analyzing';
  renderPretest(document.getElementById('screen-pretest'));
  const bg = pretestState.bg;
  const results = pretestState.answers;
  const totalCorrect = results.filter(r=>r.correct).length;
  const byCategory = {};
  results.forEach(r => {
    if(!byCategory[r.category]) byCategory[r.category] = {correct:0, total:0};
    byCategory[r.category].total++;
    if(r.correct) byCategory[r.category].correct++;
  });

  const prompt = `A Canadian English learner just completed a vocabulary assessment.

Profile: ${bg.time} in Canada, works in ${bg.field}, self-assessed ${bg.level}, wants to improve ${[...bg.focus].join(', ')}.

Score: ${totalCorrect}/${results.length}
By category: ${JSON.stringify(byCategory)}
Wrong answers: ${JSON.stringify(results.filter(r=>!r.correct).map(r=>pretestState.questions[r.qIdx].q))}

Based on these results, recommend 4-6 vocabulary packs. For each pack, generate 15 words with definitions and example sentences relevant to Canadian English and the learner's profile.

Return ONLY JSON:
{"level":"beginner/intermediate/advanced",
"summary":"1-2 sentence assessment",
"packs":[
  {"name":"Pack Name","desc":"short description","match":85,"words":[
    {"word":"...","definition":"...","example":"...","category":"slang","difficulty":2},
    ...15 words
  ]},
  ...4-6 packs
]}

Categories to use: slang, workplace, social, culture, essentials, idioms
Difficulty: 1-3
Make words practical and Canada-specific. Include Canadian spelling (colour, centre, etc).`;

  try{
    const res = await callGemini([{role:'user',text:prompt}]);
    if(!res){ toast('Analysis failed'); pretestState.step='background'; renderPretest(document.getElementById('screen-pretest')); return; }
    let clean = res.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    const data = JSON.parse(clean);
    pretestState.result = data;
    pretestState.selectedPacks = new Set(data.packs.map((_,i)=>i));
    pretestState.step = 'results';
    renderPretest(document.getElementById('screen-pretest'));
  }catch(e){
    console.error(e);
    toast('Error: '+e.message);
    pretestState.step = 'background';
    renderPretest(document.getElementById('screen-pretest'));
  }
}

async function addPlacementPacks(){
  const data = pretestState.result;
  const sel = pretestState.selectedPacks;
  if(!state.customWords) state.customWords = [];
  const existingWords = new Set(WORDS.map(w=>w.word.toLowerCase()));
  let added = 0;
  data.packs.forEach((p,i) => {
    if(!sel.has(i)) return;
    p.words.forEach(w => {
      const key = w.word.toLowerCase();
      if(existingWords.has(key)) return;
      existingWords.add(key);
      state.customWords.push({word:w.word, definition:w.definition, example:w.example||'', category:w.category||'custom', difficulty:w.difficulty||2});
      added++;
    });
  });
  saveState();
  rebuildWords();
  toast(added+' words added to your library!');
  pretestState = null;
  goTo('home');
}

  const cat = document.getElementById('add-cat')?.value;

  pendingGrammar = null;

function forceAddWord(action){
  const root = document.getElementById('modal-root');
  const newWord = root._pendingNewWord;
  const existing = root._pendingExisting;
  if(!newWord || !existing) return;
  if(action === 'replace'){
    const idx = (state.customWords||[]).findIndex(c=>c.word.toLowerCase()===existing.word.toLowerCase());
    if(idx >= 0){
      state.customWords[idx] = newWord;
      if(pendingGrammar) state.customWords[idx].grammar = pendingGrammar;
    }
    toast('"'+newWord.word+'" replaced!');
  } else if(action === 'combine'){
    const idx = (state.customWords||[]).findIndex(c=>c.word.toLowerCase()===existing.word.toLowerCase());
    if(idx >= 0){
      const oldDef = state.customWords[idx].definition;
      const hasMutliple = oldDef.match(/^\d+\./);
      if(hasMutliple){
        const count = (oldDef.match(/\d+\./g)||[]).length;
        state.customWords[idx].definition = oldDef + '; ' + (count+1) + '. ' + newWord.definition;
      } else {
        state.customWords[idx].definition = '1. ' + oldDef + '; 2. ' + newWord.definition;
      }
      if(newWord.example && !state.customWords[idx].example.includes(newWord.example)){
        state.customWords[idx].example += ' / ' + newWord.example;
      }
    }
    toast('Definitions combined!');
  } else if(action === 'both'){
    if(pendingGrammar) newWord.grammar = pendingGrammar;
    state.customWords.push(newWord);
    toast('"'+newWord.word+'" added as second entry!');
  }
  pendingGrammar = null;
  pendingMeanings = [];
  closeModal();
  saveState();
  rebuildWords();
  renderAddWords(document.getElementById('screen-addwords'));
}

function syncMeaningsToFields(){
  const defField = document.getElementById('add-def');
  const exField = document.getElementById('add-example');
  if(!defField) return;
  if(pendingMeanings.length === 0){
    defField.value = '';
    if(exField) exField.value = '';
  } else if(pendingMeanings.length === 1){
    defField.value = pendingMeanings[0].definition;
    if(exField) exField.value = pendingMeanings[0].example;
  } else {
    defField.value = pendingMeanings.map((m,i)=>`${i+1}. ${m.definition}`).join('; ');
    if(exField) exField.value = pendingMeanings.map(m=>m.example).join(' / ');
  }
}

  const wordInput = document.getElementById('add-word');
  const word = wordInput?.value.trim();
  if(!word){ toast('Type a word first'); return; }
  toast('Asking AI...');
  const validCats = Object.keys(CATEGORIES).filter(k=>k!=='custom').join(', ');
  const vocabPool = getVocabPoolForPrompt(word);
  const prompt = `For the English word/phrase "${word}" used in Canadian daily life, provide ALL common meanings/senses of this word.

- A clear, simple definition (1 sentence, for ESL learners). Do NOT start with the word itself.
- An example sentence using it in a Canadian context

- The best category from this list: ${validCats}
- Difficulty level: 1 (easy/common), 2 (medium), or 3 (hard/specialized)
- Grammar info: part of speech (e.g. "n", "v", "adj", "adv", "n/v"), related forms, and a usage tip

The learner is also studying these words: ${vocabPool}
When natural, use some of these words in definitions or examples for reinforcement.

Reply in EXACTLY this JSON format, no extra text:
{"meanings":[{"definition":"...","example":"..."}],"category":"...","difficulty":1,"grammar":{"pos":"...","related":"...","usage":"..."}}

If the word has only ONE meaning, still use the meanings array with one item.`;
  const result = await callGemini([{role:'user',text:prompt}],'You are a dictionary. Respond only with valid JSON. Keep definitions simple for ESL learners. When possible, use the learner\'s other vocabulary words in definitions and examples.');
  if(result){
    try{
      const cleaned = result.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
      const data = JSON.parse(cleaned);
      const wordName = document.getElementById('add-word')?.value.trim() || word;
      if(data.meanings && Array.isArray(data.meanings) && data.meanings.length > 0){
        pendingMeanings = data.meanings.map(m=>({
          definition: cleanDefinition(wordName, m.definition || ''),
          example: m.example || ''
        })).filter(m=>m.definition);
      } else if(data.definition){
        pendingMeanings = [{definition: cleanDefinition(wordName, data.definition), example: data.example || ''}];
      }
      if(pendingMeanings.length > 0){
        syncMeaningsToFields();
        renderMeaningsList();
      }
      if(data.category && CATEGORIES[data.category]){
        document.getElementById('add-cat').value = data.category;
      }
      if(data.difficulty && [1,2,3].includes(data.difficulty)){
        document.getElementById('add-diff').value = data.difficulty;
      }
      pendingGrammar = data.grammar && data.grammar.pos ? data.grammar : null;
      const grammarPreview = document.getElementById('grammar-preview');
      if(grammarPreview && pendingGrammar){
        grammarPreview.innerHTML = `<div class="card card-sm" style="background:var(--bg3);border-left:3px solid var(--accent);margin-top:8px">
          <div style="font-size:11px;font-weight:700;color:var(--accent2)">Grammar (auto-detected)</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px"><span class="pos-badge">${pendingGrammar.pos}</span>${pendingGrammar.related?' &middot; '+pendingGrammar.related:''}</div>
          ${pendingGrammar.usage?'<div style="font-size:11px;color:var(--orange);margin-top:3px">&#9888; '+pendingGrammar.usage+'</div>':''}
        </div>`;
      }
      toast(`AI filled ${pendingMeanings.length} meaning${pendingMeanings.length>1?'s':''}!`);
    }catch(e){ toast('AI response format error, try again'); console.error(result); }
  }
}

async function aiSuggestWords(){

  addWordsState.aiLoading = true;

  const existingWords = WORDS.map(w=>w.word.toLowerCase());
  const prevSuggested = (state.aiSuggestHistory || []).map(w=>w.toLowerCase());
  const allExclude = [...new Set([...existingWords, ...prevSuggested])];
  const prompt = `Generate 15 useful English words/phrases related to "${topic}" that a newcomer to Canada should learn.

IMPORTANT RULES:
- Do NOT include any of these words: ${allExclude.slice(0,120).join(', ')}
- Pick DIVERSE words — mix easy and hard, common and uncommon
- Focus on words actually used in Canadian daily life
- Be creative — go beyond the most obvious choices
- Include some multi-word phrases and slang if relevant

For each word provide: word, simple definition (1 sentence for ESL learners), example sentence in a Canadian context, category (one of: essentials, food, work, shopping, healthcare, housing, transit, weather, social, canadian, technology, legal, finance, geography, engineering), difficulty (1=easy, 2=medium, 3=hard), and grammar info (pos=part of speech like "n","v","adj","adv","n/v", related=related word forms, usage=short tip to prevent common ESL mistakes).

Reply in EXACTLY this JSON array format, no extra text:
[{"word":"...","definition":"...","example":"...","category":"...","difficulty":1,"grammar":{"pos":"...","related":"...","usage":"..."}}]`;
  const result = await callGemini([{role:'user',text:prompt}],'You are a vocabulary expert for Canadian English ESL education. Respond only with valid JSON array. Be creative and diverse in your word choices — never repeat words from previous suggestions. Pick practical, real-world words a newcomer would encounter.');
  addWordsState.aiLoading = false;
  if(result){
    try{
      const cleaned = result.replace(/```json?\n?/g,'').replace(/```/g,'').trim();
      const suggestions = JSON.parse(cleaned);
      const filtered = suggestions.filter(s=>
        !allExclude.includes(s.word.toLowerCase())
      );
      addWordsState.aiSuggestions = filtered.map((s,i)=>({...s, selected:true, idx:i}));
      // Track suggested words to avoid repeats next time
      if(!state.aiSuggestHistory) state.aiSuggestHistory = [];
      filtered.forEach(s=>state.aiSuggestHistory.push(s.word));
      saveState();
    }catch(e){ toast('AI response format error, try again'); console.error(result); }
  }
  renderAISuggest(document.getElementById('addwords-content'));

// ===== S3: PROFILE / SRS INJECTION HELPERS =====
function getUserProfile(){
  const p = state.userProfile || (state.userProfile = { jobContext:'', interests:[], recentTopics:[] });
  if(!Array.isArray(p.interests)) p.interests = [];
  if(!Array.isArray(p.recentTopics)) p.recentTopics = [];
  return p;
}

function getDueReviewWordsForChat(n){
  n = n || 3;
  const due = (typeof getDueWords === 'function') ? getDueWords() : [];
  const pool = due.slice();
  // Fall back to weak words if no due
  if(pool.length < n){
    const weak = (WORDS||[]).filter(w => {
      const s = getWordStatus(w.id);
      return s === 'beginner' || s === 'learning';
    });
    pool.push(...weak);
  }
  // Dedupe
  const seen = new Set();
  const out = [];
  for(const w of pool){
    if(!w || seen.has(w.id)) continue;
    seen.add(w.id);
    out.push(w);
    if(out.length >= n) break;
  }
  return out;
}

// Builds the [Learner profile] + [Today's review words] block appended to chat system prompts.
function buildChatContext(){
  const profile = getUserProfile();
  const cefr = (typeof getCEFRLevel === 'function') ? getCEFRLevel() : null;
  const reviewWords = getDueReviewWordsForChat(3);

  let block = '\n\n[Learner profile]';
  if(cefr && cefr.label){
    block += `\n- English level: ${cefr.label}`;
  } else if(cefr && cefr.level){
    block += `\n- English level: ${cefr.level}`;
  }
  if(profile.jobContext){
    block += `\n- Job / industry: ${profile.jobContext}`;
  }
  if(profile.interests && profile.interests.length){
    block += `\n- Interests: ${profile.interests.slice(0,5).join(', ')}`;
  }
  if(profile.recentTopics && profile.recentTopics.length){
    block += `\n- Recent topics they've discussed: ${profile.recentTopics.slice(0,3).join('; ')}`;
  }

  if(reviewWords.length){
    block += `\n\n[Today's review words]`;
    block += `\nThese words are due for spaced-repetition review today. If — and only if — the conversation flows naturally toward one of them, weave 1-2 in. NEVER force them. Words: ${reviewWords.map(w=>w.word).join(', ')}.`;
  }

  return { promptBlock: block, reviewWords: reviewWords.map(w=>w.word) };
}

// Wraps an AI reply, wrapping any review-word occurrence in a highlight span.
// Only highlights inside the main reply (before [Correction] section).
function highlightReviewWordsHtml(text, role, reviewWords){
  if(role !== 'ai' || !reviewWords || !reviewWords.length){
    return (text || '').replace(/\n/g,'<br>');
  }
  const parts = (text || '').split('[Correction]');
  let main = parts[0];
  reviewWords.forEach(rw => {
    if(!rw) return;
    const esc = rw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`\\b(${esc})\\b`, 'gi');
    main = main.replace(re, '<span class="srs-highlight" title="今日复习词 (SRS due today)">$1</span>');
  });
  parts[0] = main;
  return parts.join('[Correction]').replace(/\n/g,'<br>');
}

// ===== S3: PROFILE UPDATER (runs after endChat) =====
async function updateProfileFromChat(messages){
  if(!state.settings.apiKey) return;
  if(!messages || messages.length < 4) return;
  const userText = messages.filter(m=>m.role==='user').map(m=>m.text).join('\n');
  if(userText.trim().length < 30) return;

  const profile = getUserProfile();
  const prompt = `You are a profile extractor. Below are messages a Chinese ESL learner sent during an English practice chat.

Current known profile:
- Job/industry: ${profile.jobContext || '(unknown)'}
- Interests: ${profile.interests.join(', ') || '(none recorded)'}
- Recent topics: ${profile.recentTopics.join('; ') || '(none recorded)'}

Recent learner messages:
"""
${userText}
"""

Extract any NEW info from these messages (don't repeat what's already known). Return ONLY valid JSON in this exact shape:
{
  "jobContext": "<string — keep current value if no new info, or update if a clearer/more specific job context emerged>",
  "newInterests": ["<array of newly mentioned hobbies/interests, lowercase short phrases, 0-4 items>"],
  "topicTalkedAbout": "<short phrase summarizing the main topic of THIS chat, e.g. 'weekend hiking plans', or empty string if unclear>"
}

Rules:
- Only add interests that the learner actually expressed enthusiasm for or repeatedly referenced.
- Do NOT invent details. If nothing new, return empty arrays / unchanged jobContext.
- jobContext examples: "environmental sector, looking for fieldwork roles in Canada", "warehouse / logistics", "student".`;

  try{
    const reply = await callGemini([{role:'user', text:prompt}], 'You are a JSON-only profile extractor. Reply with valid JSON only, no prose, no code fences.', { responseMimeType: 'application/json' });
    if(!reply) return;
    const cleaned = cleanGeminiText(reply);
    const data = JSON.parse(cleaned);
    let changed = false;
    if(data.jobContext && typeof data.jobContext === 'string' && data.jobContext.trim() && data.jobContext !== profile.jobContext){
      profile.jobContext = data.jobContext.trim().slice(0, 200);
      changed = true;
    }
    if(Array.isArray(data.newInterests)){
      const existing = new Set(profile.interests.map(s=>s.toLowerCase()));
      data.newInterests.forEach(it => {
        if(typeof it === 'string'){
          const v = it.trim().toLowerCase().slice(0, 60);
          if(v && !existing.has(v)){
            profile.interests.push(v);
            existing.add(v);
            changed = true;
          }
        }
      });
      if(profile.interests.length > 20) profile.interests = profile.interests.slice(-20);
    }
    if(typeof data.topicTalkedAbout === 'string' && data.topicTalkedAbout.trim()){
      const t = data.topicTalkedAbout.trim().slice(0, 80);
      profile.recentTopics.unshift(t);
      if(profile.recentTopics.length > 8) profile.recentTopics = profile.recentTopics.slice(0, 8);
      changed = true;
    }
    if(changed) saveState();
  }catch(e){
    console.warn('Profile update failed:', e);
  }
}

// ===== S1: VOCAB FLAGGING AGENT =====
// Scans an AI chat reply, flags 1-3 useful words above the learner's current vocab,
// excludes words already in their library and words already flagged this chat.
async function flagVocabAgent(replyText, alreadyFlaggedSet){
  if(!state.settings.apiKey) return [];
  if(!replyText || replyText.length < 20) return [];
  const main = replyText.split('[Correction]')[0]; // ignore correction section

  // Pull a sample of user's known words (just the strings) to give the agent an exclusion list
  const knownSample = (WORDS||[]).slice(0, 200).map(w => (w.word||'').toLowerCase()).filter(Boolean);
  const knownSet = new Set(knownSample);
  const alreadyFlagged = alreadyFlaggedSet ? Array.from(alreadyFlaggedSet) : [];

  const cefr = (typeof getCEFRLevel === 'function') ? getCEFRLevel() : null;
  const levelLabel = (cefr && (cefr.label || cefr.level)) || 'B1';

  const prompt = `You are a vocabulary scout for an ESL learner at level ${levelLabel}.
Read this short English passage and pick 1-3 words or short phrases that:
- Are useful for an intermediate-to-upper-intermediate learner (B1–C1 range)
- Likely SLIGHTLY ABOVE the learner's current vocabulary (NOT basic words like "go", "people", "think")
- Are content words or fixed phrases (not articles, prepositions, simple verbs)
- Actually appear in the passage (use the surface form from the passage)

EXCLUDE:
- Any word already in the learner's library: ${knownSample.slice(0, 80).join(', ')}${knownSample.length > 80 ? ', ...' : ''}
- Already-flagged words in this chat: ${alreadyFlagged.join(', ') || '(none)'}
- Proper nouns and names
- Words shorter than 4 letters unless they are clearly idiomatic

Passage:
"""
${main}
"""

Return ONLY valid JSON:
{ "flagged": [ { "word": "<exact surface form>", "brief": "<3-8 word definition>" }, ... ] }

If no good candidates, return { "flagged": [] }.`;

  try{
    const reply = await callGemini([{role:'user', text:prompt}], 'You are a JSON-only vocabulary scout. Output only valid JSON, no prose, no code fences.', { responseMimeType: 'application/json' });
    if(!reply) return [];
    const cleaned = cleanGeminiText(reply);
    const data = JSON.parse(cleaned);
    if(!data || !Array.isArray(data.flagged)) return [];
    const out = [];
    const seen = new Set();
    for(const item of data.flagged){
      if(!item || typeof item.word !== 'string') continue;
      const w = item.word.trim();
      const wl = w.toLowerCase();
      if(!w || w.length < 3) continue;
      if(knownSet.has(wl)) continue;
      if(alreadyFlaggedSet && alreadyFlaggedSet.has(wl)) continue;
      if(seen.has(wl)) continue;
      // Verify it actually appears in the passage (case-insensitive)
      if(!new RegExp(`\\b${wl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}\\b`, 'i').test(main)) continue;
      seen.add(wl);
      out.push({ word: w, brief: (item.brief || '').toString().slice(0, 80) });
      if(out.length >= 3) break;
    }
    return out;
  }catch(e){
    console.warn('Flag vocab agent failed:', e);
    return [];
  }
}

// ===== S4: GRAMMAR ERROR CLASSIFIER =====
const GRAMMAR_CATEGORIES = {
  tense:       { label:'Tense',                 zh:'时态',     icon:'⏰', color:'#fdcb6e' },
  article:     { label:'Article',               zh:'冠词',     icon:'🅰️', color:'#74b9ff' },
  preposition: { label:'Preposition',           zh:'介词',     icon:'↗️', color:'#a29bfe' },
  agreement:   { label:'Subject-Verb Agreement',zh:'主谓一致', icon:'⚖️', color:'#fd79a8' },
  wordchoice:  { label:'Word Choice',           zh:'词义选择', icon:'🎯', color:'#00b894' },
  collocation: { label:'Collocation',           zh:'搭配',     icon:'🔗', color:'#e17055' },
  wordorder:   { label:'Word Order',            zh:'语序',     icon:'📐', color:'#6c5ce7' },
  plural:      { label:'Plural / Countability', zh:'单复数',   icon:'#️⃣', color:'#00cec9' }
};
const ERROR_LOG_MAX = 500;

function parseCorrectionBlock(replyText){
  if(!replyText) return null;
  const idx = replyText.indexOf('[Correction]');
  if(idx === -1) return null;
  return replyText.slice(idx).trim();
}

// Async classifier: takes the user's message and the [Correction] block, breaks errors into 8 categories.
async function classifyGrammarErrors(userText, correctionBlock, source){
  if(!state.settings.apiKey) return;
  if(!userText || userText.trim().split(/\s+/).length < 3) return;
  if(!correctionBlock) return;

  const catList = Object.entries(GRAMMAR_CATEGORIES)
    .map(([key, info]) => `- ${key}: ${info.label} (${info.zh})`)
    .join('\n');

  const prompt = `You are a grammar error classifier for an ESL learner.

Original learner message:
"""
${userText}
"""

A tutor identified these corrections:
"""
${correctionBlock}
"""

For each distinct error in the corrections, classify it into one or more of these categories:
${catList}

Return ONLY valid JSON:
{
  "errors": [
    {
      "userPart": "<the exact wrong word/phrase from the learner>",
      "correctedPart": "<the corrected version>",
      "categories": ["<category-key>", ...],
      "pattern": "<short English description of the error pattern, max 80 chars>",
      "tipZh": "<brief Chinese tip explaining the rule, max 100 chars>"
    }
  ]
}

Rules:
- Only include real grammar errors. Skip stylistic preferences.
- Each error gets 1–3 categories (use multiple only if it really spans multiple).
- Use the exact category keys shown above (lowercase, no spaces). Skip any category that does not match.
- If the corrections section has no real errors, return { "errors": [] }.`;

  try{
    const reply = await callGemini([{role:'user', text:prompt}], 'You are a JSON-only grammar classifier. Output valid JSON only — no prose, no fences.', { responseMimeType: 'application/json' });
    if(!reply) return;
    const cleaned = cleanGeminiText(reply);
    const data = JSON.parse(cleaned);
    if(!data || !Array.isArray(data.errors) || !data.errors.length) return;

    const validKeys = Object.keys(GRAMMAR_CATEGORIES);
    let added = 0;
    data.errors.forEach(err => {
      if(!err || typeof err.userPart !== 'string' || typeof err.correctedPart !== 'string') return;
      const cats = Array.isArray(err.categories)
        ? err.categories.filter(c => typeof c === 'string' && validKeys.includes(c))
        : [];
      if(!cats.length) return;
      state.errorLog.push({
        id: 'err_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        ts: Date.now(),
        userText: userText.slice(0, 400),
        userPart: err.userPart.slice(0, 200),
        correctedPart: err.correctedPart.slice(0, 200),
        categories: cats.slice(0, 3),
        pattern: typeof err.pattern === 'string' ? err.pattern.slice(0, 120) : '',
        tipZh: typeof err.tipZh === 'string' ? err.tipZh.slice(0, 200) : '',
        resolved: false,
        source: source || 'chat'
      });
      added++;
    });

    if(added){
      if(state.errorLog.length > ERROR_LOG_MAX){
        state.errorLog = state.errorLog.slice(-ERROR_LOG_MAX);
      }
      saveState();
      // If the Errors screen is currently shown, refresh it
      if(typeof currentScreen !== 'undefined' && currentScreen === 'errors'){
        renderErrors(document.getElementById('screen-errors'));
      }
    }
  }catch(e){
    console.warn('Grammar classifier failed:', e);
  }
}

// Aggregates the error log for UI / drill consumption.
function getErrorStats(){
  const log = state.errorLog || [];
  const active = log.filter(e => !e.resolved);
  const byCategory = {};
  Object.keys(GRAMMAR_CATEGORIES).forEach(cat => {
    byCategory[cat] = active.filter(e => Array.isArray(e.categories) && e.categories.includes(cat));
  });
  const weekAgo = Date.now() - 7*24*60*60*1000;
  const recentCount = active.filter(e => e.ts > weekAgo).length;
  // Sort categories by active count desc
  const ranked = Object.entries(byCategory)
    .map(([cat, arr]) => ({ cat, count: arr.length, items: arr }))
    .sort((a,b) => b.count - a.count);
  return { byCategory, ranked, totalActive: active.length, totalResolved: log.length - active.length, recentCount };
}

function markErrorResolved(id){
  const e = (state.errorLog||[]).find(x => x.id === id);

  if(typeof currentScreen !== 'undefined' && currentScreen === 'errors'){

function markCategoryResolved(category){

  let n = 0;
  log.forEach(e => {
